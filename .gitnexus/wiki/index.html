var PAGES = {"application-core-routing-components":"# Application Core & Routing — components\n\n# Application Core & Routing — Components Module\n\n## Overview\n\nThis module provides the foundational UI components and routing infrastructure for the application. It implements a **configuration-driven routing system** that eliminates hardcoded route logic in `App.tsx`, along with a set of reusable shared components for navigation, layout, and data display.\n\nThe module is organized into two main areas:\n\n- **Router** (`components/router/`): Dynamic page rendering based on route configuration\n- **Shared Components** (`components/shared/`): Reusable UI building blocks\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                    App.tsx (Entry Point)                     │\n└──────────────────────┬──────────────────────────────────────┘\n                       │ route: AppRoute\n                       ▼\n┌─────────────────────────────────────────────────────────────┐\n│                     AppRouter                                │\n│  - Resolves page component from route config                │\n│  - Injects route params, callbacks, and data                │\n│  - Wraps in Suspense for lazy loading                       │\n└──────────────────────┬──────────────────────────────────────┘\n                       │ renders page component\n                       ▼\n┌─────────────────────────────────────────────────────────────┐\n│                  Shared Components                           │\n│  ┌──────────┐  ┌───────────┐  ┌────────┐  ┌───────────┐   │\n│  │AppShell  │  │AppSidebar │  │PageHdr │  │ TabNav    │   │\n│  │(layout)  │  │(nav)      │  │(header)│  │(tabs)     │   │\n│  └──────────┘  └───────────┘  └────────┘  └───────────┘   │\n│  ┌──────────┐  ┌───────────┐  ┌────────┐  ┌───────────┐   │\n│  │StatCard  │  │Pagination │  │EmptySt │  │ListToolbar│   │\n│  │(display) │  │(display)  │  │(feedbk)│  │(filters)  │   │\n│  └──────────┘  └───────────┘  └────────┘  └───────────┘   │\n└─────────────────────────────────────────────────────────────┘\n```\n\n## Router Component\n\n### AppRouter\n\nThe `AppRouter` component is the central routing dispatcher. It receives the current `AppRoute` object and renders the appropriate page component.\n\n**Props:**\n\n| Prop | Type | Description |\n|------|------|-------------|\n| `route` | `AppRoute` | Current route object from route configuration |\n| `projects` | `Array<{code, name, status}>` | Global project data for data-driven pages |\n| `onOpenPersonnelDetail` | `(userId: string) => void` | Callback for personnel detail navigation |\n| `onOpenSupplier` | `(supplierId: string) => void` | Callback for supplier detail navigation |\n\n**Routing Strategy:**\n\nThe component implements a two-tier routing strategy:\n\n1. **Simple pages** (no props or only common props): Automatically rendered by `AppRouter`\n2. **Complex pages** (detail views, new-detail views): Handled as special cases in `App.tsx`\n\n**Parameter Injection:**\n\nThe `extractRouteParams` helper maps specific page types to their required parameters:\n\n```typescript\ncase 'personnel-detail':      → { userId: route.userId }\ncase 'procurement-supplier-detail': → { supplierId: route.supplierId }\ncase 'standard-template-detail':    → { templateId: route.templateId }\n```\n\n**Page Props Assembly:**\n\nProps are assembled immutably in three layers:\n\n1. **Route parameters** (for `PARAM_PAGES`): Extracted via `extractRouteParams`\n2. **Callback props** (for `personnel` page): Injected as `onUserOpen`\n3. **Data props** (for `contracts`/`projects` pages): Injected as `projects`\n\n**Loading State:**\n\nThe `PageLoader` component provides a consistent loading indicator during route transitions, featuring a centered spinner with the application's dark theme background.\n\n## Shared Navigation Components\n\n### AppSidebar\n\nThe sidebar navigation component provides the primary application navigation menu.\n\n**Features:**\n\n- **Collapsible**: Supports both controlled and uncontrolled collapse state\n- **Persistence**: Collapse state is persisted to `localStorage` via `useSidebarCollapsed` hook\n- **Active Route Detection**: Uses `isHashRouteActive` to highlight the current section\n- **Disabled Items**: Renders non-interactive items for future features\n- **Icon Mapping**: Maps navigation labels to icon names via `navIconMap`\n\n**Navigation Items:**\n\nThe sidebar renders 14 navigation items from `nav.config.ts`, covering all major application modules (Projects, Tasks, Customers, Contracts, Procurement, etc.). Items without `href` are rendered as disabled.\n\n### PageHeader\n\nThe page header component provides consistent page-level headers across the application.\n\n**Features:**\n\n- **Breadcrumb Navigation**: Supports multi-level breadcrumb trails with clickable links\n- **Search**: Optional search input with configurable placeholder\n- **Actions**: Notification and AI assistant buttons, user profile display\n- **Variants**: `standard` and `dark` variants for different module contexts\n- **Extensibility**: `extraTitleContent` and `extraActions` slots for custom content\n\n### TabNav\n\nA tab navigation component supporting multiple visual variants.\n\n**Variants:**\n\n| Variant | Description |\n|---------|-------------|\n| `default` | Standard tab bar |\n| `pills` | Pill-shaped tabs |\n| `underline` | Underline-style tabs |\n\n**Features:**\n\n- **Badge Support**: Numeric badges on tabs\n- **Hidden Tabs**: Tabs can be conditionally hidden\n- **Icon Support**: Both SVG icons (via `Icon` component) and image-based icons\n- **Accessibility**: Proper ARIA roles and attributes\n\n### Navigation Utilities\n\n**`navigateByHash(targetHash)`**\n\nHandles hash-based navigation with a workaround for same-hash navigation:\n\n```typescript\n// If hash differs, simple assignment works\nwindow.location.hash = targetHash\n\n// If same hash, force navigation via assign\nwindow.location.assign(`${baseUrl}${targetHash}`)\n```\n\n**`isHashRouteActive(currentHash, href)`**\n\nDetermines if a navigation item is active by checking against prefix matchers:\n\n```typescript\nconst routePrefixMatchers = {\n  '#/projects': ['#/projects', '#/projects/'],\n  '#/tasks': ['#/tasks', '#/tasks?', '#/tasks/'],\n  // ... more routes\n}\n```\n\n## Layout Components\n\n### AppShell\n\nThe `AppShell` component provides the application's structural layout.\n\n**Props:**\n\n| Prop | Type | Description |\n|------|------|-------------|\n| `rootClassName` | `string` | Root container class |\n| `sidebar` | `ReactNode` | Sidebar content |\n| `header` | `ReactNode` | Optional header content |\n| `children` | `ReactNode` | Main content |\n| `workspaceClassName` | `string` | Workspace area class |\n| `mainClassName` | `string` | Main content area class |\n| `glowClassPrefix` | `string` | Optional glow effect class prefix |\n\nThe component supports decorative glow effects when `glowClassPrefix` is provided, rendering left and right glow elements.\n\n## State Management\n\n### useSidebarCollapsed Hook\n\nManages sidebar collapse state with `localStorage` persistence:\n\n```typescript\nconst { collapsed, toggle } = useSidebarCollapsed(controlled?: boolean)\n```\n\n- **Controlled Mode**: When `controlled` is provided, the hook acts as a pass-through\n- **Uncontrolled Mode**: Manages internal state with `localStorage` persistence\n- **Toggle**: Returns the new state after toggling\n\n## Module Exports\n\nThe `components/shared/index.ts` barrel file exports all shared components organized by category:\n\n- **Navigation**: `AppSidebar`, `PageHeader`, `TabNav`\n- **Layout**: `AppShell`\n- **Data Display**: `StatCard`, `Pagination`, `StatsCards`\n- **Filters**: `ListToolbar`\n- **Feedback**: `EmptyState`\n- **Icons**: `Icon`, `IconName`, `getIconPath`, `hasIcon`, `navIconMap`\n- **Cards**: `ProjectCard`\n\n## Integration Points\n\nThe module connects to the rest of the codebase through:\n\n1. **Route Configuration** (`config/routes`): `AppRouter` imports `PARAM_PAGES` and `getPageComponent` from the route configuration module\n2. **Icon System** (`components/icons`): Navigation components use the centralized icon system\n3. **App.tsx**: The `AppRouter` is the primary integration point, receiving route data and callbacks from the application entry point\n4. **Module Pages**: Each page component is registered in the route configuration and rendered by `AppRouter`","application-core-routing-config":"# Application Core & Routing — config\n\n# Application Core & Routing — Config Module\n\n## Overview\n\nThe `src/config` module serves as the central routing and navigation hub for the application. It provides a single source of truth for all route definitions, hash-based URL navigation, and page component registration. The module eliminates scattered `window.location.hash` manipulation across components by consolidating all navigation logic into a set of typed, reusable functions.\n\n## Architecture\n\nThe module consists of three files that work together:\n\n- **`feature-registry.ts`** — Type definitions for feature configuration\n- **`routes.ts`** — Route definitions, component registry, and hash parsing\n- **`navigation.ts`** — Navigation helper functions for all application routes\n\n```mermaid\ngraph TD\n    A[navigation.ts] -->|uses| B[setHash]\n    B -->|calls| C[navigateByHash]\n    D[routes.ts] -->|exports| E[FEATURE_REGISTRY]\n    D -->|exports| F[readRouteFromHash]\n    D -->|exports| G[pageComponentRegistry]\n    D -->|exports| H[AppRoute type]\n    A -->|imports| I[buildProjectDetailTabHash]\n    A -->|imports| J[navigateByHash]\n    style A fill:#e1f5fe\n    style D fill:#e1f5fe\n```\n\n## Feature Registry (`feature-registry.ts`)\n\nDefines the core types for feature configuration:\n\n```typescript\ntype FeatureConfig = {\n  page: string           // Unique page identifier\n  path: string           // Hash route pattern\n  component?: AnyComponent  // Lazy-loaded React component\n  label?: string         // Display label for navigation\n  category?: 'simple' | 'param' | 'callback' | 'data'\n}\n\ntype FeatureRegistry = FeatureConfig[]\n```\n\nThe `category` field classifies routes:\n- **`simple`** — Static routes with no parameters (e.g., `#/projects`)\n- **`param`** — Routes with URL parameters (e.g., `#/personnel/users/:userId`)\n- **`callback`** — Routes that may trigger callbacks\n- **`data`** — Routes that load data on entry\n\n## Route Configuration (`routes.ts`)\n\n### Lazy-Loaded Components\n\nAll page components are lazy-loaded using React's `lazy()` function, enabling code splitting:\n\n```typescript\nexport const ProjectDetailPage = lazy(() => import('../components/project/ProjectDetailPage'))\nexport const TaskManagementPage = lazy(() => import('../components/task/TaskManagementPage'))\n// ... 16 additional lazy-loaded components\n```\n\n### Feature Registry\n\nThe `FEATURE_REGISTRY` array defines all application routes with their metadata:\n\n```typescript\nexport const FEATURE_REGISTRY: FeatureConfig[] = [\n  { page: 'projects', path: '#/projects', component: ProjectManagementPage, label: '项目管理', category: 'simple' },\n  { page: 'personnel-detail', path: '#/personnel/users', component: PersonnelUserDetailPage, category: 'param' },\n  // ... 14 additional route entries\n]\n```\n\n### Route Path Constants\n\nThe `ROUTE_PATHS` object provides immutable route string constants:\n\n```typescript\nexport const ROUTE_PATHS = {\n  projects: '#/projects',\n  personnelDetailPrefix: '#/personnel/users',\n  procurementSupplierPrefix: '#/procurement/suppliers/',\n  // ... all route paths\n} as const\n```\n\n### AppRoute Discriminated Union\n\nThe `AppRoute` type provides type-safe route representation:\n\n```typescript\nexport type AppRoute =\n  | { page: 'projects' }\n  | { page: 'personnel-detail'; userId: string }\n  | { page: 'detail'; code: string; tab: ProjectDetailTab }\n  | { page: 'new-detail'; mode: 'blank' | 'template'; draftId?: string; templateId?: string }\n  // ... 16 additional route variants\n```\n\n### Page Component Registry\n\nMaps page names to their lazy-loaded components:\n\n```typescript\nexport const pageComponentRegistry: PageComponentEntry[] = [\n  { page: 'projects', component: ProjectManagementPage },\n  { page: 'detail', component: ProjectDetailPage },\n  // ... all page mappings\n]\n```\n\n### Hash Parsing\n\nThe `readRouteFromHash()` function is the core route resolver. It parses `window.location.hash` and returns a typed `AppRoute` object:\n\n```typescript\nexport const readRouteFromHash = (): AppRoute => {\n  const hash = window.location.hash\n  // Parses hash patterns in order of specificity:\n  // 1. Exact matches (e.g., '#/projects')\n  // 2. Parameterized routes (e.g., '#/tasks/:taskCode')\n  // 3. Prefix matches (e.g., '#/personnel/users/:userId')\n  // 4. Fallback to 'projects' page\n}\n```\n\nThe parsing order ensures more specific routes are matched before generic ones. It handles:\n- Exact hash matches\n- Parameter extraction from URL segments\n- Query string parsing (e.g., `?q=...`, `?createMode=...`)\n- Legacy tab alias mapping\n- Hash normalization (trailing slashes, encoding)\n\n### Legacy Tab Aliases\n\nMaps old tab names to new PMBOK-aligned names:\n\n```typescript\nexport const LEGACY_PROJECT_TAB_ALIAS: Record<string, ProjectDetailTab> = {\n  dashboard: 'overview',\n  gantt: 'schedule',\n  wbs: 'scope',\n  // ... additional mappings\n}\n```\n\n## Navigation Helpers (`navigation.ts`)\n\nProvides typed navigation functions for every application route. All functions use a centralized `setHash()` helper that delegates to `navigateByHash()`.\n\n### Project Routes\n\n```typescript\ngoToProjectList()                    // #/projects\ngoToProjectDetail(code, tab?)        // #/projects/:code/:tab\ngoToNewProject(mode, options?)       // #/projects/new?createMode=...\n```\n\n### Task Routes\n\n```typescript\ngoToTaskList()                       // #/tasks\ngoToTaskDetail(taskCode)             // #/tasks/:taskCode\ngoToTaskListWithCode(taskCode)       // #/tasks?taskCode=...\n```\n\n### Personnel Routes\n\n```typescript\ngoToPersonnelList()                  // #/personnel\ngoToPersonnelUser(userId)            // #/personnel/users/:userId\n```\n\n### Procurement Routes\n\n```typescript\ngoToProcurementList()                // #/procurement\ngoToSupplierDetail(id, returnQuery?) // #/procurement/suppliers/:id?q=...\n```\n\n### Standard Routes\n\n```typescript\ngoToStandardList()                   // #/standards\ngoToStandardTemplate(templateId)     // #/standards/templates/:templateId\n```\n\n### Simple Top-Level Routes\n\n```typescript\ngoToCustomers()    // #/customers\ngoToContracts()    // #/contracts\ngoToOrders()       // #/orders\ngoToFacility()     // #/facility\ngoToResources()    // #/resources\ngoToSettings()     // #/settings\n```\n\n### Legacy Redirect Helpers\n\n```typescript\ngoToProjectSettlementReview(code, diffId)  // #/projects/:code?panel=settlement-review&diff=...\n```\n\n## Key Design Decisions\n\n1. **Single source of truth** — All route definitions live in `routes.ts`, preventing duplication across components\n2. **Type safety** — The `AppRoute` discriminated union ensures exhaustive handling of all route variants\n3. **Lazy loading** — All page components use `React.lazy()` for code splitting\n4. **Centralized navigation** — All hash changes go through `setHash()` → `navigateByHash()`, enabling consistent behavior and future enhancements (e.g., analytics)\n5. **Hash normalization** — The `normalizeHashPath()` function handles edge cases like trailing slashes, encoding issues, and missing `#/` prefix\n6. **Backward compatibility** — Legacy tab aliases ensure old URLs continue to work during migration\n\n## Usage Example\n\n```typescript\nimport { readRouteFromHash, getPageComponent } from '../config/routes'\nimport { goToProjectDetail } from '../config/navigation'\n\n// Navigate to a project detail page\ngoToProjectDetail('PRJ-001', 'overview')\n\n// Parse current route\nconst route = readRouteFromHash()\nif (route.page === 'detail') {\n  const component = getPageComponent('detail')\n  // Render component with route.code and route.tab\n}\n```","application-core-routing-src":"# Application Core & Routing — src\n\n# Application Core & Routing — `src/`\n\n## Overview\n\nThe `src/` directory serves as the application entry point and routing hub. It initializes the React application with MUI theming, manages hash-based client-side routing, and orchestrates page-level component rendering based on the current route. The module acts as a thin orchestration layer that delegates to feature-specific components (`PersonnelPage`, `ProjectDetailPage`, `TaskDetailPage`, and the generic `AppRouter`).\n\n## Entry Point: `main.tsx`\n\n```tsx\ncreateRoot(document.getElementById('root')!).render(\n  <StrictMode>\n    <ThemeProvider theme={theme}>\n      <CssBaseline />\n      <App />\n    <\/ThemeProvider>\n  <\/StrictMode>,\n)\n```\n\n- Wraps the application in React `StrictMode` for development warnings.\n- Applies the MUI `ThemeProvider` with a custom dark theme (see `theme.ts`).\n- Injects `CssBaseline` for consistent CSS reset and base styles.\n- Renders the root `App` component.\n\n## Theme Configuration: `theme.ts`\n\nThe theme is built using MUI's `createTheme` with a comprehensive design token system. Key characteristics:\n\n- **Dark mode** with a deep navy background (`#051338`).\n- **Glassmorphism effects** applied to cards, dialogs, menus, and drawers via `glassEffect` mixin (semi-transparent backgrounds, backdrop blur, subtle borders).\n- **Custom component overrides** for 30+ MUI components (Paper, Button, Chip, Table, Dialog, Menu, etc.) to match the pixel-perfect design system.\n- **Typography scale** using Inter font with explicit sizes and weights for h5, h6, subtitle1/2, body1/2, caption, and button.\n- **Functional colors** for info (blue), success (green), warning (orange), error (red), and a custom purple accent.\n\nThe theme is exported as default and consumed by `ThemeProvider` in `main.tsx`.\n\n## Application Router: `App.tsx`\n\n### Route Resolution\n\nRouting is **hash-based**. On mount and on every `hashchange` event, the route is parsed from `window.location.hash` using `readRouteFromHash()` from `config/routes`. The parsed route object (`AppRoute`) drives all rendering decisions.\n\n```tsx\nconst [route, setRoute] = useState<AppRoute>(() => readRouteFromHash())\n\nuseEffect(() => {\n  if (!window.location.hash || window.location.hash === '#') {\n    goToProjectList()\n  }\n  const handleHashChange = () => setRoute(readRouteFromHash())\n  window.addEventListener('hashchange', handleHashChange)\n  return () => window.removeEventListener('hashchange', handleHashChange)\n}, [])\n```\n\n### Page Routing Logic\n\nThe `App` component uses a series of `if` blocks to match the current `route.page` and render the appropriate page component. This is not a traditional router — it's a **manual dispatch** that handles each page type explicitly.\n\n| `route.page` | Rendered Component | Data Injection |\n|---|---|---|\n| `'detail'` | `ProjectDetailPage` (lazy) | `activeProject` from `getProjectByCode(route.code)`, `activeTab` from `route.tab` |\n| `'task-detail'` | `TaskDetailPage` | `activeTaskDetail` from `getTaskDetailByCode(route.taskCode)` |\n| `'new-detail'` | Inline placeholder | `route.mode` displayed |\n| `'personnel'` | `PersonnelPage` (lazy) | `onUserOpen` callback set to `goToPersonnelUser` |\n| All others handled by `AppRouter` | `AppRouter` | `route` and `projects` (all projects) |\n\n**Fallback**: If no route matches, `PersonnelPage` is rendered as a default.\n\n### Lazy Loading\n\nTwo page components are loaded lazily via `React.lazy`:\n\n- `PersonnelPage`\n- `ProjectDetailPage`\n\nAll lazy-loaded pages are wrapped in `<Suspense fallback={<PageLoader />}>` which displays a centered spinning indicator.\n\n### Data Injection Pattern\n\nPages that require external data (project detail, task detail) receive their data as props rather than fetching internally. The `App` component computes `activeProject` and `activeTaskDetail` using `useMemo` based on the current route, then passes them directly to the page component. This keeps data fetching centralized and avoids redundant lookups.\n\n## Navigation Helpers\n\nThe module imports navigation functions from `config/navigation`:\n\n- `goToProjectList()` — navigates to the project list view\n- `goToTaskList()` — navigates to the task list view\n- `goToPersonnelUser()` — navigates to a specific personnel user\n\nThese are used both for initial redirect (when no hash is present) and for \"back\" buttons within page components.\n\n## CSS Architecture\n\nTwo CSS files provide styling:\n\n- **`index.css`** — Contains the bulk of the design system, organized into three major sections:\n  - Personnel Management (`--pm-*` variables and classes)\n  - Project Management (`--pm-*` continuation with project-specific styles)\n  - Task Management (`--tm-*` variables and classes)\n  \n  Includes responsive breakpoints at 1600px, 1440px, 1280px, 1024px, 768px, and 560px.\n\n- **`App.css`** — Minimal styles for the default Vite welcome page (counter, hero section, next-steps). These are largely vestigial and may be replaced as the application evolves.\n\n## Architecture Diagram\n\n```mermaid\nflowchart TD\n    A[main.tsx] --> B[ThemeProvider + CssBaseline]\n    B --> C[App.tsx]\n    \n    C --> D{hashchange event}\n    D --> E[readRouteFromHash]\n    E --> F[route: AppRoute]\n    \n    F --> G{route.page}\n    G -->|detail| H[ProjectDetailPage]\n    G -->|task-detail| I[TaskDetailPage]\n    G -->|new-detail| J[Inline Placeholder]\n    G -->|personnel| K[PersonnelPage]\n    G -->|other| L[AppRouter]\n    \n    H --> M[getProjectByCode]\n    I --> N[getTaskDetailByCode]\n    K --> O[goToPersonnelUser]\n    L --> P[projects data]\n    \n    subgraph Data Layer\n        M\n        N\n        P\n    end\n    \n    subgraph Navigation\n        Q[goToProjectList]\n        R[goToTaskList]\n        S[goToPersonnelUser]\n    end\n    \n    C --> Q\n    C --> R\n    C --> S\n```\n\n## Key Design Decisions\n\n1. **Hash-based routing** — No external router library. Simple, predictable, and works without a server-side fallback.\n2. **Manual route dispatch** — Each page type is handled explicitly rather than through a generic route matching system. This gives fine-grained control over data injection and lazy loading.\n3. **Centralized data injection** — The `App` component resolves all external data dependencies before rendering page components, keeping page components pure and testable.\n4. **Lazy loading by page type** — Only the personnel and project detail pages are lazy-loaded. Task detail and the generic `AppRouter` are eagerly loaded.\n5. **Comprehensive MUI theme** — Every MUI component used across the application is styled consistently through the theme, eliminating the need for per-component style overrides.","application-core-routing":"# Application Core & Routing\n\n# Application Core & Routing\n\n## Purpose\n\nThe Application Core & Routing module is the central nervous system of the application. It initializes the React app with MUI theming, manages all client-side navigation via hash-based routing, and provides a configuration-driven system for rendering page components based on the current route. This module eliminates scattered routing logic by consolidating navigation, route definitions, and page rendering into a cohesive, typed architecture.\n\n## Sub-modules\n\n- **[`src/`](src.md)** — Application entry point and routing hub. Initializes the React tree with `ThemeProvider`, `CssBaseline`, and `StrictMode`, then delegates rendering to the `App` component.\n- **[`config/`](config.md)** — Central routing and navigation hub. Provides typed route definitions, a component registry mapping routes to page components, hash parsing utilities, and a complete set of navigation helper functions (`goToProjectDetail`, `goToTaskList`, `goToPersonnelList`, etc.).\n- **[`components/`](components.md)** — Foundational UI and routing infrastructure. Contains the configuration-driven `AppRouter` that dynamically renders pages based on the current route, plus shared components for navigation, layout, and data display.\n\n## How They Fit Together\n\nThe module operates as a three-layer pipeline:\n\n1. **Initialization** (`src/`): `main.tsx` mounts the app with MUI theming and `CssBaseline`, then renders the `App` component.\n2. **Routing Configuration** (`config/`): The `App` component uses route definitions from `routes.ts` and navigation helpers from `navigation.ts` to manage hash-based URL changes. The `feature-registry.ts` types ensure all routes and components are type-safe.\n3. **Dynamic Rendering** (`components/`): The `AppRouter` component reads the current hash, extracts route parameters via `extractRouteParams`, looks up the matching page component from the registry, and renders it. Shared components like sidebar and navigation bars are used across pages.\n\n## Key Workflows\n\n- **Page Navigation**: Any component calls a `goTo*` function (e.g., `goToProjectDetail`) from `config/navigation.ts`, which updates `window.location.hash`. The hash change triggers `AppRouter` to parse the new route, match it against the registry, and render the corresponding page component.\n- **Route Parameter Extraction**: When navigating to detail pages (e.g., project detail, task detail), `AppRouter` uses `extractRouteParams` to pull dynamic segments from the hash (like IDs) and passes them as props to the page component.\n- **Sidebar State**: The `useSidebarCollapsed` hook from `components/shared/navigation/` persists sidebar collapse state via `writeCollapsed`, ensuring consistent layout across route changes.","architecture-technical-design":"# Architecture & Technical Design\n\n# Architecture & Technical Design Module\n\n## Overview\n\nThe Architecture & Technical Design module documents the system's architectural decisions, design patterns, and technical specifications. It serves as the authoritative reference for how the system is structured, how components interact, and the rationale behind key technical choices.\n\n## Module Structure\n\n```\ndocs/02-architecture/\n├── adr-002-feature-registry.md          # Feature Registry ADR\n├── data-layer-decision-record.md        # Data layer architecture decision\n├── multi-agent-v1-technical-design.md   # Multi-agent platform design\n├── project-rules.md                     # Project-wide rules and conventions\n├── routing-state-migration-plan.md      # Route rendering & state management plan\n├── state-machine-design.md              # State machine specifications\n├── structured-standard-library.md       # Standard library modeling\n├── task-tree-modeling.md                # Task tree architecture\n└── template-data-contract.md            # Template data contract baseline\n```\n\n## Core Documents\n\n### 1. Architecture Decision Records (ADRs)\n\n#### ADR-002: FeatureRegistry\n**File:** `adr-002-feature-registry.md`\n\nIntroduces a centralized page registration pattern to eliminate scattered configuration across multiple files. The `FeatureConfig` type and `FEATURE_REGISTRY` array consolidate page registration into a single location.\n\n**Key components:**\n- `FeatureConfig` type — defines page metadata (page identifier, path, component, label, category)\n- `FEATURE_REGISTRY` array — single source of truth for page registration\n- Automatic derivation of page category arrays (`SIMPLE_PAGES`, `PARAM_PAGES`, etc.)\n\n**Impact:** Reduces new page setup from 6 steps to 2 steps (registry entry + route parsing branch).\n\n#### ADR-001: Data Layer Architecture\n**File:** `data-layer-decision-record.md`\n\nDefines the dual-write persistence strategy for the MVP phase. Adopts **Scheme C (layered writes)** where:\n\n- **Zustand persist middleware** handles automatic local persistence for routine state changes\n- **projectRepository** handles manual persistence for critical business operations (project creation, status transitions, milestone syncs)\n- **auditRepository** independently records operational traces\n\n**Architecture flow:**\n```\nUser Action → Zustand Store (memory)\n                    ↓\n        ┌───────────┴───────────┐\n        ↓                       ↓\nZustand persist          projectRepository\n(auto, all changes)      (manual, critical ops)\n        ↓                       ↓\n  localStorage            localStorage + remote\n```\n\n### 2. Technical Design Documents\n\n#### Multi-Agent Platform V1\n**File:** `multi-agent-v1-technical-design.md`\n\nBlueprint for a multi-agent store construction management platform. Defines:\n\n- **7 Agent types:** Customer Service, Brand Requirements, Project Manager, Resource Dispatch, Resource Execution, Quality Inspection, Settlement Reconciliation\n- **Agent Runtime:** Registry, Prompt Template Center, Tool Router, Context Builder, Decision Logger, Fallback Handler\n- **Architecture layers:** Frontend → API Gateway → Business Services → Agent Orchestration → Data Layer → External Capabilities\n- **Key principle:** Agents are controlled node capabilities, not autonomous systems. All agent outputs must be structured JSON.\n\n#### State Machine Design\n**File:** `state-machine-design.md`\n\nComprehensive state machine specifications for all core business objects:\n\n| Object | States | Key Transitions |\n|--------|--------|-----------------|\n| Project | 9 states | `待立项 → 待确认 → 待拆解 → 执行中 → 待验收 → 待结算 → 已归档` |\n| Task | 10 states | `草稿 → 待分配 → 待执行 → 执行中 → 待提交 → 待验收 → 已完成` |\n| Purchase | 8 states | `待申请 → 待审批 → 待下单 → 待到货 → 已到货` |\n| Acceptance | 8 states | `待申请 → 待初验 → 初验通过/不通过 → 整改中 → 待复验 → 复验通过` |\n| Settlement | 5 states | `待生成建议 → 待审核 → 待确认 → 已完成` |\n| Asset Archive | 5 states | `待登记 → 待验收归档 → 已归档` |\n| Ticket | 5 states | `待分发 → 处理中 → 待回告 → 已关闭` |\n\nEach state machine defines:\n- Guard conditions for transitions\n- Cross-object linkage rules\n- Audit requirements\n- Agent participation boundaries\n\n#### Task Tree Modeling\n**File:** `task-tree-modeling.md`\n\nDefines the task execution model with 4-layer hierarchy:\n\n```\nProject (WBS root)\n  └── Work Package (cost aggregation)\n        └── Task (atomic execution unit)\n              └── Sub-task (optional coordination)\n```\n\n**Key concepts:**\n- Tasks are the smallest executable units\n- Work packages map to cost accounts\n- Services are outsourced work packages with contracts\n- Standard bindings and snapshots ensure traceability\n- Result objects (purchase orders, acceptance reports, etc.) are separate from tasks\n\n#### Standard Library Structure\n**File:** `structured-standard-library.md`\n\nModels standards as structured, computable objects rather than documents:\n\n```\nStandard Source → Standard Document → Standard Clause → Rule Item → Execution/Acceptance Standard → Standard Package → Task Binding → Standard Snapshot\n```\n\n**V1 scope:** Focuses on execution standards and acceptance standards as directly referenceable objects for task templates. Full source-to-clause pipeline reserved for V2.\n\n### 3. Project Rules & Contracts\n\n#### Project Rules\n**File:** `project-rules.md`\n\nEstablishes mandatory rules across all development areas:\n- **Business modeling:** Object layering (project → task → standard → result object)\n- **State machines:** Unified status definitions and guard rules\n- **UI implementation:** Shared sidebar/header components, consistent design system\n- **Coding standards:** TypeScript strict mode, engineering comments, directory conventions\n- **Agent governance:** Controlled node capabilities, audit requirements\n- **Security:** RBAC, data isolation, audit trails\n\n#### Template Data Contract\n**File:** `template-data-contract.md`\n\nDefines the structured contract between template management and task instantiation:\n\n- **Project template:** Defines project container initialization (phases, milestones, standard context)\n- **Task template:** Defines task node structure, dependencies, role assignments, standard bindings\n- **Instance fields vs. template fields:** Clear separation — runtime fields (status, actual dates, progress) are not stored in templates\n- **Versioning:** Semantic versioning with compatibility policies (`x.0.0` breaking, `1.x.0` backward-compatible)\n\n### 4. Migration Plans\n\n#### Routing & State Management\n**File:** `routing-state-migration-plan.md`\n\nProposes migrating from 17 hardcoded if/else branches in `App.tsx` to a configuration-driven `AppRouter` component:\n\n**Target architecture:**\n```\nHash Change → routes.ts (parse) → AppRoute\n                                    ↓\n                            AppRouter.tsx\n                                    ↓\n                        pageComponentRegistry\n                                    ↓\n                            propsMapper\n                                    ↓\n                            Page Component\n```\n\n**State management cleanup:** Removes redundant `useEffect` persistence in `App.tsx`, relies entirely on Zustand persist middleware. Extracts business actions into `projectActions.ts`.\n\n## Architecture Principles\n\n1. **State-driven flow:** Business processes are governed by state machines, not ad-hoc coordination\n2. **Single source of truth:** Each data element has one authoritative owner\n3. **Controlled agents:** Agents operate within defined boundaries with structured outputs\n4. **Audit everything:** All critical operations leave traceable records\n5. **Template-driven instantiation:** Projects and tasks are generated from templates, not created manually\n6. **Separation of concerns:** Tasks execute, result objects accumulate, standards guide\n\n## Relationship to Codebase\n\nThe architecture documents connect to the codebase through:\n\n| Document | Code References |\n|----------|----------------|\n| ADR-002 | `src/config/routes.ts`, `src/config/navigation.ts` |\n| ADR-001 | `src/store/projectStore.ts`, `src/services/repositories/projectRepository.ts`, `src/App.tsx` |\n| State Machine | `src/domain/projectStatusMachine.ts` |\n| Project Rules | `src/components/layout/*`, `src/domain/*`, `src/data/*` |\n| Template Contract | Standard management module, task center module |\n\n## Maintenance\n\n- ADRs are reviewed quarterly or when significant architectural changes occur\n- State machine specifications must be updated when new states or transitions are added\n- Template data contract serves as the integration baseline between standard management and task center modules\n- Project rules are reviewed bi-weekly for drift between implementation and documented rules","archived-legacy-documents":"# Archived & Legacy Documents\n\n# Archived & Legacy Documents Module\n\n## Overview\n\nThe **Archived & Legacy Documents** module (`docs/99-archive/`) serves as the historical record and design foundation for the Chain Store Construction Management System. It contains superseded design specifications, product planning documents, and architectural blueprints that document the system's evolution from concept through V1 MVP implementation.\n\nThis module is **read-only reference material** — it captures design decisions, modeling approaches, and product strategies that informed the current codebase but are no longer actively maintained.\n\n## Module Contents\n\n### 1. Design Specification (v2.0 Original)\n\n**File:** `DESIGN_SPECIFICATION_v2.0_original.md`\n\nThis is the complete design system specification for the Liquid Glass + Material Design 3 UI framework. It defines:\n\n- **Design System Foundation:** Color system (brand blue `#154DD9`, semantic colors, glass effects), typography (font families, sizes, weights), spacing system (4px base unit), border radius and shadow system\n- **Component Library:** Button variants (primary, secondary, destructive, ghost, icon), card types (stat, project, kanban), form components (input, search, textarea, select), badges and tags, progress bars\n- **Page Specifications:** Layout structure, primary page templates, stat card modules, toolbar design, view modes (grid/list/kanban/map/calendar), data filtering and pagination\n- **Interaction & Animation:** Hover states, transitions (200ms standard), scaling effects, loading animations\n- **Implementation Guide:** Component usage rules, code examples, compliance checklist, page compliance tracking\n\n**Key Design Tokens:**\n```css\n--brand-primary: #154dd9;\n--bg-primary: #030b1a;\n--bg-secondary: #0a2363;\n--glass-bg-light: rgba(255, 255, 255, 0.04);\n--text-primary: rgba(255, 255, 255, 1);\n--border-primary: rgba(255, 255, 255, 0.08);\n```\n\n### 2. Product Planning Document (Legacy Chinese)\n\n**File:** `legacy-chinese/产品规划文档.md`\n\nThis document defines the V1/MVP product strategy for the multi-agent store construction management platform. It covers:\n\n- **System Positioning:** A standardized store construction management system for brand operations departments\n- **Core Value Proposition:** \"Give professional construction capabilities to the system, leave brand energy for the brand\"\n- **Business Domains:** Project management, standard management, procurement management, asset management\n- **Core Modeling:** Task tree model (task as minimum execution unit), project/process/service unified view, result object model\n- **Module Priorities:** P0 (workbench, project management, task center, standard management, procurement, acceptance, asset management, personnel, system settings), P1 (contract settlement, data center, work order), P2 (resource portal, platform commercialization)\n- **Version Roadmap:** V1.0 MVP → V1.5 Enhanced → V2.0 Platform\n- **Agent Planning:** 7 business agents (brand requirements, project manager, dispatch, acceptance/quality, settlement, customer service)\n\n### 3. Task Center Requirements (Legacy Chinese)\n\n**File:** `legacy-chinese/任务中心需求文档.md`\n\nDetailed requirements for the task center module — the system's execution backbone. Covers:\n\n- **Module Positioning:** Execution mainline control console connecting project containers, standard library, resource dispatch, acceptance, and result objects\n- **Business Objects:** Task, parent task, sub-task, task relation, execution checklist, task submission, task reminder, blocked/derived task records\n- **Task Structure:** 4-layer hierarchy (project root → stage → work package → execution task), inheritance rules, dependency management\n- **Standard Binding:** Execution standards (how to do), acceptance standards (how to pass), standard snapshots\n- **State Machine:** 9 states (pending creation → pending assignment → pending execution → executing → pending submission → pending acceptance → failed → completed → closed)\n- **Page Structure:** Task center homepage, dispatch pool, task detail page, relationship view, calendar view\n- **Permissions:** Brand isolation, project scope isolation, resource provider isolation, minimum privilege principle\n\n### 4. Task Tree Modeling (Legacy Chinese)\n\n**File:** `legacy-chinese/任务树建模说明.md`\n\nArchitectural specification for the task tree model — the system's core execution model. Defines:\n\n- **Modeling Principles:** Atomicity, hierarchy, standardization, state-driven, result separation, auditability, controlled complexity\n- **Core Objects:** Task, parent task, sub-task, task relation (parent_child, depends_on, derived_from, relates_to), task template, standard snapshot\n- **Hierarchy Model:** Single-parent tree structure + task relation extension (not mixing tree with network relationships)\n- **State Model:** 9 standard states with guard conditions for each transition\n- **Standard Binding:** 4 binding levels (template → task generation → task creation → execution snapshot)\n- **Auto-generation Logic:** Template + rules + agent suggestions + human confirmation\n- **Agent Collaboration:** Constrained node capabilities only, no unbounded decision-making\n- **V1 Boundaries:** Single project only, single parent task, no cross-project sharing, no circular dependencies\n\n### 5. V1 PRD (Legacy Chinese)\n\n**File:** `legacy-chinese/多Agent建店管理平台_V1_PRD.md`\n\nProduct requirements document for the V1 MVP. Defines:\n\n- **Project Definition:** Multi-agent store construction management platform replacing standardized manual positions with 7 agents\n- **System Scope:** Brand portal, resource dispatch platform, resource provider portal\n- **Agent Roles:** Customer service (FAQ, ticket creation), brand requirements (structured intake), project manager (auto-progression), dispatch (resource matching), execution (task guidance), acceptance (quality check), settlement (reconciliation)\n- **Core Business Flows:** Requirements intake → project creation → task decomposition → dispatch → execution → acceptance → settlement\n- **State Machines:** Project (10 states), task (8 states), ticket (4 states), acceptance (6 states), settlement (5 states)\n- **Success Metrics:** 40%+ auto-response rate, 60%+ auto-completion rate, 30%+ auto-dispatch coverage, 50%+ auto-inspection coverage\n- **Exception Handling:** 10+ conditions requiring human intervention\n\n### 6. V1 Technical Architecture (Legacy Chinese)\n\n**File:** `legacy-chinese/多Agent建店管理平台_V1_技术方案.md`\n\nTechnical architecture draft for V1. Covers:\n\n- **Architecture Layers:** Frontend apps → API gateway → business services → agent orchestration layer → data layer → external capabilities\n- **Design Principles:** Business state separate from agent state, process-driven (not agent free-form), all agent actions auditable, rules configurable\n- **System Split:** Modular monolith recommended for V1 (auth, project, task, dispatch, resource, acceptance, settlement, ticket, agent modules)\n- **Agent Runtime:** Registry, prompt template center, tool router, context builder, decision logger, fallback handler\n- **Agent Output:** All agent outputs must be structured JSON, not natural language\n- **Workflow Engine:** Event-driven + process node orchestration (auto nodes, agent nodes, human approval nodes, notification nodes, exception branches)\n- **Rule Engine:** Configurable dispatch rules, escalation rules, acceptance rules, settlement rules\n- **Database Design:** 16+ core tables with separation of business state and agent logs\n- **Tech Stack Recommendations:** Java/Spring Boot or Node.js/NestJS, React/TypeScript frontend, PostgreSQL, Redis, Elasticsearch\n\n### 7. Standard Library Structure (Legacy Chinese)\n\n**File:** `legacy-chinese/标准库结构化说明.md`\n\nSpecification for structuring the standard library — the system's professional capability foundation. Defines:\n\n- **Modeling Purpose:** Transform standards from documents into computable, referenceable, bindable, traceable structured objects\n- **8-Layer Hierarchy:** Standard source → document → clause → rule item → execution/acceptance standard → package/template → task binding/checklist → standard snapshot\n- **Core Objects:** Standard source (7 types), standard document, standard clause (with structured dimensions), rule item (7 categories), execution standard, acceptance standard, standard package, template, standard snapshot\n- **Clause Structuring:** Extract applicable object, scene, action, constraints, thresholds, units, documentation requirements, acceptance methods, non-conformance consequences, risk levels\n- **Rule Item Expression:** Structured fields + simple expressions (not complex DSL)\n- **Standard Binding:** 6 binding levels with inheritance and override rules\n- **Snapshot Mechanism:** Generated at task execution start, acceptance order creation, rectification task creation, settlement basis freeze\n- **Version Governance:** 6 states (draft → review → pending effective → effective → deprecated → archived)\n- **AI Collaboration:** AI assists extraction and drafting, but human review required for all effective changes\n\n### 8. Standard Management Requirements (Legacy Chinese)\n\n**File:** `legacy-chinese/标准管理需求文档.md`\n\nDetailed requirements for the standard management module. Covers:\n\n- **Module Positioning:** Professional capability center driving task generation, execution guidance, acceptance judgment, and rectification closure\n- **Business Objects:** Standard source, standard document, standard clause, rule item, execution standard, acceptance standard, standard package, template binding, standard snapshot\n- **Page Structure:** Standard center homepage, source management, document/clause structuring, rule item management, execution/acceptance standard management, package/template center, snapshot query\n- **State Machine:** Document parsing states (6), clause/rule item states (6), with guard conditions for each transition\n- **Permissions:** Brand admin (own brand only), platform admin (cross-brand), read-only (project managers, resource providers)\n- **Standard Change Impact:** Pre-publish impact analysis showing template references, task type usage, in-flight project references, existing snapshots\n\n## Architecture Diagram\n\n```mermaid\ngraph TD\n    subgraph \"Archived Documents\"\n        DS[DESIGN_SPECIFICATION_v2.0]\n        PP[产品规划文档]\n        TC[任务中心需求文档]\n        TT[任务树建模说明]\n        PRD[V1_PRD]\n        TA[V1_技术方案]\n        SL[标准库结构化说明]\n        SM[标准管理需求文档]\n    end\n\n    subgraph \"Document Relationships\"\n        PP --> PRD\n        PP --> TT\n        PP --> SL\n        TT --> TC\n        SL --> SM\n        PRD --> TA\n    end\n\n    subgraph \"Current Codebase Mapping\"\n        DS --> UI[UI Components & Design System]\n        TC --> TaskModule[Task Center Module]\n        SM --> StandardModule[Standard Management Module]\n        TT --> TaskModel[Task Tree Data Model]\n        TA --> Architecture[System Architecture]\n    end\n```\n\n## Key Design Decisions Documented\n\n1. **Task as Minimum Execution Unit:** All work decomposes to atomic tasks with clear ownership, standards, and acceptance criteria\n2. **Single-Parent Tree + Relation Extension:** Primary structure uses `parent_task_id`; non-hierarchical relationships use separate `task_relation` table\n3. **Standard-First Approach:** Standards must be structured before automation; execution and acceptance standards are separate objects\n4. **Agent as Constrained Node Capability:** Agents operate within workflow nodes, not as autonomous systems; all actions auditable\n5. **Result Object Separation:** Tasks drive execution; result objects (purchase orders, acceptance reports, asset records) independently persist outcomes\n6. **Snapshot Mechanism:** Standards version frozen at task execution start to prevent scope creep from standard updates\n7. **Modular Monolith for V1:** Business logic in modules, not microservices, to reduce MVP complexity\n\n## Usage Notes\n\n- This module is **reference only** — do not modify these documents for current development\n- The design specification (v2.0) is the authoritative source for the Liquid Glass design system currently implemented\n- Product planning and PRD documents provide context for why features exist as they do\n- Technical architecture document may be outdated; consult current `DEVELOPMENT_GUIDE.md` for active architecture decisions\n- Chinese-language documents contain the most detailed requirements; English summaries are provided in this documentation","customer-facility-management":"# Customer & Facility Management\n\n# Customer & Facility Management Module\n\n## Overview\n\nThe Customer & Facility Management module provides two primary management interfaces within the application: a customer management page for tracking retail brand clients and a facility management page for monitoring physical assets across store locations. Both pages follow a consistent design pattern using shared UI components while maintaining distinct data models and interaction patterns.\n\n## Module Structure\n\n```\nsrc/components/\n├── customer/\n│   ├── CustomerManagementPage.tsx\n│   └── customer-management-page.css\n└── facility/\n    ├── FacilityManagementPage.tsx\n    └── facility-management.css\n```\n\n## Customer Management Page\n\n### Purpose\n\nThe `CustomerManagementPage` component displays and manages retail brand customer records. It provides a searchable, filterable table view of customer data with status tracking, contract amounts, and project counts.\n\n### Data Model\n\n```typescript\ntype CustomerStatus = '合作中' | '洽谈中' | '暂停'\ntype CustomerLevel = 'S级' | 'A级' | 'B级'\n\ntype CustomerItem = {\n  shortName: string      // Single character avatar display\n  name: string           // Full brand name\n  contact: string        // Contact person with phone\n  industry: string       // Industry category\n  region: string         // Geographic region\n  stores: number         // Number of store locations\n  activeProjects: number // Currently active projects\n  contractAmount: string // Formatted contract value\n  level: CustomerLevel   // Customer tier\n  status: CustomerStatus // Current relationship status\n}\n```\n\n### Key Features\n\n- **Dual View Modes**: Toggle between card and list views using the view mode buttons\n- **Client-Side Filtering**: Filters customers by name, contact, industry, and region using `useMemo`\n- **Stats Overview**: Displays aggregate metrics (total customers, active, new, at-risk) via the shared `StatsCards` component\n- **Status & Level Badges**: Visual indicators with color-coded styling for customer tier and relationship status\n\n### State Management\n\nThe component uses two pieces of local state:\n\n```typescript\nconst [searchQuery, setSearchQuery] = useState('')\nconst [viewMode, setViewMode] = useState<CustomerViewMode>('list')\n```\n\nThe `searchQuery` drives a `useMemo` filter that performs case-insensitive matching across concatenated customer fields. The `viewMode` controls which rendering template is displayed (currently only the list view is implemented in the template).\n\n## Facility Management Page\n\n### Purpose\n\nThe `FacilityManagementPage` component manages physical facility assets across store locations. It provides a searchable table with status tracking, ownership assignment, and health scoring.\n\n### Data Model\n\n```typescript\ntype FacilityStatus = '运行正常' | '维护中' | '故障' | '离线'\n\ntype FacilityItem = {\n  id: string       // Unique facility identifier\n  name: string     // Facility display name\n  code: string     // System code (monospace display)\n  category: string // Equipment category\n  location: string // Store location\n  status: FacilityStatus\n  owner: string    // Responsible person\n  score: string    // Health rating (1-5 scale)\n}\n```\n\n### Key Features\n\n- **Top Navigation Tabs**: Three-tab navigation bar for switching between facility equipment, service orders, and inspection records (uses `navigateByHash` for routing)\n- **Dual Search Inputs**: Separate search fields in the header and table toolbar — the header search is currently unused for filtering, while the table search drives the filtered list\n- **Status Badges**: Four distinct status styles (ok, maintaining, fault, offline) with corresponding color schemes\n- **Health Scores**: Numeric ratings displayed with an icon prefix\n\n### State Management\n\n```typescript\nconst [headerSearchQuery, setHeaderSearchQuery] = useState('')\nconst [tableSearchQuery, setTableSearchQuery] = useState('')\n```\n\nThe `tableSearchQuery` drives filtering across facility name, code, category, location, and owner fields. The `headerSearchQuery` is maintained but not currently connected to filtering logic.\n\n## Shared Components\n\nBoth pages rely on these shared components from `../shared`:\n\n| Component | Usage |\n|-----------|-------|\n| `AppSidebar` | Navigation sidebar with current route highlighting |\n| `PageHeader` | Page title, subtitle, and search input |\n| `StatsCards` | Metric display cards with icons and color tones |\n\nThe `StatsCards` component accepts a `classNamePrefix` prop to scope its CSS classes (`pm` for customer, `fm` for facility), allowing each page to override styling independently.\n\n## Visual Design Patterns\n\nBoth pages share a common visual language:\n\n- **Glow Effects**: Fixed-position blurred circles (`cm-glow`, `fm-glow`) create ambient background lighting\n- **Gradient Stat Cards**: Each metric card uses a gradient background determined by its `tone` property\n- **Consistent Table Structure**: Both tables feature sticky headers, pagination footers, and action columns\n- **Responsive Layouts**: CSS media queries at 1200px/1024px and 768px breakpoints collapse grids and stack toolbar elements\n\n## Architecture Diagram\n\n```mermaid\ngraph TD\n    subgraph \"Customer Management\"\n        CMP[CustomerManagementPage]\n        CMP --> SHARED[Shared Components]\n        CMP --> CDATA[Customer Data Array]\n        CMP --> CFILTER[useMemo Filter]\n    end\n\n    subgraph \"Facility Management\"\n        FMP[FacilityManagementPage]\n        FMP --> SHARED\n        FMP --> FDATA[Facility Data Array]\n        FMP --> FFILTER[useMemo Filter]\n        FMP --> NAV[navigateByHash]\n    end\n\n    subgraph \"Shared Components\"\n        SHARED --> AS[AppSidebar]\n        SHARED --> PH[PageHeader]\n        SHARED --> SC[StatsCards]\n    end\n\n    NAV --> ROUTER[Hash Router]\n```\n\n## Integration Points\n\n- **Routing**: Both pages read `window.location.hash` to determine the active sidebar item. The facility page additionally uses `navigateByHash` for tab navigation to `#/orders` and `#/tasks`\n- **Asset Base**: Both pages define an `ASSET_BASE` constant pointing to `/assets/CodeBubbyAssets/` with unique subpaths for icon assets\n- **CSS Variables**: All styling relies on CSS custom properties prefixed with `--pm-` (e.g., `--pm-bg`, `--pm-primary`, `--pm-border`), ensuring theme consistency\n\n## Current Limitations\n\n- The customer page's card view mode is selectable but renders the same table content\n- The facility page's header search input does not affect the displayed data\n- Pagination is visual only — all data is rendered on a single page\n- Filter buttons (region, industry, more filters) are present but non-functional","database-prisma-schema":"# Database & Prisma Schema\n\n# Database & Prisma Schema Module\n\n## Overview\n\nThe Database & Prisma Schema module defines the persistent data layer for the multi-agent store construction management platform. It uses SQLite as the database engine with Prisma as the ORM and migration tool. The schema has evolved from a snapshot-based architecture (V1) to a fully normalized entity model (V2), eliminating generic JSON state tables in favor of structured relational tables.\n\n## Schema Architecture\n\nThe database consists of 15 models organized into logical groups:\n\n### Core Project Management\n\n| Model | Purpose | Key Fields |\n|-------|---------|------------|\n| `Project` | Store construction project | `code` (unique), `name`, `brand`, `parent_status`, `sub_status_json`, `status_tone`, `planned_open_date` |\n| `ProjectPhase` | Project lifecycle phases | `project_id`, `name`, `start_date`, `end_date`, `progress`, `status` |\n| `ProjectMilestone` | Key milestone tracking | `project_id`, `name`, `due_date`, `status`, `assignee`, `completed_date` |\n| `ProjectTask` | Task hierarchy (tree structure) | `project_id`, `code` (unique), `parent_id`, `node_level_type`, `priority`, `sla_status` |\n| `TaskRelation` | Task dependency graph | `from_task_id`, `to_task_id`, `relation_type` (finish_start, start_start, etc.) |\n| `ProjectRisk` | Risk register | `project_id`, `description`, `level`, `probability`, `impact`, `mitigation` |\n| `ProjectMember` | Team membership | `project_id`, `user_id`, `name`, `role`, `department`, `phone`, `email` |\n| `ProjectStatusLog` | Status transition audit trail | `project_id`, `type` (transition/hook), `from_status`, `to_status`, `reason` |\n\n### Template System\n\n| Model | Purpose | Key Fields |\n|-------|---------|------------|\n| `ProjectTemplate` | Reusable project blueprint | `template_id` (unique), `template_code` (unique), `phaseBlueprint` (JSON), `milestoneBlueprint` (JSON) |\n| `TaskTemplate` | Reusable task definition | `task_template_id` (unique), `template_level`, `dependencyBlueprint` (JSON), `childTemplateRefs` (JSON) |\n| `TemplateInstantiation` | Audit trail for template usage | `project_id`, `template_id`, `template_version`, `matchInput` (JSON), `outputSnapshot` (JSON) |\n\n### Procurement & Supplier Management\n\n| Model | Purpose | Key Fields |\n|-------|---------|------------|\n| `Supplier` | Vendor management | `code` (unique), `category`, `rating`, `availability_status`, `qualification_status`, `serviceAreas` (JSON) |\n| `ProductCategory` | Hierarchical product catalog | `code` (unique), `parent_id` (self-referencing), `supplierIds` (JSON) |\n\n### Infrastructure\n\n| Model | Purpose | Key Fields |\n|-------|---------|------------|\n| `AuditLog` | System-wide audit trail | `env_id`, `scene`, `detail`, `project_code`, `at` |\n| `IdempotencyKey` | Idempotent request tracking | `key` (PK), `scope`, `env_id`, `request_hash`, `response_status`, `expired_at` |\n\n## Key Design Decisions\n\n### 1. Migration from Snapshot to Entity Model\n\nThe initial V1 schema used generic snapshot tables (`project_state`, `task_state`, `acceptance_state`, `settlement_state`) storing full JSON blobs. These were removed in migration `20260428000746` in favor of structured fields. The `Project` model now has dedicated columns for `dispatch_status`, `execution_status`, `acceptance_status`, `settlement_status`, and their pending counts.\n\n### 2. Dual Status System\n\nProjects maintain both a legacy single `status` field (backward compatibility) and a new `parent_status` + `sub_status_json` combination. The `parent_status` represents the high-level lifecycle stage (e.g., \"启动\", \"执行\"), while `sub_status_json` stores granular progress as a JSON object conforming to `SubStatusProgress`.\n\n### 3. Task Tree Structure\n\nTasks support hierarchical organization through `parent_id` self-referencing and `node_level_type` (project_root, stage, work_package, task). The `ProjectTask` model includes 58 fields aligned with PRD requirements, with P0 fields (id, code, name, projectId, status, assigneeId, plannedStartAt, plannedEndAt, createdBy, createdAt) being mandatory.\n\n### 4. Task Dependency Graph\n\nThe `TaskRelation` model implements a directed graph for task dependencies using `from_task_id` → `to_task_id` with `relation_type` supporting four standard dependency types:\n- `finish_start` (FS)\n- `start_start` (SS)\n- `finish_finish` (FF)\n- `start_finish` (SF)\n\nA unique constraint on `[from_task_id, to_task_id, relation_type]` prevents duplicate dependency definitions.\n\n### 5. Template System\n\nTemplates are versioned entities (`template_version`) with lifecycle statuses (draft, reviewing, ready, active, inactive, deprecated). Complex configuration is stored as JSON columns:\n- `scopes`: Brand, store type, region, project type, and service scope filters\n- `phaseBlueprint` / `milestoneBlueprint`: Structured phase and milestone definitions\n- `taskTemplateBinding`: References to task templates\n- `dependencyBlueprint`: Task dependency rules between template codes\n- `standardBinding`: Links to execution/acceptance standards and checklist templates\n\n### 6. Idempotency\n\nThe `IdempotencyKey` model enables safe retry of API requests. Each key is scoped to an environment (`env_id`) and has an expiration time (`expired_at`). The `request_hash` allows detecting duplicate requests with identical payloads.\n\n## Entity Relationships\n\n```mermaid\nerDiagram\n    Project ||--o{ ProjectPhase : has\n    Project ||--o{ ProjectMilestone : has\n    Project ||--o{ ProjectTask : contains\n    Project ||--o{ ProjectRisk : tracks\n    Project ||--o{ ProjectMember : employs\n    Project ||--o{ ProjectStatusLog : logs\n    ProjectTask ||--o{ ProjectTask : \"parent-child\"\n    ProjectTask ||--o{ TaskRelation : \"predecessor\"\n    ProjectTask ||--o{ TaskRelation : \"successor\"\n    ProductCategory ||--o{ ProductCategory : \"parent-child\"\n    ProjectTemplate ||--o{ TemplateInstantiation : \"instantiated\"\n```\n\n## Seed Data\n\nThe `seed.ts` script populates the database with realistic test data:\n\n- **4 projects**: Shanghai (PRJ-001), Hangzhou (PRJ-002), Beijing (PRJ-003), Shenzhen (PRJ-004)\n- **12 work packages**: Covering construction prep, electrical, fire safety, quality inspection, exterior work, MEP, furniture, branding, permits, and training\n- **12 tasks**: Nested under work packages with varied statuses (draft, pending, in-progress, completed, blocked, rejected)\n\nThe seed script handles the tree structure by first inserting all tasks with `parent_id = NULL`, then updating the `parent_id` in a second pass using an in-memory mapping from frontend IDs to database IDs.\n\n## Migration History\n\n| Migration | Date | Changes |\n|-----------|------|---------|\n| `20260424041405_init` | 2026-04-24 | Initial schema with snapshot tables |\n| `20260428000746_extend_task_fields` | 2026-04-28 | Removed snapshot tables, added task relations, extended task fields (58 fields), added brand/status_tone to projects |\n| `20260429020816_extend_wave1_templates_suppliers` | 2026-04-29 | Added template system (project_templates, task_templates), supplier management (suppliers, product_categories), template_instantiations |\n| `20260429025904_add_parent_status_fields` | 2026-04-29 | Added parent_status and sub_status_json to projects |\n\n## Configuration\n\nThe Prisma configuration (`prisma.config.ts`) specifies:\n- **Schema**: `prisma/schema.prisma`\n- **Migrations**: `prisma/migrations/`\n- **Database**: SQLite at `local-api/store/prisma.db`\n\nThe Prisma client is generated to `../src/generated/prisma` with `prisma-client-js` provider.\n\n## Usage Guidelines\n\n1. **Always use migrations** for schema changes — the `local-api/store/schema.sql` file is deprecated\n2. **Prefer structured fields** over JSON blobs for queryable data; use JSON columns only for complex nested configurations (template blueprints, scopes, dependency definitions)\n3. **Use the dual status system** for projects: update `parent_status` for lifecycle transitions and `sub_status_json` for granular progress\n4. **Maintain task tree integrity** by setting `node_level_type` appropriately and ensuring `parent_id` references exist\n5. **Leverage idempotency keys** for any mutation API that could be retried","digital-employee-settings":"# Digital Employee & Settings\n\n# Digital Employee & Settings Module\n\n## Overview\n\nThe Digital Employee & Settings module provides the user interface for managing AI-powered digital employees (agents), system configuration, and standard templates. It consists of three main sub-modules:\n\n- **Digital Employee Center** — Dashboard and management interface for AI agents\n- **System Settings** — Configuration management with publish workflow and audit trail\n- **Standard Management** — Template library for project and task templates with instantiation logic\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Digital Employee\"\n        DE[DigitalEmployeePage] --> Stats[StatsCards]\n        DE --> AgentCards[Agent Card Grid]\n        DE --> AgentList[Agent List View]\n        DE --> DesignPanel[Design Feature Panel]\n        EA[EngineerAssistantPage] --> Placeholder[Placeholder Page]\n    end\n\n    subgraph \"System Settings\"\n        SS[SystemSettingsPage] --> Stats2[StatsCards]\n        SS --> ListView[List View]\n        SS --> KanbanView[Kanban View]\n        SS --> AuditView[Audit View]\n    end\n\n    subgraph \"Standard Management\"\n        SMP[StandardManagementPage] --> Stats3[StatsCards]\n        SMP --> Table[Template Table]\n        STDP[StandardTemplateDetailPage] --> Stats4[StatsCards]\n        STDP --> PhaseList[Phase List]\n        STDP --> MilestoneGrid[Milestone Grid]\n        STDP --> InfoPanel[Info Panel]\n        TI[template-instantiation.ts] --> Data[standard-template.data.ts]\n        Data --> Types[template-contract.types.ts]\n    end\n\n    subgraph \"Shared Components\"\n        AppSidebar\n        PageHeader\n        StatsCards\n        ListToolbar\n        Pagination\n        EmptyState\n    end\n\n    DE --> AppSidebar\n    DE --> PageHeader\n    DE --> StatsCards\n    SS --> AppSidebar\n    SS --> PageHeader\n    SS --> StatsCards\n    SS --> ListToolbar\n    SS --> EmptyState\n    SMP --> AppSidebar\n    SMP --> PageHeader\n    SMP --> StatsCards\n    SMP --> ListToolbar\n    SMP --> Pagination\n    STDP --> AppSidebar\n    STDP --> PageHeader\n    STDP --> StatsCards\n```\n\n## Digital Employee Center\n\n### DigitalEmployeePage\n\nThe main dashboard for AI agent management. Displays six specialized agents with real-time metrics and dual-view (card/list) support.\n\n**Key Features:**\n- **Stats Cards** — Four KPI cards showing active agents, tasks processed, response time, and accuracy\n- **Agent Cards** — Six pre-configured agents with color-coded themes:\n  - Engineer Assistant (blue) — Construction monitoring\n  - Customer Manager (cyan) — Customer insights\n  - Procurement Specialist (orange) — Supply chain\n  - Contract Finance (green) — Contract risk\n  - Quality Audit (violet) — Quality monitoring\n  - Data Analyst (rose) — Analytics\n- **Search & Filter** — Client-side filtering across name, subtitle, description, and tags\n- **View Toggle** — Card grid (3 columns) and list table views\n- **Design Feature Panel** — Quick-access panel for template library, style presets, and field configuration\n\n**State Management:**\n```typescript\nconst [searchQuery, setSearchQuery] = useState('')\nconst [viewMode, setViewMode] = useState<'card' | 'list'>('card')\nconst [showDesignPanel, setShowDesignPanel] = useState(false)\n```\n\n**Computed Values:**\n- `filteredCards` — Memoized search results\n- `onlineCount` — Number of active agents\n- `avgAccuracy` — Average accuracy of filtered agents\n\n### EngineerAssistantPage\n\nA placeholder page for the Engineer Assistant agent detail view. Uses the same layout shell (`AppSidebar` + `PageHeader`) with a \"coming soon\" content area.\n\n## System Settings\n\n### SystemSettingsPage\n\nConfiguration management interface with three view modes and a publish workflow.\n\n**View Modes:**\n1. **List View** — Card-based list of configuration modules with status tags, risk indicators, and action buttons (diff, publish, rollback)\n2. **Kanban View** — Column-based layout grouped by publish status (draft, pending, published, rolled back)\n3. **Audit View** — Chronological audit trail of configuration changes\n\n**Configuration Module Properties:**\n- `id` — Unique module identifier (e.g., `SET-ORG-001`)\n- `name` — Module name\n- `scope` — Organizational scope\n- `owner` — Responsible person\n- `updatedAt` — Last update timestamp\n- `status` — Publish status: `草稿 | 待发布 | 已发布 | 已回滚`\n- `risk` — Risk level: `低 | 中 | 高`\n- `impact` — Impact description\n\n**Filtering:**\n- Search by name or module ID\n- Filter by stat card selection (all, draft, pending, risky)\n\n**Action Handlers:**\n- `handlePublish` — Confirms with impact analysis warning, then submits approval\n- `handleDiff` — Shows JSON diff for change comparison\n- `handleDangerAction` — Confirms rollback with danger warning\n\n## Standard Management\n\n### StandardManagementPage\n\nTemplate library for project and task templates with tab-based navigation.\n\n**Top Tabs:**\n- Standard Files (placeholder)\n- Project Templates\n- Task Templates\n\n**Template Data Model:**\n```typescript\ninterface StandardTemplateCatalogItem {\n  id: string\n  kind: 'project' | 'task'\n  name: string\n  version: TemplateVersion  // e.g., \"1.0.0\"\n  status: TemplateStatus    // draft | reviewing | ready | active | inactive | deprecated\n  listMeta: {\n    icon: string\n    iconTone: 'green' | 'purple' | 'blue' | 'cyan' | 'orange'\n    usageCount: number\n    updatedAt: string\n    owner: string\n    builtin?: boolean\n    category: string\n    description: string\n  }\n  projectTemplate?: ProjectTemplate\n  taskTemplate?: TaskTemplate\n}\n```\n\n**Table Columns:**\n- Template name (with built-in badge)\n- Category\n- Usage count\n- Last update (with owner)\n- Actions (view details, view tasks)\n\n### StandardTemplateDetailPage\n\nDetailed view for a single template, showing structure, relationships, and metadata.\n\n**Sections:**\n1. **Hero** — Template name, description, metadata (updated, creator, status, version)\n2. **Stats Cards** — Dynamic stats based on template type:\n   - Project: phase count, milestones, task bindings, standard package, usage\n   - Task: child templates, dependencies, execution/acceptance standards, usage\n3. **Tab Navigation** — Overview, Structure, Relationships, Roles, Standards\n4. **Structure Overview** — Phase list (project) or task info (task) with ordered items\n5. **Relationships** — Milestones (project) or dependencies (task)\n6. **Info Panel** — Category, source, creator, update time, usage stats\n7. **Default Roles** — Role list extracted from phase blueprints or task metadata\n8. **Related Templates** — Linked task templates or child template references\n\n**Data Flow:**\n```typescript\nconst templateItem = getStandardTemplateById(effectiveTemplateId)\nconst taskTemplateCatalog = getStandardTemplatesByKind('task')\nconst taskCodeNameMap = new Map(taskTemplateCatalog.map(item => \n  [item.taskTemplate!.taskTemplateCode, item.taskTemplate!.taskTemplateName]\n))\n```\n\n### Template Instantiation Logic\n\nLocated in `template-instantiation.ts`, this module provides the logic for converting template definitions into executable task seeds.\n\n**Key Functions:**\n\n```typescript\nfunction instantiateTaskSeedsFromProjectTemplate(\n  projectTemplate: ProjectTemplate,\n  taskTemplates: TaskTemplate[]\n): TemplateInstantiationResult\n```\n\n**Process:**\n1. Validates template status (blocks if not `active` or `ready`)\n2. Resolves task template bindings from the project template\n3. Collects dependency relationships between tasks\n4. Detects cyclic dependencies using topological sort\n5. Returns instantiated task seeds with:\n   - Template code and name\n   - Parent path for hierarchy\n   - Owner role\n   - Sort order\n   - Standard binding status\n   - Predecessor codes for dependency tracking\n\n**Diagnostics:**\n```typescript\ninterface TemplateInstantiationDiagnostics {\n  errors: string[]\n  warnings: string[]\n  blockedByStatus?: boolean\n  blockedTemplateCodes?: string[]\n}\n```\n\n### Data Layer\n\n**`standard-template.data.ts`** — In-memory data store with sample templates:\n- 3 project templates (standard store, flagship, renovation)\n- 4 task templates (site survey, lease sign, design approval, construction)\n\n**`template-contract.types.ts`** — Type definitions for the template domain:\n- `ProjectTemplate` — Full project template with phases, milestones, and task bindings\n- `TaskTemplate` — Task template with dependencies, standards, and child references\n- `TemplateInstantiationInput/Output` — Contracts for template instantiation\n- `TemplateAuditEvent` — Union type for audit events\n\n## Shared Components\n\nAll pages use these shared components from `../shared`:\n\n| Component | Usage |\n|-----------|-------|\n| `AppSidebar` | Navigation sidebar with current hash highlighting |\n| `PageHeader` | Page title, subtitle, search input, and action slots |\n| `StatsCards` | KPI card grid with optional active state and click handlers |\n| `ListToolbar` | View mode toggle, search, and action buttons |\n| `Pagination` | Page navigation controls |\n| `EmptyState` | Empty state placeholder with optional compact mode |\n\n## Navigation\n\nNavigation uses hash-based routing via `navigateByHash`:\n- `#/digital-employee` — Agent center\n- `#/engineer-assistant` — Engineer assistant detail\n- `#/settings` — System settings\n- `#/standards` — Standard management\n- `#/standards/templates/:id` — Template detail\n- `#/projects`, `#/contracts`, `#/procurement` — Agent launch targets\n\n## Styling\n\nEach sub-module has its own CSS file with responsive breakpoints:\n- **Desktop** (>1440px): 3-column card grid, full table layout\n- **Tablet** (1024-1439px): 2-column card grid, compact table\n- **Mobile** (<1024px): Single column, stacked layout, scrollable tables\n- **Small mobile** (<620px): Fully stacked list view\n\nCSS custom properties (e.g., `--pm-bg`, `--pm-primary`) provide theming consistency across all modules.","engineering-guides-plans":"# Engineering Guides & Plans\n\n# Engineering Guides & Plans Module\n\n## Overview\n\nThe Engineering Guides & Plans module provides the operational playbooks, technical plans, and quality assurance frameworks that govern the development process for the Chain Store Construction Management System. It serves as the bridge between product requirements and engineering execution, defining how code is written, tested, deployed, and maintained.\n\nThis module is not a single code component but a collection of living documents that encode engineering standards, development workflows, and technical debt management strategies. It ensures consistency across the codebase and enables the single-developer-plus-AI development model.\n\n## Module Structure\n\n```\ndocs/03-engineering/\n├── ai-testing-guide.md              # AI-assisted test generation workflow\n├── component-refactoring-plan.md    # Component consolidation roadmap\n├── development-guide.md             # Primary development handbook\n├── development-plan-v1.2.md         # Multi-phase engineering roadmap\n├── integration-guide.md             # Local integration testing guide\n├── phase1-handoff.md                # Phase 1 cold-start handoff document\n├── phase1.5/\n│   └── phase1.5-tech-debt-plan.md   # Technical debt cleanup plan\n├── regression-checklist.md          # Regression testing checklist\n└── release/\n    ├── feishu-publish-runbook.md    # Feishu publishing runbook\n    └── launch-checklist.md          # Phase 3 launch checklist\n```\n\n## Core Documents\n\n### 1. Development Guide (`development-guide.md`)\n\nThe primary entry point for developers. It covers:\n\n- **Quick Start**: Environment setup, project initialization, and available scripts\n- **Backend Development**: Express + Prisma + SQLite stack, API creation patterns\n- **Database Development**: Prisma schema design, migrations, and CRUD operations\n- **Frontend Development**: Component patterns, API client integration\n- **Design Compliance**: Color system, glassmorphism effects, animation standards\n- **Deployment**: Build process and production startup\n\n**Key patterns defined here:**\n- API client creation with error handling\n- Component development with Tailwind CSS\n- Route configuration and navigation consistency\n- Testing framework setup (Vitest + React Testing Library)\n\n### 2. Development Plan V1.2 (`development-plan-v1.2.md`)\n\nThe comprehensive engineering roadmap spanning 6 phases. It defines:\n\n- **Phase 1**: Foundation building — shared components, CSS variables, route centralization, database schema, API adapter layer, state machine integration, PMBOK 8-tab framework\n- **Phase 1.5**: Technical debt cleanup — page shell unification, CSS token governance, stat card consolidation, gradient tokenization, card extraction, MUI componentization\n- **Phase 2**: Standards & Projects — Gantt chart completion, standard library CRUD, clause structuring, template center, project initiation flow, 8-tab content filling, geo-information, calendar view, map view\n- **Phase 3**: Task Center — kanban drag-and-drop, task model refactoring, tree view, standard linkage, dependency management, guard conditions, rectification task derivation\n- **Phase 4**: Procurement, Resources & Assets — procurement lifecycle, acceptance workflow, work team management, asset archiving, settlement suggestions\n- **Phase 5**: Agents & Workbench — agent framework, brand requirements agent, project manager agent, acceptance agent, workbench homepage\n- **Phase 6**: Integration & Validation — end-to-end state machine testing, result object validation, demo preparation, data initialization\n\nEach phase includes task dependencies, acceptance criteria, and technical considerations.\n\n### 3. Component Refactoring Plan (`component-refactoring-plan.md`)\n\nA targeted plan to eliminate code duplication across the UI layer. It identifies:\n\n- **5 independent sidebar implementations** → unified `AppSidebar` component\n- **7+ stat card implementations** → unified `StatCard` component\n- **3 header implementations** → unified `PageHeader` component\n- **200+ hardcoded CSS values** → CSS variable system\n- **Scattered route configuration** → centralized `routes.ts`\n\nThe plan defines the new component architecture, props interfaces, and a phased replacement strategy.\n\n### 4. AI Testing Guide (`ai-testing-guide.md`)\n\nA workflow document for non-developers to drive AI-generated test coverage. It defines:\n\n- **Three-step process**: Generate coverage report → confirm scenarios → generate test code\n- **Prompt templates** for different scenarios (new module, existing module, code changes, non-core modules)\n- **Acceptance checklist** for product managers (no code reading required)\n- **Coverage report format** with function inventory, legal/illegal path matrices, and boundary conditions\n\n### 5. Phase 1.5 Tech Debt Plan (`phase1.5/phase1.5-tech-debt-plan.md`)\n\nA focused cleanup plan for remaining technical debt after Phase 1. It addresses:\n\n- **App.tsx route rendering hardcoding**: 17 if/else statements → `AppRouter` component\n- **Dual persistence**: Zustand `persist` middleware + manual `projectRepository.saveState` → single source\n- **Repository layer ambiguity**: Clear separation between API adapter and state management\n\n### 6. Integration Guide (`integration-guide.md`)\n\nOperational guide for local development and testing. It covers:\n\n- Environment setup and verification\n- Frontend-only vs. full-stack development modes\n- API endpoint verification and idempotency testing\n- Error simulation (network failure, idempotency conflicts)\n- Performance validation (FCP, LCP, bundle size)\n- Debugging techniques (log filtering, breakpoints, React DevTools)\n\n### 7. Regression Checklist (`regression-checklist.md`)\n\nA comprehensive checklist for validating system stability after changes. It covers:\n\n- **Functional regression**: All modules (project, task, personnel, procurement, etc.)\n- **Performance regression**: Load times, runtime performance, memory usage\n- **Test regression**: Unit tests, integration tests, build tests\n- **Error handling regression**: Network errors, validation errors, business errors, idempotency conflicts\n- **Compatibility regression**: Browsers, devices\n- **Security regression**: Data security, API security\n\n## Architecture & Data Flow\n\n```mermaid\nflowchart TB\n    subgraph \"Engineering Guides & Plans\"\n        DG[Development Guide]\n        DP[Development Plan V1.2]\n        CRP[Component Refactoring Plan]\n        ATG[AI Testing Guide]\n        TDP[Phase 1.5 Tech Debt Plan]\n        IG[Integration Guide]\n        RC[Regression Checklist]\n    end\n\n    subgraph \"Consumed By\"\n        DEV[Developers]\n        AI[AI Coding Assistant]\n        PM[Product Managers]\n        QA[QA Engineers]\n    end\n\n    subgraph \"Drives\"\n        CODE[Code Standards & Patterns]\n        TEST[Test Coverage & Strategy]\n        DEPLOY[Deployment Process]\n        REFACTOR[Refactoring Roadmap]\n    end\n\n    DG --> DEV\n    DP --> DEV\n    DP --> AI\n    CRP --> DEV\n    CRP --> AI\n    ATG --> P
