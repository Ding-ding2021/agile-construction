M\n    ATG --> AI\n    TDP --> DEV\n    TDP --> AI\n    IG --> DEV\n    IG --> QA\n    RC --> QA\n\n    DEV --> CODE\n    AI --> CODE\n    PM --> TEST\n    AI --> TEST\n    QA --> TEST\n    DEV --> DEPLOY\n    QA --> DEPLOY\n    DEV --> REFACTOR\n    AI --> REFACTOR\n```\n\n## Key Design Decisions\n\n### Single-Developer + AI Model\n\nThe entire engineering plan is optimized for a workflow where one developer collaborates with an AI coding assistant. Key implications:\n\n- **Phase 1 prioritizes debt cleanup** before feature development, ensuring the AI can work with a clean codebase\n- **Component contracts** are explicitly defined so AI can generate consistent code\n- **Test-first approach** via the AI Testing Guide ensures quality without manual test writing\n- **Documentation as code** — all plans are living documents updated alongside code changes\n\n### Technical Debt Management\n\nThe module treats technical debt as a first-class concern:\n\n- **Debt inventory** is maintained in `development-plan-v1.2.md` with severity ratings\n- **Phase 1.5** is dedicated entirely to debt cleanup before Phase 2 feature development\n- **CSS tokenization** eliminates hardcoded values across 200+ locations\n- **Component consolidation** reduces 5+ implementations to single shared components\n\n### State Machine-Driven Architecture\n\nThe development plan is organized around state machines:\n\n- **Project state machine**: 8 states with guard conditions\n- **Task state machine**: 6 states with dependency validation\n- **Procurement state machine**: 5 states\n- **Acceptance state machine**: 6 states\n- **Asset state machine**: 3 states\n- **Settlement state machine**: 4 states\n\nEach phase builds on the state machine foundation, ensuring consistent behavior across the system.\n\n## Integration Points\n\nThe Engineering Guides & Plans module connects to:\n\n| Document | Connects To | Purpose |\n|----------|-------------|---------|\n| Development Guide | `docs/00-governance/design-specification.md` | Design compliance enforcement |\n| Development Plan | `docs/01-product/product-roadmap-v1.2-draft.md` | Feature roadmap alignment |\n| Development Plan | `docs/02-architecture/state-machine-design.md` | State machine implementation |\n| Component Refactoring Plan | `docs/00-governance/coding-standards.md` | Code organization standards |\n| Component Refactoring Plan | `docs/00-governance/design-checklist.md` | UI component development checklist |\n| Integration Guide | `src/services/api/client.ts` | API client implementation |\n| Integration Guide | `src/services/repositories/` | Data layer abstraction |\n| AI Testing Guide | `src/domain/` | Domain logic test coverage |\n| Regression Checklist | All `src/` modules | System-wide validation |\n\n## Maintenance Guidelines\n\n1. **Update plans when code changes**: Every code modification should trigger a review of affected engineering documents\n2. **Phase transitions require validation**: Each phase must pass the quality gates defined in `development-plan-v1.2.md` §7.3\n3. **Debt tracking is continuous**: New technical debt should be added to the debt inventory in `development-plan-v1.2.md`\n4. **Test coverage follows the AI Testing Guide**: Use the prompt templates for consistent AI-generated tests\n5. **Regression checklist runs after every change**: Ensures no regressions are introduced","figma-assets":"# Figma Assets\n\n# Figma Assets Module\n\n## Overview\n\nThe Figma Assets module stores and serves static HTML representations of UI screens exported from Figma design files. These assets are used as visual references for UI development, design review, and automated screenshot comparison tests. Each asset is a self-contained HTML file that reproduces a specific screen or component state as rendered in the Figma design tool.\n\n## Asset Structure\n\nEach Figma asset is stored in a directory under `public/assets/CodeBubbyAssets/` with a unique numeric identifier (e.g., `358_3`, `3923_1272`, `3923_861`). The directory contains:\n\n- `figma.html` — The exported HTML file containing the full screen layout\n- Referenced SVG and PNG files (e.g., `1.svg`, `53.png`) used as inline icons and images within the HTML\n\n## File Format\n\nThe `figma.html` files use absolute positioning with inline CSS to reproduce the exact pixel layout from Figma. Key characteristics:\n\n- **Fixed dimensions**: Each file declares a fixed viewport size (e.g., `2119px × 1235px`)\n- **Absolute positioning**: All elements use `position: absolute` with explicit `left`, `top`, `width`, and `height` values\n- **Inline styles**: No external CSS dependencies — all styling is embedded in `style` attributes\n- **Embedded assets**: SVG icons are embedded via `<img>` tags referencing local SVG files; raster images reference local PNG files\n- **Text rendering**: Text content uses `background-clip: text` with transparent color to achieve gradient text effects, with the actual text visible only through the background clip\n\n## Available Assets\n\n| Asset ID | Screen Description |\n|----------|-------------------|\n| `358_3` | Personnel Management screen — user list with search, filtering, pagination, and role badges |\n| `3923_1272` | Background overlay with blur effects (decorative only) |\n| `3923_861` | Project Detail screen — project overview, milestones, Gantt-style phases, key metrics, and activity feed |\n\n## Component Breakdown\n\n### Personnel Management Screen (`358_3`)\n\nThis asset represents a user administration interface with:\n\n- **Sidebar navigation**: 11 menu items including Workbench, Data Center, Project Management, Task Management, Contract Settlement, Procurement, Order Management, Facility Management, Standards Management, Personnel Management (active), and System Settings\n- **Top navigation tabs**: User List (active), Roles & Permissions, Audit Log\n- **Statistics cards**: Total Users (186), Active Users (142), Project Roles (4), External Collaborators (12)\n- **View toggle**: Grid/List view switcher\n- **Search and actions**: Search input, Add User button, Group, Sort, and Actions dropdowns\n- **Data table**: 8 sample user rows with columns for User (name + email), Role, Department, Projects, Status (active/inactive indicator), Last Login, and Actions\n- **Pagination**: 75 total records, page 1 of 8 with numbered page buttons\n\n### Project Detail Screen (`3923_861`)\n\nThis asset represents a project management dashboard with:\n\n- **Breadcrumb navigation**: Project List > Shanghai Nanjing Road Flagship Store\n- **Project header**: Project name, code (SH-NJL-2024), search bar, notification bell, and admin dropdown\n- **Project summary card**: Status (In Progress), Manager (Zhang Wei), date range, team size (24 people), overall progress bar (65%)\n- **Tab navigation**: Overview (active), Gantt Chart, Tasks (7), Risks/Issues (2), Cost Control, Procurement (5), Documents (4), Members (8), Change Management (3), AI Engineer\n- **Phases & Milestones panel**: 6 project phases with progress bars (100%, 100%, 72%, 35%, 0%, 0%) and 5 key milestones with dates and assignees\n- **Project summary sidebar**: Budget (12.5M), Team (24 people), Task completion (78/120), Open risks (2)\n- **Recent activity feed**: 4 activity entries with timestamps (2 hours ago, 5 hours ago, 1 day ago, 3 days ago)\n\n## Usage\n\nThese assets are consumed by:\n\n1. **UI Development**: Developers reference the HTML to match pixel-perfect layouts during implementation\n2. **Design Review**: The assets serve as ground truth for visual comparison between implemented components and design specifications\n3. **Automated Testing**: Screenshot comparison tools use these files as baseline images for visual regression testing\n\n## Integration Points\n\nThe Figma Assets module has no runtime code dependencies — it is purely a static asset directory. Integration occurs through:\n\n- **File path references**: Components reference these assets by their directory path under `public/assets/CodeBubbyAssets/{id}/figma.html`\n- **Build pipeline**: The assets are included in the build output as static files and served by the web server\n- **Testing framework**: Visual regression tests load these HTML files in headless browsers for screenshot comparison\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[Figma Design Tool] -->|Export| B[figma.html + SVGs + PNGs]\n    B --> C[public/assets/CodeBubbyAssets/]\n    C --> D[UI Development]\n    C --> E[Design Review]\n    C --> F[Visual Regression Tests]\n    F --> G[Headless Browser]\n    G --> H[Screenshot Comparison]\n    H --> I[Test Pass/Fail]\n```\n\nThe module is a leaf node in the dependency graph — it has no internal or outgoing calls and receives no incoming calls from application code at runtime.","knowledge-base-project-context":"# Knowledge Base & Project Context\n\n# Knowledge Base & Project Context Module\n\n## Purpose\n\nThe Knowledge Base & Project Context module serves as the canonical reference for the Agile Construction Platform's technical stack, code patterns, and development conventions. It provides developers with a single source of truth for understanding how the codebase is structured, what patterns to follow, and how to interact with the OpenCode platform that orchestrates development tasks.\n\n## Module Structure\n\n```\ndocs/knowledge-base/03-project-specific/\n├── 01-current-tech-stack.md          # Technology stack & project structure\n├── 02-code-patterns.md               # Reusable code patterns & conventions\n├── 03-development-standards.md       # Development standards (referenced)\n└── 04-opencode-platform-reference.md # OpenCode agent & mode reference\n```\n\n## Key Components\n\n### 1. Technology Stack Reference (`01-current-tech-stack.md`)\n\nDocuments the current frontend architecture:\n\n| Layer | Technology | Purpose |\n|-------|-----------|---------|\n| Framework | React 18.x | UI framework |\n| Language | TypeScript 5.x | Type safety |\n| Build | Vite 5.x | Dev server & bundling |\n| Styling | TailwindCSS 3.x | Utility-first CSS |\n| UI Components | shadcn/ui | Base component library |\n| Charts | Recharts 2.x | Data visualization |\n| Routing | Hash Router | Client-side routing |\n\n**Project structure** follows a domain-organized layout:\n```\nsrc/\n├── components/     # UI components by domain\n├── domain/         # Business logic (state machines)\n├── data/           # Data layer & mocks\n├── hooks/          # Custom React hooks\n├── types/          # TypeScript type definitions\n├── lib/            # Utility functions\n└── main.tsx        # Application entry\n```\n\n**State management** currently uses React Hooks + Context with localStorage persistence. The module explicitly notes this as a temporary solution and recommends migrating to React Query for server state and Zustand for global state.\n\n### 2. Code Patterns (`02-code-patterns.md`)\n\nDefines six established patterns that developers must follow:\n\n#### State Machine Pattern\nThe `ProjectStatusMachine` in `src/domain/projectStatusMachine.ts` manages project lifecycle transitions with guard conditions:\n\n```typescript\n// States: DRAFT → PENDING_CONFIRM → PENDING_BREAKDOWN → IN_PROGRESS → PENDING_ACCEPTANCE → PENDING_SETTLEMENT → ARCHIVED\n// Guards prevent invalid transitions (e.g., cannot go to IN_PROGRESS without milestones)\n```\n\n#### Data Enhancement Pattern\nRaw mock data is transformed into enriched business models via `enhanceProject()` in `src/data/projects.ts`. This adds computed fields like `dispatchStatus`, `executionStatus`, and visual properties (`statusTone`, `statusLabel`).\n\n#### Selector Pipeline Pattern\nTask filtering follows a deterministic pipeline in `taskManagement.selectors.ts`:\n\n```\nfilter → search → advancedFilter → sort → paginate\n```\n\n#### Props Propagation Pattern\nPage-level state is lifted to `App.tsx` and passed down via props. This centralizes state but can lead to prop drilling in deep component trees.\n\n#### Domain Event Logging\nStatus transitions generate structured logs with operator, timestamp, and reason fields.\n\n#### Mock Data Factory\nFactory functions (`createMockProject`, `createMockTask`) generate test data with sensible defaults and override support.\n\n### 3. OpenCode Platform Reference (`04-opencode-platform-reference.md`)\n\nDocuments the development platform's agent architecture and task scheduling system:\n\n**Four Mental Modes:**\n\n| Mode | Agent | Use Case | Parallel |\n|------|-------|----------|----------|\n| Direct | Main Agent | Single-file edits | No |\n| Explore | `explore` subagent | Codebase search | Yes |\n| Librarian | `librarian` subagent | External API research | Yes |\n| Oracle | `oracle` subagent | Architecture decisions | No |\n\n**Four Agent Identities:**\n\n| Identity | Role |\n|----------|------|\n| Sisyphus | Requirements decomposition & task pushing |\n| Hephaestus | Senior engineer execution |\n| Prometheus | Planning & risk minimization |\n| Atlas | Master orchestration |\n\n**Task Scheduling Parameters:**\n\n- `category` — Domain-based model selection (recommended for development tasks)\n  - `visual-engineering` for UI/frontend (mandatory for visual tasks)\n  - `ultrabrain` for complex algorithms\n  - `deep` for end-to-end research + implementation\n  - `quick` for single-file fixes\n  - `writing` for documentation\n\n- `subagent_type` — Capability-based selection (specialized scenarios)\n  - `explore`, `librarian`, `oracle`, `metis` (pre-planning analysis), `momus` (plan review)\n\n**Critical Constraints:**\n- `category` and `subagent_type` are mutually exclusive\n- Subagent prompts must be ≥30 lines with 6 required sections\n- Visual tasks must use `visual-engineering` category\n- Explore always runs in background; task execution never does\n- Subagents are stateless — context is passed via `task_id`\n\n**Verification Protocol (4-Phase Critical QA):**\n1. Read code (`git diff --stat` + line-by-line review)\n2. Auto-check (LSP diagnostics + tests + build)\n3. Manual verification (run/open the change)\n4. Gate check (3 yes/no questions before approval)\n\n## Integration Points\n\nThe Knowledge Base module connects to the broader codebase through:\n\n1. **`AGENTS.md`** — References the tech stack and code patterns for agent task execution. The `Architecture Quick Reference` table maps domain concepts to source files.\n\n2. **`CLAUDE.md`** — Behavioral guidelines that complement the code patterns. The \"Surgical Changes\" and \"Simplicity First\" rules align with the module's emphasis on minimal, focused modifications.\n\n3. **`CODEBUDDY.md`** — Provides the runtime architecture overview that the knowledge base documents statically. Together they form a complete picture: static patterns (knowledge base) + dynamic execution (CODEBUDDY).\n\n4. **`opencode.json`** — References the OpenCode platform configuration, including agent modes and build prompts that the platform reference document explains.\n\n5. **`docs/README.md`** — The document index that catalogs all knowledge base files and their relationships to other documentation.\n\n## Usage Guidelines\n\n- **New developers** should start with `01-current-tech-stack.md` to understand the project structure, then study `02-code-patterns.md` before writing any code\n- **When implementing state transitions**, always use `canTransition()` guards — never modify `project.status` directly\n- **When adding new features**, follow the established patterns: state machine for workflows, selector pipelines for data processing, factory functions for test data\n- **When working with OpenCode**, reference `04-opencode-platform-reference.md` for correct agent mode selection and task scheduling parameters\n- **Before modifying any symbol**, run impact analysis as specified in `AGENTS.md` to understand the blast radius","local-api-backend":"# Local API Backend\n\n# Local API Backend Module\n\n## Overview\n\nThe Local API Backend is an Express-based HTTP server that provides a local development and testing backend for project management operations. It replaces the need for a remote API during development by offering CRUD endpoints for projects, tasks, milestones, phases, risks, members, status logs, and audit logs — all backed by a local SQLite database.\n\n**Key characteristics:**\n- Single-process, zero-dependency external services (no Redis, no remote DB)\n- Idempotency support for write operations to enable safe retries\n- SQLite with WAL mode for concurrent read performance\n- Schema managed via Prisma (schema.prisma as single source of truth)\n- Runs on port 3100 by default\n\n## Architecture\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                        server.ts                            │\n│  Express app setup, middleware registration, startup        │\n└──────────┬──────────────────────────────────────────────────┘\n           │\n           ▼\n┌─────────────────────────────────────────────────────────────┐\n│                     routes/index.ts                         │\n│  Central router: mounts all sub-routers under /api          │\n└──┬──────────┬──────────┬──────────┬──────────┬──────────────┘\n   │          │          │          │          │\n   ▼          ▼          ▼          ▼          ▼\n┌──────┐ ┌──────┐ ┌──────┐ ┌──────┐ ┌──────┐ ┌──────┐\n│Proj. │ │Tasks │ │Miles.│ │Phases│ │Risks │ │Members│\n│routes│ │routes│ │routes│ │routes│ │routes│ │routes │\n└──┬───┘ └──┬───┘ └──┬───┘ └──┬───┘ └──┬───┘ └──┬───┘\n   │        │        │        │        │        │\n   ▼        ▼        ▼        ▼        ▼        ▼\n┌─────────────────────────────────────────────────────────────┐\n│                    controllers/                              │\n│  Request handlers: parse input, call DB, return response    │\n└──────────────────────────┬──────────────────────────────────┘\n                           │\n                           ▼\n┌─────────────────────────────────────────────────────────────┐\n│                    store/sqlite.ts                          │\n│  Database connection management, initialization, cleanup    │\n└──────────────────────────┬──────────────────────────────────┘\n                           │\n                           ▼\n┌─────────────────────────────────────────────────────────────┐\n│                    SQLite (better-sqlite3)                  │\n│                    local-api/store/prisma.db                │\n└─────────────────────────────────────────────────────────────┘\n```\n\n## Core Components\n\n### 1. Server Entry Point (`server.ts`)\n\nInitializes the Express application, registers global middleware (CORS, JSON parsing), mounts routes under `/api`, and starts listening. On startup it also initializes the database and cleans up expired idempotency keys.\n\n```typescript\n// Key startup sequence\ninitDatabase()\ncleanupExpiredIdempotencyKeys()\napp.listen(PORT, ...)\n```\n\n### 2. Route Structure (`routes/`)\n\nThe route layer is organized by resource. Each sub-router is mounted under `/api` with project-scoped paths:\n\n| Router File | Mount Path | Endpoints |\n|---|---|---|\n| `projects.ts` | `/api/projects` | GET /, POST /, GET /:code, PUT /:code, DELETE /:code |\n| `tasks.ts` | `/api/projects/:code/tasks` | GET /, POST /, GET /tree, PUT /:taskId, DELETE /:taskId |\n| `milestones.ts` | `/api/projects/:code/milestones` | GET /, POST / |\n| `phases.ts` | `/api/projects/:code/phases` | GET /, POST / |\n| `risks.ts` | `/api/projects/:code/risks` | GET /, POST / |\n| `members.ts` | `/api/projects/:code/members` | GET /, POST / |\n| `logs.ts` | `/api/projects/:code/logs` | GET /, POST / |\n| `audit.ts` | `/api/audit/logs` | GET /, POST / |\n\nA cross-project task query is also available at `GET /api/tasks/all`.\n\n### 3. Controllers (`controllers/`)\n\nEach controller file exports request handler functions. They follow a consistent pattern:\n\n1. **Get database connection** via `getDatabase()`\n2. **Resolve project ID** from project code (throws `ApiError` with 404 if not found)\n3. **Execute SQL** using prepared statements\n4. **Return response** (JSON for reads, 201 for creates, 204 for deletes)\n\n**Common helper pattern** — `getProjectId()` appears in every project-scoped controller:\n\n```typescript\nfunction getProjectId(projectCode: string): number {\n  const db = getDatabase()\n  const project = db.prepare('SELECT id FROM projects WHERE code = ?').get(projectCode) as\n    | { id: number }\n    | undefined\n  if (!project) throw new ApiError('Project not found', 'NOT_FOUND', 404)\n  return project.id\n}\n```\n\n**Notable controller behaviors:**\n\n- **`projects.ts`** — `getProjectByCode` returns a full project detail including its phases, milestones, risks, and members in a single response. `updateProject` dynamically builds the SET clause from request body fields (excluding `code` to prevent key changes).\n- **`tasks.ts`** — `getTaskTree` builds a hierarchical tree from flat task rows using a recursive `buildTree` function. Tags are stored as JSON strings and parsed on read via `parseTagsField`.\n- **`logs.ts`** — Status logs use column aliasing (`from_status as fromStatus`) for camelCase responses.\n\n### 4. Middleware (`middleware/`)\n\n| Middleware | File | Purpose |\n|---|---|---|\n| `corsMiddleware` | `cors.ts` | Sets CORS headers, handles OPTIONS preflight |\n| `errorHandler` | `error.ts` | Catches `ApiError` instances for structured error responses; falls back to 500 for unexpected errors |\n| `notFoundHandler` | `error.ts` | Returns 404 for unmatched routes |\n| `idempotencyMiddleware` | `idempotency.ts` | Intercepts POST/PUT/PATCH/DELETE requests with `X-Idempotency-Key` header |\n\n**Error response format** (defined in `contracts.ts`):\n\n```json\n{\n  \"message\": \"Project not found\",\n  \"code\": \"NOT_FOUND\",\n  \"status\": 404,\n  \"timestamp\": \"2026-04-29T10:00:00.000Z\"\n}\n```\n\n### 5. Idempotency (`store/idempotency.ts`)\n\nThe idempotency system ensures that retrying a write request with the same key and body produces the same result without side effects.\n\n**Flow:**\n\n1. Middleware extracts `X-Idempotency-Key` header\n2. Computes SHA-256 hash of the request body\n3. Checks if a record exists for `(key, envId)` with matching hash\n4. If found: returns the cached response immediately\n5. If not found: wraps `res.json` to capture the response, then stores the record\n\n**Key details:**\n- TTL: 7 days (configurable via `IDEMPOTENCY_TTL_DAYS`)\n- Scope: request path (`req.path`)\n- Conflict detection: mismatched request hash returns `{ exists: false }` (logged as warning)\n- Concurrent inserts: handled gracefully with try/catch\n\n### 6. Database Layer (`store/sqlite.ts`)\n\nManages a single SQLite connection using `better-sqlite3`.\n\n**Key functions:**\n\n| Function | Purpose |\n|---|---|\n| `initDatabase()` | Creates connection, enables WAL mode and foreign keys |\n| `getDatabase()` | Returns existing connection or calls `initDatabase()` |\n| `closeDatabase()` | Closes connection (called on SIGINT) |\n| `cleanupExpiredIdempotencyKeys()` | Deletes expired idempotency records |\n| `resetDatabase()` | Truncates all tables (used in tests) |\n\n**Database file:** `local-api/store/prisma.db`\n\n### 7. Type Contracts (`contracts.ts`)\n\nDefines TypeScript interfaces for API request/response shapes:\n\n- `AuditLogInput` / `AuditLogRecord` — audit log payload and stored record\n- `IdempotencyRecord` — stored idempotency key data\n- `ApiErrorResponse` — standardized error shape\n- `createErrorResponse()` — factory function for error responses\n\n## Request/Response Patterns\n\n### List Resources (GET)\n\n```http\nGET /api/projects?envId=default\nResponse: 200\n[\n  { \"id\": 1, \"code\": \"P001\", \"name\": \"Test Project\", ... }\n]\n```\n\n### Create Resource (POST)\n\n```http\nPOST /api/projects/:code/tasks\nContent-Type: application/json\nX-Idempotency-Key: unique-key\n\n{ \"name\": \"Design Review\", \"status\": \"pending\" }\n\nResponse: 201\n{ \"id\": 42, \"projectId\": 1, \"name\": \"Design Review\", ... }\n```\n\n### Update Resource (PUT)\n\n```http\nPUT /api/projects/:code\nContent-Type: application/json\n\n{ \"status\": \"in_progress\", \"progress\": 50 }\n\nResponse: 200\n{ \"id\": 1, \"code\": \"P001\", \"status\": \"in_progress\", ... }\n```\n\n### Delete Resource (DELETE)\n\n```http\nDELETE /api/projects/:code\nResponse: 204 (no body)\n```\n\n## Seed Data\n\nThe `seed-templates.ts` script populates the database with:\n\n- **1 project template** — \"标准门店开店项目\" (standard store opening project) with 5 phases (选址, 合同, 设计, 施工, 验收) and 3 milestones\n- **4 task templates** — contract signing, design drawing, construction management, inspection\n\nRun via: `npx tsx local-api/seed-templates.ts`\n\n## Testing\n\nThe `test-api.sh` script exercises the core endpoints and idempotency mechanism. It tests:\n\n1. Health check\n2. Project state CRUD with idempotency replay\n3. Task state CRUD\n4. Acceptance state CRUD\n5. Settlement state read\n6. Audit log creation with idempotency\n\n## Environment Variables\n\n| Variable | Default | Description |\n|---|---|---|\n| `LOCAL_API_PORT` | `3100` | HTTP server port |\n| `VITE_API_BASE_URL` | `/api` | Frontend API base path |\n\n## Integration Points\n\n- **Frontend**: The API is consumed by the Vite dev server (port 5173) via proxy configuration. The frontend sends requests to `/api/*` which are proxied to `localhost:3100`.\n- **Prisma**: Database schema is managed by Prisma (`prisma/schema.prisma`). The SQLite database is created by `prisma db push` before the server starts.\n- **State migration**: The current implementation replaced an older `/state`-based approach with entity-specific endpoints. The README notes that old `/state` compatibility endpoints have been removed.","operations-phase-management":"# Operations & Phase Management\n\n# Operations & Phase Management Module\n\n## Overview\n\nThe Operations & Phase Management module provides strategic planning, technical debt management, and execution tracking for the multi-agent store construction management platform. It serves as the bridge between product vision and implementation, containing commercialization strategies, component system proposals, optimization plans, and phase-based development assessments.\n\n## Module Structure\n\n```\ndocs/04-operations/\n├── commercialization-roadmap-2026-04-25.md    # Monetization strategy (V1→V2.5)\n├── component-system-proposal-mui.md           # MUI-based UI component architecture\n├── four-page-optimization-plan.md             # Layout/component unification plan\n├── gantt-component-analysis.md                # Gantt chart implementation analysis\n├── gradient-token-migration-plan.md           # CSS gradient tokenization strategy\n├── market-trend-analysis-2026-04-25.md        # Industry/competitive analysis\n├── phase1/\n│   ├── development-progress-assessment-2026-04-25.md  # Phase 1 completion audit\n│   └── p1-p1.5-fix-plan-2026-04-25.md                 # Remediation plan for Phase 1 gaps\n```\n\n## Key Components\n\n### 1. Commercialization Roadmap (`commercialization-roadmap-2026-04-25.md`)\n\nDefines a four-stage monetization strategy:\n\n| Phase | Timeline | Revenue Model | Key Metric |\n|-------|----------|---------------|------------|\n| V1 (Value Validation) | 1-6 months | Free (internal system) | Closed-loop completion |\n| V1.5 (Value Monetization) | 6-12 months | Brand subscription (3-15万/year) | Paying brands (3-5) |\n| V2 (Platform Monetization) | 12-24 months | Transaction commission (2%) | GMV (6000万/year target) |\n| V2.5 (Data Monetization) | 24+ months | Data products/reports | Net profit positive |\n\n**Pricing logic**: Anchored to customer cost savings (20-50% of saved costs). Conservative V2 revenue estimate: 217万/year; optimistic: 684万/year.\n\n### 2. Component System Proposal (`component-system-proposal-mui.md`)\n\nProposes a three-layer architecture for UI components:\n\n```\n┌─────────────────────────────────────────┐\n│  Business Layer: PmButton / PmInput / PmTable │\n│  (src/components/shared/ui/)            │\n├─────────────────────────────────────────┤\n│  MUI Layer: Button / TextField / DataGrid    │\n│  (@mui/material)                        │\n├─────────────────────────────────────────┤\n│  Theme Layer: pmTheme (dark glassmorphism)   │\n│  (src/theme/pmTheme.ts)                 │\n└─────────────────────────────────────────┘\n```\n\n**Current status**: MUI is installed but unused (only 1 `InputLabel` usage). The codebase has 304+ button instances and 52+ input instances, all with custom CSS. The proposal recommends a 3-day phased migration.\n\n### 3. Four-Page Optimization Plan (`four-page-optimization-plan.md`)\n\nTargets four pages (Personnel, DigitalEmployee, ProcurementManagement, TaskManagement) for layout/component unification, using ProjectManagementPage as the baseline.\n\n**Key gaps identified**:\n- DigitalEmployeePage: Custom statCards (not using shared `StatsCards`)\n- PersonnelPage/ProcurementManagementPage: Custom tab navigation (not using shared `TabNav`)\n- TaskManagementPage: Custom toolbar (not using shared `ListToolbar`)\n\n**Execution**: 5 phases over 4 days, prioritizing project detail page layout fix first.\n\n### 4. Gantt Chart Analysis (`gantt-component-analysis.md`)\n\nEvaluates the existing 1,177-line self-implemented Gantt chart against external libraries (dhtmlx-gantt, gantt-task-react, frappe-gantt, syncfusion).\n\n**Conclusion**: Keep self-implemented, add 4 missing features (dependency lines, today marker, hover tooltip, time granularity switching). External libraries would require excessive CSS overrides to match the dark glassmorphism design.\n\n### 5. Gradient Token Migration (`gradient-token-migration-plan.md`)\n\nAddresses 73+ hardcoded `linear-gradient` instances across the codebase, categorized into 6 patterns:\n\n| Pattern | Occurrences | Example |\n|---------|-------------|---------|\n| Stat card backgrounds | ~20 | `linear-gradient(135deg, rgba(43,127,255,0.2) 0%, rgba(43,127,255,0.05) 100%)` |\n| Brand decorations | ~6 | Avatar gradients |\n| Button gradients | ~4 | Primary/accent buttons |\n| Progress bars | ~8 | 4 colors × 2 directions |\n| KPI backgrounds | ~8 | Semi-transparent overlays |\n| Modal/surface backgrounds | ~3 | Dark overlays |\n\n**Migration**: 4-phase approach (2 days total), adding CSS custom properties and semantic utility classes.\n\n### 6. Market Trend Analysis (`market-trend-analysis-2026-04-25.md`)\n\nComprehensive industry analysis covering:\n- **Market size**: 4.11万亿 building decoration industry, 800万 restaurant stores, 22% chain rate\n- **AI Agent trend**: Global AI Agent market > $2000亿 (2025), construction AI CAGR 24.8%\n- **Competitive landscape**: Fragmented market with no dominant player; existing competitors (拓店易, 建文软件) lack AI Agent capabilities\n- **Opportunity window**: 12-18 months to establish category leadership\n\n### 7. Phase 1 Assessment & Fix Plan (`phase1/`)\n\n**Development Progress Assessment** evaluates Phase 1 (infrastructure) and Phase 1.5 (visual unification) completion:\n\n| Phase | Completion | Blocking Issues |\n|-------|------------|-----------------|\n| Phase 1 | ~65% | Backend still in snapshot mode, CSS hardcoding, lint errors |\n| Phase 1.5 | ~40% | CSS token governance, gradient migration, MUI not started |\n\n**Fix Plan** organizes remediation into 4 waves:\n- **Wave 0**: Data layer strategy decision (entity tables vs snapshots)\n- **Wave 1**: Hotfixes (lint, old sidebar deletion, CSS cleanup) — 1-2 hours\n- **Wave 2**: Core debt clearance (CSS hardcoding, navigation config, localStorage cleanup) — 1-2 days\n- **Wave 3**: Deep governance (token compression, gradient migration, component extraction) — 2-3 days\n\n## Integration Points\n\nThe Operations module connects to the broader codebase through:\n\n1. **`src/config/routes.ts`**: Centralized routing (304 lines, 18 lazy-loaded pages)\n2. **`src/components/shared/`**: Shared UI components (32 files/directories)\n3. **`src/theme/`**: Design token system (148+ CSS custom properties)\n4. **`src/services/repositories/`**: Data access layer (7 repositories)\n5. **`prisma/schema.prisma`**: Database schema (226 lines)\n\n## Current State & Recommendations\n\n**Critical path forward**:\n1. Complete Wave 0-2 fixes before starting Phase 2 feature development\n2. Prioritize CSS hardcoding cleanup in `project-detail.css` (96 instances)\n3. Decide on data layer strategy (entity tables vs snapshots) — currently leaning toward entity tables\n4. Begin MUI component adoption with a pilot page (CustomerManagementPage recommended)\n\n**Risk factors**:\n- CSS technical debt continues to accumulate if new pages bypass design tokens\n- Data layer direction uncertainty blocks all downstream data-dependent tasks\n- Lint errors (164) mask real code quality issues","overview":"# agile-construction — Wiki\n\n# Agile Construction Platform\n\nThe **Agile Construction Platform** is a multi-agent store construction management system built with React, TypeScript, and Vite. It provides a complete project lifecycle management solution for retail chain store construction, from planning and procurement through execution and acceptance.\n\n## What It Does\n\nThe platform enables construction project managers to:\n\n- **Plan and track projects** using Gantt charts, WBS trees, and milestone tracking\n- **Manage personnel and resources** across multiple construction sites\n- **Handle procurement** through supplier management, purchase orders, and contract settlement\n- **Oversee task workflows** with role-based authorization and state transitions\n- **Manage customers and facilities** for retail brand clients and physical store locations\n- **Configure digital employees** (AI agents) and system settings\n\n## Architecture Overview\n\nThe system follows a modular architecture with clear separation of concerns:\n\n```mermaid\ngraph TD\n    subgraph \"Frontend (React + Vite)\"\n        AC[Application Core & Routing]\n        SUI[Shared UI Components]\n        PM[Project Management]\n        PR[Personnel & Resources]\n        TW[Task & Workflow]\n        PO[Procurement & Orders]\n        CF[Customer & Facilities]\n        DE[Digital Employee & Settings]\n    end\n\n    subgraph \"Data Layer\"\n        SA[Services & API Layer]\n        DB[(SQLite Database)]\n    end\n\n    subgraph \"Development\"\n        LA[Local API Backend]\n        TC[Testing & Configuration]\n    end\n\n    AC --> SUI\n    PM --> SA\n    PR --> SA\n    TW --> SA\n    PO --> SA\n    PM --> TW\n    PM --> PR\n    SA --> LA\n    LA --> DB\n    TC --> SA\n```\n\n### Key Modules\n\nThe **[Application Core & Routing](application-core-and-routing.md)** module initializes the React app with MUI theming and manages all client-side navigation via hash-based routing. It provides a configuration-driven system for rendering page components based on the current route.\n\nThe **[Shared UI Components](shared-ui-components.md)** module provides a reusable, themable component library with consistent data display, filtering, pagination, and feedback patterns using CSS custom properties.\n\nDomain-specific modules handle distinct business areas:\n- **[Project Management](project-management.md)** — Full project lifecycle with Gantt charts, WBS trees, and acceptance workflows\n- **[Personnel & Resource Management](personnel-and-resource-management.md)** — Workforce organization and resource allocation\n- **[Task & Workflow Management](task-and-workflow-management.md)** — Task lifecycle with role-based authorization\n- **[Procurement, Orders & Contracts](procurement-orders-and-contracts.md)** — Supplier management and purchase order tracking\n- **[Customer & Facility Management](customer-and-facility-management.md)** — Retail client and physical asset management\n- **[Digital Employee & Settings](digital-employee-and-settings.md)** — AI agent management and system configuration\n\nThe **[Services & API Layer](services-and-api-layer.md)** provides a structured communication bridge between UI components and data sources, implementing a three-tier architecture with API client, server adapter, and repositories.\n\n## Key End-to-End Flows\n\n**Project Acceptance Flow**: The `ProjectAcceptanceView` component orchestrates acceptance workflows by parsing progress pairs, creating milestones, and managing acceptance state transitions.\n\n**Task Management Flow**: Task CRUD operations flow from the UI through the Services & API Layer to the Local API Backend, which persists data to SQLite via Prisma.\n\n**Resource Allocation Flow**: Personnel management components interact with the Services & API Layer to allocate resources across projects, with data flowing through the same backend pipeline.\n\n## Development Setup\n\n```bash\n# Install dependencies\nnpm install\n\n# Start development server with local API\nnpm run dev\n\n# Start local API only\nnpm run local-api\n\n# Run tests\nnpm test\n\n# Build for production\nnpm run build\n```\n\nThe project uses a **[Local API Backend](local-api-backend.md)** (Express + SQLite) for development, eliminating the need for external services. The **[Database & Prisma Schema](database-and-prisma-schema.md)** defines 15 models organized into logical groups for project management, task tracking, and resource management.\n\n## Project Governance\n\nThe platform is guided by comprehensive documentation modules that define development standards, architectural decisions, and product requirements:\n- **[Project Governance & Standards](project-governance-and-standards.md)** — Code conventions and quality processes\n- **[Architecture & Technical Design](architecture-and-technical-design.md)** — System architecture and design patterns\n- **[Engineering Guides & Plans](engineering-guides-and-plans.md)** — Development workflows and technical plans\n- **[Product Requirements & Roadmaps](product-requirements-and-roadmaps.md)** — Product strategy and feature specifications","personnel-resource-management-components":"# Personnel & Resource Management — components\n\n# Personnel & Resource Management — Components Module\n\n## Overview\n\nThis module provides the UI components for managing personnel, projects, and resource pools within a construction project management system. It handles user listing, project creation, project visualization (list/grid/kanban/calendar/map), resource allocation, and detailed user profiles.\n\nThe module is organized into two main domains:\n- **Personnel components** (`src/components/personnel/`) — user management, project management views, and project creation\n- **Resource components** (`src/components/resource/`) — resource pool management for personnel and suppliers\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Personnel Domain\"\n        PersonnelPage --> PersonnelUserDetailPage\n        PersonnelPage --> InsightsPanel\n        PersonnelUserDetailPage --> personnelUsers\n        CreateProjectModeModal --> projectManagement.types\n        ProjectToolbar --> UserTable\n        UserTable --> ProjectListView\n        UserTable --> ProjectGridView\n        UserTable --> ProjectKanbanView\n        UserTable --> ProjectPlaceholderView\n        ProjectListView --> projectManagement.selectors\n        ProjectGridView --> projectManagement.selectors\n        ProjectKanbanView --> projectManagement.selectors\n    end\n\n    subgraph \"Resource Domain\"\n        ResourcePoolPage --> personnelRepository\n        ResourcePoolPage --> supplierRepository\n        ResourcePoolPage --> governanceRepository\n    end\n\n    subgraph \"Shared\"\n        AppSidebar\n        PageHeader\n        StatsCards\n        EmptyState\n    end\n\n    PersonnelPage --> AppSidebar\n    PersonnelPage --> PageHeader\n    PersonnelPage --> StatsCards\n    ResourcePoolPage --> AppSidebar\n    ResourcePoolPage --> PageHeader\n    ResourcePoolPage --> StatsCards\n```\n\n## Key Components\n\n### PersonnelPage\n\nThe main personnel management page. Displays a searchable, filterable table of all personnel users with status indicators (on-duty, leave, offboard, disabled), availability, and risk levels.\n\n**Props:**\n- `onUserOpen?: (userId: string) => void` — callback when a user row is clicked\n\n**State management:**\n- `searchQuery` — filters users by name, person code, mobile, role, org, team, or work city\n- `isInsightsOpen` — toggles the InsightsPanel sidebar\n\n**Data flow:**\n1. Loads `personnelUsers` array (mock data)\n2. Filters users based on `searchQuery` using `useMemo`\n3. Computes stats (total, onduty, assignable, highRisk) via `useMemo`\n4. Renders `StatsCards`, then a table with user rows\n5. Clicking \"查看详情\" navigates to `PersonnelUserDetailPage`\n\n### PersonnelUserDetailPage\n\nA detailed profile view for a single personnel user. Displays tabs for overview, projects, tasks, activities, and permissions.\n\n**Props:**\n- `userId: string` — the user to display\n- `onBack?: () => void` — navigation callback\n\n**Key features:**\n- Profile card with avatar, status chips, contact info, and KPI summary\n- Tabbed interface with 5 tabs: overview, projects, tasks, activities, permissions\n- Overview tab shows a two-column layout:\n  - Left column: skills/certifications, project list, task list\n  - Right column: risk warnings, work statistics, status change timeline, recent activity\n- Project list supports filtering by \"all\", \"current\", or \"history\"\n- Risk warnings are computed from user's risk level, critical task count, and certificate status\n\n**Data retrieval:**\n- `getPersonnelUserById(userId)` — returns user data\n- `getPersonnelUserDetailDataById(userId)` — returns detail data (projects, tasks, activities, status changes, stats)\n\n### CreateProjectModeModal\n\nA modal form for creating new projects. Collects minimal required information and validates before submission.\n\n**Props:**\n- `isOpen: boolean`\n- `submitting: boolean`\n- `errorMessage: string | null`\n- `onClose: () => void`\n- `onSubmit: (formData: CreateProjectFormData) => CreateProjectSubmitResult`\n\n**Validation rules:**\n- Required fields: projectName, storeName, storeType, city, projectType, projectOwner, plannedStartDate, plannedEndDate\n- Date validation: plannedEndDate must not be before plannedStartDate; plannedOpenDate must not be before plannedStartDate\n- Errors are cleared when the corresponding field is edited\n\n**Behavior:**\n- ESC key closes the modal (unless submitting)\n- Body scroll is locked while modal is open\n- On successful submit, form resets and modal closes\n\n### ProjectToolbar\n\nThe toolbar for the project management views. Provides view mode switching, search, grouping, filtering, sorting, and project creation.\n\n**View modes:** list, grid, kanban, calendar, map\n\n**Dropdown menus:**\n- Group by: none, stage, owner, brand\n- Filter: project stage, project status, risk-only toggle\n- Sort: default, name A-Z, progress descending, planned open date, risk priority\n\n**Click-outside behavior:** All dropdowns close when clicking outside their container.\n\n### UserTable (Project Management Orchestrator)\n\nThe main content orchestrator for project management. Renders the toolbar and the appropriate view component based on the current `viewMode`.\n\n**Props:**\n- All toolbar props (viewMode, searchQuery, filters, etc.)\n- `projects: ProjectItem[]` — the filtered/sorted project list\n- `pagination: PaginationState`\n- `kanbanGroups: Map<ProjectStage, ProjectItem[]>` — pre-grouped projects for kanban view\n- `onProjectClick`, `onPageChange`, `onPageSizeChange`, `onNewProject`\n\n**View routing:**\n- `list` → `ProjectListView`\n- `grid` → `ProjectGridView`\n- `kanban` → `ProjectKanbanView`\n- `calendar` or `map` → `ProjectPlaceholderView`\n\n### ProjectListView / ProjectGridView / ProjectKanbanView\n\nThree view components for displaying projects:\n\n| Component | Layout | Features |\n|-----------|--------|----------|\n| `ProjectListView` | Table | Columns: name, brand, stage, progress bar, milestone, tasks, risk, planned open date, owner |\n| `ProjectGridView` | Card grid | Cards with name, code, status, brand, stage, progress bar, milestone/task counts, risk indicator |\n| `ProjectKanbanView` | Kanban columns | Columns by project stage (启动, 准备, 执行, 收尾), cards with name, status, code, brand, progress, stats |\n\nAll three support:\n- Empty state with contextual message (no data vs. no search results)\n- Clicking a project triggers `onProjectClick`\n- Keyboard navigation (Enter/Space to select)\n\n### ProjectPlaceholderView\n\nA placeholder component for unimplemented views (calendar and map). Displays a feature-in-progress message with basic statistics about the project data.\n\n### ProjectDetailDrawer\n\nA slide-out drawer for viewing project details or creating new projects.\n\n**Props:**\n- `project: ProjectItem | null`\n- `isOpen: boolean`\n- `onClose: () => void`\n- `isNewProject?: boolean`\n\n**Modes:**\n- **Detail mode** (`isNewProject = false`): Shows project info, milestones, tasks, and risks\n- **Create mode** (`isNewProject = true`): Shows a form with project name, code, brand, stage, dates, owner, and notes\n\n**Data generation:** Uses `generateProjectDetail()` to create mock detail data from a `ProjectItem`.\n\n### InsightsPanel\n\nA sidebar panel that displays AI-generated insights and alerts. Shows a list of insight cards with severity levels (致命, 高, 中, 提示), source, time, and message.\n\n**Features:**\n- Mode tabs: \"主动洞察\" (active insights) and \"对话\" (chat)\n- Filter buttons: all, 致命, 高风险\n- Each insight card has a color-coded tone (red, orange, yellow, blue, green)\n- \"切换到对话模式\" button at the bottom\n\n### ResourcePoolPage\n\nA resource management page that handles both personnel and supplier resources. Supports editing availability, task counts, and certificate/qualification status.\n\n**State management:**\n- `resourceDomain` — toggle between \"人员资源\" and \"供应商资源\"\n- `personnelType` — filter by employment type (全部, 资源方, 工队)\n- `supplierStatus` — filter by supplier status\n- `draftMap` / `supplierDraftMap` — tracks pending edits\n- `governanceSettings` — governance configuration\n\n**Key functions:**\n- `buildDraftByUsers()` — creates a draft map from user data\n- `buildDraftBySuppliers()` — creates a draft map from supplier data\n- `certHealthByUser()` — determines certificate health (齐全, 临期, 需补齐)\n- `handleSaveUser()` / `handleSaveSupplier()` — persists changes via repositories\n\n## Data Layer\n\n### Types (`projectManagement.types.ts`)\n\nCore type definitions:\n- `ProjectItem` — the main project data structure with name, code, brand, stage, status, progress, risk, dates, owner\n- `ProjectFilters` — search, group, sort, and filter criteria\n- `PaginationState` — current page, page size, total\n- `ProjectDetail` — expanded project data with milestones, tasks, risks\n- `CreateProjectFormData` / `CreateProjectFormErrors` — form state types\n\n### Selectors (`projectManagement.selectors.ts`)\n\nPure functions for data processing:\n\n| Function | Purpose |\n|----------|---------|\n| `calculateProjectStats()` | Compute total, active, pending acceptance, risk counts |\n| `filterByStatKey()` | Filter projects by stat card key |\n| `searchProjects()` | Search by name or code |\n| `advancedFilter()` | Filter by stage, status, risk-only |\n| `sortProjects()` | Sort by name, progress, date, risk priority |\n| `groupProjects()` | Group by stage, owner, or brand |\n| `paginateProjects()` | Paginate with bounds checking |\n| `kanbanGroupByStage()` | Group projects into kanban columns |\n| `processProjects()` | Full pipeline: stat filter → search → advanced filter → sort → group/paginate |\n| `shouldResetPage()` | Determine if pagination should reset |\n\n### Data (`projectManagement.data.ts`)\n\nMock data and configuration:\n- `mockProjects` — 12 sample projects\n- `statsCardConfig` — 4 stat cards (all, active, pending acceptance, risk)\n- `groupOptions`, `sortOptions`, `stageOptions`, `statusOptions`, `pageSizeOptions`\n\n### Personnel Users (`personnelUsers.ts`)\n\nMock data for 7 personnel users with:\n- Basic info (name, code, mobile, email, role, org, team)\n- Employment type (internal, outsource, vendor)\n- Status (onduty, leave, offboard, disabled)\n- Availability (assignable, busy, unavailable)\n- Skills, certifications, task counts, risk level\n- Detail data for each user (projects, tasks, activities, status changes, stats)\n\nHelper functions:\n- `getPersonnelUserById()` — lookup user by ID\n- `getPersonnelUserDetailDataById()` — lookup detail data by ID\n- `resolveAvailabilityStatusByPersonStatus()` — derive availability from person status\n\n## Integration Points\n\n### Shared Components\n\nThe module uses these shared components:\n- `AppSidebar` — navigation sidebar\n- `PageHeader` — page title with search and actions\n- `StatsCards` — statistics card row\n- `EmptyState` — empty state display\n\n### External Services\n\n- `personnelRepository` — loads/saves personnel user data\n- `supplierRepository` — loads/saves supplier data\n- `governanceRepository` — reads/saves governance settings\n\n### Navigation\n\n- `goToPersonnelUser(userId)` — navigates to user detail page\n- Hash-based routing via `window.location.hash`\n\n## Usage Example\n\n```tsx\n// PersonnelPage usage\n<PersonnelPage onUserOpen={(userId) => navigate(`/personnel/${userId}`)} />\n\n// CreateProjectModeModal usage\n<CreateProjectModeModal\n  isOpen={showCreateModal}\n  submitting={isSubmitting}\n  errorMessage={submitError}\n  onClose={() => setShowCreateModal(false)}\n  onSubmit={(formData) => handleCreateProject(formData)}\n/>\n\n// ProjectToolbar + UserTable usage (via ProjectManagementPage)\n<UserTable\n  viewMode={viewMode}\n  onViewModeChange={setViewMode}\n  searchQuery={searchQuery}\n  onSearchChange={setSearchQuery}\n  filters={filters}\n  onFiltersChange={updateFilters}\n  projects={processedProjects.data}\n  pagination={processedProjects.pagination}\n  kanbanGroups={kanbanGroups}\n  onProjectClick={openProjectDetail}\n  onPageChange={setPage}\n  onPageSizeChange={setPageSize}\n  onNewProject={() => setShowCreateModal(true)}\n/>\n```","personnel-resource-management-personnel-management-html":"# Personnel & Resource Management — personnel-management.html\n\n# Personnel & Resource Management — `personnel-management.html`\n\n## Overview\n\nThe Personnel Management module provides a centralized interface for viewing and managing all users within the organization. It displays user profiles, roles, department assignments, project participation, and login activity in a tabular format with filtering, sorting, and pagination controls.\n\nThis is a **static HTML/CSS/JS frontend module** — it renders the UI layer only. All data shown is hardcoded sample data; real data would be supplied by a backend API.\n\n## Key Components\n\n### 1. Sidebar Navigation\nThe sidebar contains 13 navigation items. The \"人员管理\" (Personnel Management) item is marked as `active` by default. Each nav item has an SVG icon and a Chinese label. Clicking any nav item toggles the `active` class — this is handled by a simple event listener in the inline script.\n\n### 2. Header\nThe header displays:\n- **Title**: \"人员管理\" with subtitle \"Personnel && Permissions\"\n- **Search box**: placeholder \"搜索...\" (Search...)\n- **Action buttons**: add (+), primary action (+), and a user menu dropdown showing \"管理员\" (Administrator)\n\n### 3. Tab Navigation\nThree tabs allow switching between views:\n- **用户列表** (User List) — active by default\n- **角色与权限** (Roles & Permissions)\n- **操作审计** (Operation Audit)\n\nTab switching is handled by a click event listener that removes `active` from all tabs and adds it to the clicked tab.\n\n### 4. Statistics Cards\nFour stat cards display aggregate metrics:\n\n| Card | Metric | Value |\n|------|--------|-------|\n| Blue | 总用户数 (Total Users) | 186 |\n| Green | 活跃用户 (Active Users) | 142 |\n| Purple | 项目角色 (Project Roles) | 4 |\n| Orange | 外部协作 (External Collaborators) | 12 |\n\n### 5. Data Table\nThe main table displays user records with these columns:\n\n| Column | Content |\n|--------|---------|\n| 用户 (User) | Avatar initial + name + email |\n| 角色 (Role) | Badge with role type (color-coded) |\n| 部门 (Department) | Department name |\n| 项目 (Projects) | Number of projects (centered) |\n| 状态 (Status) | Green/orange/gray dot indicator |\n| 最近登录 (Last Login) | Date string |\n| 操作 (Actions) | Three-dot menu button |\n\n**Role badges** are color-coded:\n- `pm` (项目经理 / Project Manager) — blue\n- `lead` (专业负责人 / Lead) — purple\n- `engineer` (工程师 / Engineer) — gray\n- `observer` (只读观察者 / Read-only Observer) — green\n- `external` (外部协作方 / External Collaborator) — orange\n\n**Status indicators**:\n- Green dot — active user\n- Orange dot — external collaborator\n- Gray dot — inactive user\n\n### 6. Table Toolbar\nAbove the table, the toolbar provides:\n- **View toggle**: Grid view / List view (list is active by default)\n- **Search**: Filter by name, email, or department\n- **Group button**: With dropdown indicator\n- **Sort button**: With dropdown indicator\n- **Add user button**: Primary action button\n- **Actions menu**: Three-dot menu with dropdown\n\n### 7. Pagination\nShows \"共 75 条记录，当前第 1 / 8 页\" (75 records total, page 1 of 8). Page buttons 1-4 are shown, with an ellipsis and page 8. Navigation arrows are disabled on the first page.\n\n## Interaction Flow\n\n```\nUser clicks tab → Tab event listener toggles .active class\nUser clicks view option → View toggle event listener toggles .active class\nUser clicks page number → Pagination event listener toggles .active class\nUser clicks nav item → Nav event listener toggles .active class\n```\n\nAll interactions are purely visual — no data fetching, no state management, no routing. The module is a static prototype.\n\n## Architecture Diagram\n\n```mermaid\ngraph TD\n    A[personnel-management.html] --> B[Sidebar]\n    A --> C[Header]\n    A --> D[Tab Navigation]\n    A --> E[Stats Cards]\n    A --> F[Table Toolbar]\n    A --> G[Data Table]\n    A --> H[Pagination]\n    \n    B --> B1[Nav Items × 13]\n    B1 --> B2[Click → toggle .active]\n    \n    D --> D1[Tab Items × 3]\n    D1 --> D2[Click → toggle .active]\n    \n    F --> F1[View Toggle]\n    F1 --> F2[Click → toggle .active]\n    \n    G --> G1[User Rows × 8]\n    G1 --> G2[Role Badges]\n    G1 --> G3[Status Dots]\n    G1 --> G4[Action Buttons]\n    \n    H --> H1[Page Buttons]\n    H1 --> H2[Click → toggle .active]\n```\n\n## Dependencies\n\n- **Google Fonts**: `Inter` font family loaded from `fonts.googleapis.com`\n- **No JavaScript frameworks** — all logic is vanilla JS inline in the `<script>` tag\n- **No backend API calls** — all data is hardcoded in the HTML\n\n## Integration Points\n\nThis module is designed to be part of a larger application with 12 other navigation sections (工作台, 数据中心, 项目管理, etc.). To connect it to a real backend:\n\n1. Replace hardcoded table rows with data fetched from an API endpoint (e.g., `GET /api/users`)\n2. Replace hardcoded stat values with API responses (e.g., `GET /api/users/stats`)\n3. Implement actual search, filter, sort, and pagination logic\n4. Wire up the \"添加用户\" (Add User) button to open a modal or navigate to a creation form\n5. Connect the action buttons (three-dot menu) to user-specific operations (edit, deactivate, delete)\n\n## Styling Notes\n\n- **Dark theme** with deep blue background (`#051338`)\n- **CSS custom properties** for consistent theming (colors, spacing, border styles)\n- **Responsive layout** using CSS Grid for stat cards and fixed sidebar width\n- **Glow effects** via two positioned `div.bg-glow` elements with blur filters\n- **Hover states** on interactive elements (nav items, buttons, table rows)","personnel-resource-management":"# Personnel & Resource Management\n\n# Personnel & Resource Management\n\n## Purpose\n\nThe Personnel & Resource Management module provides a complete system for managing an organization's workforce, projects, and resource pools within a construction project management platform. It bridges the gap between personnel administration (who works on what) and resource allocation (what skills and suppliers are available).\n\n## Module Structure\n\nThe module is organized into two complementary domains:\n\n- **[Components](components.md)** — The UI layer that renders all personnel and resource management interfaces, including user profiles, project views (list, grid, kanban, calendar, map), and resource pool management.\n- **[Personnel Management HTML](personnel-management-html.md)** — A static frontend implementation of the user management interface, providing a tabular view of all users with filtering, sorting, and pagination.\n\n## How Sub-Modules Fit Together\n\nThe **Components** sub-module provides the interactive React-based UI for the entire module, while the **Personnel Management HTML** sub-module offers a lightweight, static alternative focused solely on user listing and management. Together, they cover:\n\n- **Personnel domain** (`components/personnel/`) — User detail pages, project creation, and project management views\n- **Resource domain** (`components/resource/`) — Resource pool management for both personnel and suppliers\n\n## Key Workflows\n\n### 1. Project Management Pipeline\nThe `ProjectManagementPage` triggers a multi-step processing pipeline via `processProjects` in the selectors layer:\n1. `searchProjects` — Filter projects by search criteria\n2. `advancedFilter` — Apply advanced filtering rules\n3. `filterByStatKey` — Filter by project status\n4. `sortProjects` — Sort the filtered results\n5. `groupProjects` — Group projects for kanban/calendar views\n6. `paginateProjects` — Paginate the final result set\n\n### 2. Resource Pool Allocation\nThe `ResourcePoolPage` builds resource drafts from two sources:\n- **Personnel**: `buildDraftByUsers` → `certHealthByUser` (checks certification health)\n- **Suppliers**: `buildDraftBySuppliers` (direct supplier data)\n\n### 3. User Detail Exploration\nThe `PersonnelUserDetailPage` aggregates multiple data views for a single user:\n- `renderProjectList` — Projects the user participates in\n- `renderTaskList` — Assigned tasks\n- `renderActivityList` — Recent activity\n- `renderSkillAndCertPanel` — Skills and certifications\n- `renderStatusChangeList` — Status change history\n\n### 4. Project Creation Flow\nThe `CreateProjectModeModal` handles project creation with:\n- `validate` — Form validation\n- `handleSubmit` — Submission logic\n- `handleClose` → `resetFormState` — Cleanup on close\n\n## Architecture Diagram\n\n```mermaid\ngraph TD\n    subgraph \"Personnel Domain\"\n        PM[ProjectManagementPage] --> PP[processProjects]\n        PP --> SP[searchProjects]\n        PP --> AF[advancedFilter]\n        PP --> FSK[filterByStatKey]\n        PP --> SRT[sortProjects]\n        PP --> GP[groupProjects]\n        PP --> PAG[paginateProjects]\n        UD[PersonnelUserDetailPage] --> PL[renderProjectList]\n        UD --> TL[renderTaskList]\n        UD --> AL[renderActivityList]\n        UD --> SC[renderSkillAndCertPanel]\n        UD --> SCL[renderStatusChangeList]\n        CP[CreateProjectModeModal] --> V[validate]\n        CP --> HS[handleSubmit]\n        CP --> HC[handleClose]\n        HC --> RS[resetFormState]\n    end\n\n    subgraph \"Resource Domain\"\n        RP[ResourcePoolPage] --> BDU[buildDraftByUsers]\n        RP --> BDS[buildDraftBySuppliers]\n        BDU --> CHU[certHealthByUser]\n    end\n\n    subgraph \"Static UI\"\n        PMH[Personnel Management HTML]\n    end\n\n    PMH -.->|\"alternative UI\"| UD\n```\n\nFor detailed component APIs and selector logic, see the [Components](components.md) sub-module. For the static user management interface, see [Personnel Management HTML](personnel-management-html.md).","procurement-orders-contracts":"# Procurement, Orders & Contracts\n\n# Procurement, Orders & Contracts Module\n\n## Overview\n\nThis module provides the procurement lifecycle management for a construction/renovation project management system. It covers three interconnected domains: supplier management, purchase order tracking, and contract settlement. The module is implemented as three independent page components that share common UI infrastructure (sidebar, page header, stats cards) and data repositories.\n\n## Architecture\n\nThe module follows a **page-component** pattern where each major feature is a self-contained page that manages its own state, data loading, and side effects. Data flows from repositories into components via React hooks (`useMemo`, `useState`, `useEffect`), and navigation between pages is handled through hash-based routing and explicit callback props.\n\n```mermaid\nflowchart LR\n    subgraph Shared\n        AppSidebar\n        PageHeader\n        StatsCards\n    end\n\n    subgraph Procurement\n        ProcurementManagementPage --> supplierRepository\n        SupplierDetailPage --> supplierRepository\n    end\n\n    subgraph Orders\n        OrderManagementPage --> orderRepository\n    end\n\n    subgraph Contracts\n        ContractSettlementPage --> settlementRepository\n        ContractSettlementPage --> navigation\n    end\n\n    ProcurementManagementPage --> SupplierDetailPage\n    OrderManagementPage --> navigation\n    ContractSettlementPage --> navigation\n```\n\n## Component Breakdown\n\n### 1. ProcurementManagementPage (`src/components/procurement/ProcurementManagementPage.tsx`)\n\n**Purpose:** Main supplier directory with search, filtering, and navigation to supplier details.\n\n**Key behaviors:**\n- Loads all suppliers from `supplierRepository.loadSuppliers()` on mount\n- Filters suppliers by a combined search across name, code, category, contact, city, and service areas\n- Computes four statistics (total, active, pending, paused) from the supplier list\n- Renders a table with clickable rows that navigate to `SupplierDetailPage` via the `onOpenSupplier` callback\n- Supports an optional `initialSearchQuery` prop to pre-populate the search field\n\n**Props:**\n- `initialSearchQuery?: string` — Pre-fills the search input\n- `onOpenSupplier?: (supplierId: string, searchQuery?: string) => void` — Navigation callback\n\n**State:**\n- `searchQuery` — Current search text\n- `suppliers` — Memoized from repository (never re-fetched)\n- `filteredSuppliers` — Derived via `useMemo` from search query\n- `stats` — Derived via `useMemo` from supplier list\n\n### 2. SupplierDetailPage (`src/components/procurement/SupplierDetailPage.tsx`)\n\n**Purpose:** Detailed view of a single supplier, including enterprise info, contracts, qualifications, and performance metrics.\n\n**Key behaviors:**\n- Looks up the supplier by `supplierId` from the repository\n- Displays static mock data for enterprise details, contracts, and qualifications\n- Shows a radar chart placeholder for comprehensive evaluation scores\n- Provides a breadcrumb with a back button that calls `onBack`\n- Renders a tabbed interface (Overview, Contracts, Reviews, Certificates) — only the Overview tab is active\n\n**Props:**\n- `supplierId: string` — The supplier to display\n- `onBack: () => void` — Navigation callback\n\n**Data flow:**\n- Enterprise info is generated by `enterpriseRows(supplier)` — a pure function that maps supplier fields to display rows\n- Contracts and qualifications are hardcoded arrays within the module\n\n### 3. OrderManagementPage (`src/components/orders/OrderManagementPage.tsx`)\n\n**Purpose:** Purchase order lifecycle management with status transitions and flow logging.\n\n**Key behaviors:**\n- Initializes orders from `orderRepository.readOrders()` or falls back to `seedOrders`\n- Persists orders and flow logs to repository on every state change via `useEffect`\n- Filters orders by name, code, or supplier\n- Computes statistics (total, pending, executing, completed)\n- Implements a **state machine** for order status transitions via `flowActionsMap`:\n  - `草稿 → 待审批 → 已审批 → 已下单 → 运输中 → 部分到货 → 已到货 → 已完成`\n  - Any status can transition to `已取消`\n- Each transition logs a `OrderFlowLog` entry with timestamp, operator, action, and detail\n- Displays a flow log panel for the selected order\n\n**State machine:**\n\n```mermaid\nflowchart LR\n    Draft[草稿] -->|提交审批| Pending[待审批]\n    Pending -->|审批通过| Approved[已审批]\n    Pending -->|驳回取消| Cancelled[已取消]\n    Approved -->|确认下单| Ordered[已下单]\n    Ordered -->|登记发货| Transit[运输中]\n    Transit -->|登记部分到货| Partial[部分到货]\n    Transit -->|登记全部到货| Arrived[已到货]\n    Partial -->|登记全部到货| Arrived\n    Arrived -->|确认入库完成| Completed[已完成]\n    Draft -->|取消订单| Cancelled\n```\n\n**Key functions:**\n- `advanceOrderStatus(orderCode, action)` — Updates order status, recalculates progress, and appends a flow log\n- `formatFlowTime(date?)` — Returns `YYYY-MM-DD HH:mm` formatted timestamp\n\n**Props:** None (self-contained page)\n\n### 4. ContractSettlementPage (`src/components/contracts/ContractSettlementPage.tsx`)\n\n**Purpose:** Contract management and settlement dashboard, integrating project data with contract lifecycle.\n\n**Key behaviors:**\n- Accepts a `projects` array and derives contracts, statistics, and settlement diffs from it\n- Maps project status to contract status via `mapProjectToContractStatus`:\n  - `已确认` settlement → `已归档`\n  - `草案待确认` settlement → `审核中`\n  - Active project statuses → `履约中`\n  - Otherwise → `草稿`\n- Computes budget statistics (yearly total, settled amount, risk exposure)\n- Identifies settlement discrepancies (`settlementDiffs`) for projects with `草案待确认` status\n- Loads settlement suggestions asynchronously from `settlementRepository.loadSuggestions(projects)`\n- Provides navigation to project detail and settlement review via `goToProjectDetail` and `goToProjectSettlementReview`\n\n**Props:**\n- `projects: ProjectItem[]` — Array of project data used to derive all displayed information\n\n**Key helper functions:**\n- `parseBudgetToWan(value)` — Extracts numeric value from budget string (e.g., `\"¥ 500万\"` → `500`)\n- `buildContractsByProjects(projects)` — Generates contract items from project data\n- `buildStatsByProjects(projects)` — Computes summary statistics\n- `buildSettlementDiffs(projects)` — Identifies projects needing settlement attention\n\n## Data Repositories\n\n| Repository | Methods Used | Purpose |\n|---|---|---|\n| `supplierRepository` | `loadSuppliers()` | Returns array of `SupplierItem` |\n| `orderRepository` | `readOrders()`, `saveOrders()`, `readFlowLogs()`, `saveFlowLogs()` | Persists order state and flow logs |\n| `settlementRepository` | `loadSuggestions(projects)` | Async loading of settlement recommendations |\n\n## Navigation Integration\n\nThe module uses two navigation patterns:\n\n1. **Hash-based routing** — `window.location.hash` is read to determine the active sidebar item. The `navigateByHash()` function from `config/navigation` is used for programmatic navigation.\n\n2. **Callback-based navigation** — `ProcurementManagementPage` receives `onOpenSupplier` to navigate to supplier details. `SupplierDetailPage` receives `onBack` to return to the list.\n\n3. **Direct navigation functions** — `goToProjectDetail()` and `goToProjectSettlementReview()` from `config/navigation` are used by `OrderManagementPage` and `ContractSettlementPage` to link to project pages.\n\n## Styling Architecture\n\nEach page has its own CSS file using CSS custom properties (tokens) prefixed with `--pm-`. The styling follows a consistent pattern:\n\n- **Layout:** CSS Grid for page structure (`grid-template-columns: 256px 1fr` for sidebar + content)\n- **Glow effects:** Absolute-positioned pseudo-elements with `filter: blur()` for decorative background\n- **Responsive breakpoints:** 1440px, 1200px, 1024px, 768px — progressively collapsing sidebar and stacking content\n- **Component classes:** Each page uses its own prefix (`pcm-`, `sdp-`, `om-`, `csm-`) to avoid collisions\n\n## Key Design Decisions\n\n1. **Static data with persistence** — Orders use a seed dataset that persists to a repository. Suppliers and contracts derive from repositories or props, not from API calls.\n\n2. **Pure derivation** — Statistics, filtered lists, and derived contract items are computed via `useMemo` from source data, not stored as separate state.\n\n3. **Optimistic state updates** — `advanceOrderStatus` updates order state immediately and persists asynchronously via `useEffect`.\n\n4. **Hardcoded mock data** — Enterprise details, contracts, and qualifications in `SupplierDetailPage` are static arrays, not fetched from a backend.\n\n5. **Hash-based routing** — The module does not use a router library; it relies on `window.location.hash` and callback props for navigation.","product-requirements-roadmaps":"# Product Requirements & Roadmaps\n\n# Product Requirements & Roadmaps Module\n\n## Overview\n\nThe Product Requirements & Roadmaps module serves as the product strategy and requirements hub for the multi-agent store construction management platform. It defines what the system should do, who it serves, and how it evolves over time. This module is not executable code — it is a collection of structured product documents that drive development decisions, scope management, and stakeholder alignment.\n\n## Module Purpose\n\nThis module answers three fundamental questions:\n\n1. **What are we building?** — Detailed product requirements documents (PRDs) for each subsystem\n2. **Why are we building it?** — Business context, pain points, and success criteria\n3. **When will we build it?** — Phased roadmaps with milestones, dependencies, and risk assessments\n\n## Document Inventory\n\nThe module contains six documents, each serving a distinct purpose:\n\n| Document | ID | Status | Scope |\n|----------|----|--------|-------|\n| Product Roadmap V1.2 | DOC-01-PRODUCT-PRODUCT-ROADMAP-V1-2 | Draft | Overall product strategy, phased roadmap, technical decisions, ROI |\n| Multi-Agent V1 PRD | DOC-01-PRODUCT-MULTI-AGENT-V1-PRD | Active | Complete system PRD covering 7 agents, business flows, data model |\n| Digital Employee PRD | DOC-01-PRODUCT-DIGITAL-EMPLOYEE-PRD | Active | Agent management subsystem: creation, configuration, execution, approval |\n| Personnel Management PRD | DOC-01-PRODUCT-PERSONNEL-MANAGEMENT-PRD | Active | Organization, roles, skills, availability, team management |\n| Procurement Management PRD | DOC-01-PRODUCT-PROCUREMENT-MANAGEMENT-PRD | Active | Purchase requests, orders, delivery tracking, supplier collaboration |\n| Product Roadmap V2 (Archived) | DOC-01-PRODUCT-PRODUCT-ROADMAP-V2 | Archived | Superseded by V1.2; preserved for historical reference |\n\n## Architecture & Relationships\n\n```mermaid\nflowchart TD\n    ROADMAP[\"Product Roadmap V1.2<br/>Strategic direction, phases, ROI\"]\n    \n    ROADMAP --> MULTI_AGENT[\"Multi-Agent V1 PRD<br/>System-wide requirements\"]\n    ROADMAP --> DIGITAL_EMP[\"Digital Employee PRD<br/>Agent lifecycle & execution\"]\n    ROADMAP --> PERSONNEL[\"Personnel Management PRD<br/>People & organization\"]\n    ROADMAP --> PROCUREMENT[\"Procurement Management PRD<br/>Materials & services\"]\n    \n    MULTI_AGENT --> DIGITAL_EMP\n    MULTI_AGENT --> PERSONNEL\n    MULTI_AGENT --> PROCUREMENT\n    \n    DIGITAL_EMP --> |\"triggers\"| TASK_CENTER[\"Task Center<br/>(separate module)\"]\n    PERSONNEL --> |\"provides assignees\"| TASK_CENTER\n    PROCUREMENT --> |\"supplies materials\"| TASK_CENTER\n    \n    style ROADMAP fill:#e1f5fe,stroke:#01579b\n    style MULTI_AGENT fill:#fff3e0,stroke:#e65100\n    style DIGITAL_EMP fill:#f3e5f5,stroke:#6a1b9a\n    style PERSONNEL fill:#e8f5e9,stroke:#1b5e20\n    style PROCUREMENT fill:#fce4ec,stroke:#b71c1c\n```\n\n## Key Design Decisions\n\n### Two-Phase Evolution Strategy\n\nThe roadmap defines a clear two-phase model:\n\n- **V1 (Months 1-12): Internal standardization system** for brand-side construction departments. Validates that standards drive tasks, tasks drive projects, and result objects persist outcomes.\n- **V2 (Months 12-24+): Platform ecosystem** connecting brands (demand side) with construction companies and resource providers (supply side).\n\n### Agent Implementation Priority\n\nThe multi-agent PRD defines a phased rollout for the seven agents:\n\n| Priority | Agent | Phase |\n|----------|-------|-------|\n| P0 | Brand Requirements Agent | V1.0 |\n| P0 | Project Manager Agent | V1.0 |\n| P0 | Quality Inspection Agent | V1.0 |\n| P1 | Resource Dispatch Agent | V1.5 |\n| P1 | Resource Execution Agent | V1.5 |\n| P2 | Customer Service Agent | V2.0 |\n| P2 | Settlement Agent | V2.0 |\n\n### Core Data Model\n\nThe multi-agent PRD defines a comprehensive entity-relationship model with four domains:\n\n1. **Organization & Permissions**: `ORGANIZATION`, `BRAND`, `TEAM`, `PERSON`, `ROLE`, `PERSON_ROLE_REL`, `PROJECT_MEMBER`\n2. **Project & Task Chain**: `STORE`, `PROJECT`, `PROJECT_STAGE`, `COST_ACCOUNT`, `WORK_PACKAGE`, `TASK`, `TASK_RELATION`\n3. **Fulfillment & Settlement**: `RESOURCE_PROVIDER`, `CONTRACT`, `SERVICE`, `DISPATCH_ORDER`, `SCHEDULE`, `ACCEPTANCE_ORDER`, `RECTIFICATION_ORDER`, `SETTLEMENT_SUGGESTION`\n4. **Cross-cutting Audit**: `PROGRESS_LOG`, `TICKET`, `ATTACHMENT`, `AGENT_EXECUTION_LOG`, `MANUAL_INTERVENTION_LOG`\n\n### State Machine Design\n\nEach document defines state machines for its domain:\n\n- **Project states**: Pending → Confirmed → Decomposing → Executing → Pending Acceptance → Rectifying → Pending Settlement → Archived\n- **Task states**: Pending Assignment → Pending Acceptance → Executing → Pending Submission → Pending Acceptance → Failed → Completed\n- **Agent run states**: Pending → Running → Pending Approval → Success → Failed → Cancelled\n- **Personnel states**: Active → On Leave → Resigned → Disabled\n\n## Integration Points\n\nThe module defines clear boundaries with other system components:\n\n| Module | Reads From | Writes To |\n|--------|-----------|-----------|\n| Project Management | Agent suggestions, personnel availability | Project milestones, risk notes |\n| Task Center | Task status, dependencies, SLA data | Dispatch suggestions, reminders |\n| Personnel Management | Skills, availability, workload | Candidate recommendations |\n| Procurement Management | Purchase requests, delivery status | Task blocking/unblocking signals |\n\n## Risk Management\n\nThe roadmap document identifies and categorizes risks across four dimensions:\n\n| Risk Category | Key Risks | Mitigation |\n|---------------|-----------|------------|\n| Technical | AI code quality, MUI theme compatibility, SQLite concurrency | Code review gates, visual validation, early PostgreSQL migration |\n| Business | Standard library complexity, pilot brand cooperation | Focus on 2-3 high-frequency domains, mock data fallback |\n| Agent Effectiveness | Low accuracy, user distrust | Phased release, mandatory human confirmation, effectiveness metrics |\n| Organizational | Blurred decision authority, AI dependency | Clear role definitions, mandatory human-written core modules |\n\n## Development Approach\n\nThe module specifies a \"Product Manager + AI Coding\" development model with specific guardrails:\n\n- **100% code review** for all AI-generated code\n- **TypeScript strict mode** (`tsc --noEmit` zero errors)\n- **Core modules** (state machines, permissions, data models) must be human-designed\n- **Weekly documentation sync** to prevent context drift\n- **20-30% buffer** in estimates for AI-generated code rework\n\n## Field-Level Data Dictionaries\n\nEach PRD includes complete table definitions with:\n\n- Column names, types, nullability, defaults\n- Primary keys, unique constraints, indexes\n- Enum values with numeric mappings\n- Recommended composite indexes for query patterns\n\nExample from the Digital Employee PRD:\n\n```sql\n-- de_agent table\nid              BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY\nagent_code      VARCHAR(32) UNIQUE NOT NULL\nagent_name      VARCHAR(128) NOT NULL INDEXED\nagent_type      TINYINT UNSIGNED NOT NULL DEFAULT 1  -- 1=PM, 2=Dispatch, 3=QA, 9=General\nversion         VARCHAR(32) NOT NULL DEFAULT 'v1'\nstatus          TINYINT UNSIGNED NOT NULL DEFAULT 1  -- 1=Draft, 2=Published, 3=Disabled\nrisk_level      TINYINT UNSIGNED NOT NULL DEFAULT 1  -- 1=Low, 2=Medium, 3=High\nowner_id        VARCHAR(64) NOT NULL INDEXED\ncreated_at      DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3)\nupdated_at      DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3) ON UPDATE CURRENT_TIMESTAMP(3)\n```\n\n## Verification Criteria\n\nEach document defines acceptance criteria organized by:\n\n1. **Functional verification**: Can users complete the core workflows?\n2. **Data consistency verification**: Are logs and business results traceable?\n3. **Risk control verification**: Are unauthorized actions blocked? Are approvals enforced?\n\nThe roadmap defines phase-level verification standards, such as:\n\n- Phase 1 (Months 1-2): Engineering initialization, component consolidation, local backend integration\n- Phase 2 (Months 2-4): Standard library, template center, project initiation, PMBOK domain tabs\n- Phase 6 (Months 9-12): End-to-end integration, pilot deployment with 1 brand, 1 city, 5 projects","project-governance-standards":"# Project Governance & Standards\n\n# Project Governance & Standards Module\n\n## Overview\n\nThe Project Governance & Standards module defines the rules, conventions, and quality assurance processes for the Chain Store Construction Management System. It serves as the authoritative source of truth for how code is written, how components are developed, how documents are managed, and how quality is maintained throughout the MVP phase.\n\nThis module is not executable code — it is a collection of governance documents that constrain and guide all development activity. Every developer and AI agent working on this project must adhere to these standards.\n\n---\n\n## Module Structure\n\n```\ndocs/00-governance/\n├── coding-standards.md              # Code style, TypeScript, React, naming, comments\n├── component-development-contract.md # Standardized handoff template for component dev\n├── design-checklist.md              # Pre/post development verification checklist\n├── design-specification.md          # Design system tokens, layout, responsive rules\n├── document-governance.md           # Document lifecycle, status model, frontmatter\n├── mvp-code-quality-plan-v2.md      # Three-layer quality assurance for AI-generated code\n├── pr-doc-checklist.md              # PR merge checklist for document changes\n└── reasoning-language.md            # Language configuration for AI reasoning\n```\n\n---\n\n## Key Components\n\n### 1. Design Specification (`design-specification.md`)\n\nThe single source of truth for all visual design decisions. Defines:\n\n- **Color system**: Primary, background, text, functional, and border colors as CSS custom properties (`--pm-*`)\n- **Typography**: Font sizes (10px–24px), weights (400–700), line heights\n- **Spacing system**: Internal padding, external margins, gaps (4px–32px)\n- **Border radius**: 8px (small) to 999px (full)\n- **Shadow system**: 4 levels of box shadows\n- **Layout rules**: Page grid, card structure, responsive breakpoints (768px, 1024px, 1360px, 1920px)\n- **Component SOP**: Step-by-step development workflow from Figma to code review\n\n**Enforcement**: All CSS values must reference `--pm-*` variables. Hardcoded colors, spacing, or radii are prohibited.\n\n### 2. Coding Standards (`coding-standards.md`)\n\nDefines executable rules for code generation and review:\n\n- **ESLint/Prettier configuration**: Exact config files with rules\n- **TypeScript conventions**: Interface vs type, enum usage, type guards, props patterns\n- **React patterns**: Component structure (hooks → computed → effects → handlers → render), custom hoo
