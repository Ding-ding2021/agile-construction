ks, composition\n- **File organization**: Directory structure, naming conventions (PascalCase for components, camelCase for functions, kebab-case for files)\n- **Comment rules**: Chinese comments only for boundary conditions, complex flows, and key business logic — not line-by-line\n- **Performance**: `useMemo`/`useCallback`, lazy loading, virtual scrolling\n- **Git commit format**: `type(scope): subject` with defined types (feat, fix, docs, style, refactor, perf, test, chore)\n\n### 3. Component Development Contract (`component-development-contract.md`)\n\nA standardized handoff template that bridges design and implementation. Each shared component requires a contract containing:\n\n- **Props interface**: Type definitions with defaults and constraints\n- **Design token mapping**: Every visual property mapped to a CSS variable\n- **State & interaction contract**: Hover, click, loading, empty, error states\n- **Dependency & composition rules**: What the component can import and how it composes\n- **Test & acceptance criteria**: Visual, functional, and code quality checks\n- **Delivery checklist**: Source files, tests, examples, design screenshots\n\n**Enforcement**: \"No contract, no development\" for new shared components.\n\n### 4. Design Checklist (`design-checklist.md`)\n\nA pre/post development verification checklist ensuring visual and functional alignment:\n\n- **Pre-development**: Design file review, design system alignment, business logic confirmation\n- **During development**: Layout, style, typography, responsive verification\n- **Post-development**: Visual regression, functional testing, performance, code quality\n- **Common issue diagnosis**: Layout breakage, style inconsistency, responsive failures\n- **Code review points**: Visual, layout, performance, accessibility\n\n### 5. MVP Code Quality Plan V2 (`mvp-code-quality-plan-v2.md`)\n\nThe quality assurance strategy for a team of one product manager + AI agents (no human developers). Implements a three-layer defense model:\n\n```\nLayer 1: Automated Defense (zero human cost, 100% pass required)\n  - TypeScript strict mode\n  - ESLint with blocking rules\n  - Build failure = rejection\n\nLayer 2: AI Coding Process Control (low human cost, rule-driven)\n  - Explainable deliverables: unit tests + flowcharts + boundary condition tables\n  - Dual AI cross-validation (Model A writes, Model B reviews)\n  - Core module stabilization (DRAFT → STABLE → FROZEN with change requests)\n\nLayer 3: Product Manager Acceptance (10 minutes per iteration)\n  - Test coverage review (read test case list)\n  - Flowchart verification (compare to requirements)\n  - Real scenario walkthrough (browser operations)\n```\n\n**Red lines** (trigger immediate rejection):\n- Missing explainable deliverables\n- Insufficient test coverage\n- Flowchart contradicts requirements\n- Real scenario operation fails\n- Unauthorized modification of STABLE modules\n\n### 6. Document Governance (`document-governance.md`)\n\nGoverns the documentation system itself:\n\n- **Directory structure**: `00-governance` (rules), `01-product` (requirements), `02-architecture` (design), `03-engineering` (delivery), `04-operations` (metrics), `99-archive` (history)\n- **Status model**: `draft` (not executable), `active` (single source of truth), `deprecated` (retained for history), `archived` (historical only)\n- **Frontmatter requirements**: Every active document must have `id`, `title`, `owner`, `status`, `last_updated`, `source_of_truth`, `related_code`, `related_docs`\n- **Change process**: Modify → update frontmatter → update index → run checklist → merge → log audit\n\n### 7. PR Document Checklist (`pr-doc-checklist.md`)\n\nA merge gate for document changes:\n\n- [ ] Changes only in `docs/` directory\n- [ ] Active documents have complete frontmatter\n- [ ] `docs/README.md` index updated\n- [ ] All links use `docs/...` paths\n- [ ] No duplicate active documents on same topic\n- [ ] Historical documents archived or deprecated\n- [ ] Design specification and checklist synchronized if affected\n\n### 8. Reasoning Language (`reasoning-language.md`)\n\nConfiguration requiring all AI reasoning (intent declaration, chain-of-thought, analysis) to be output in Chinese. This ensures consistency in AI-generated explanations and makes them accessible to the Chinese-speaking product team.\n\n---\n\n## How the Module Works\n\nThe governance module operates as a **constraint system** that all development activity must pass through:\n\n```\nDesign Specification ──► Component Contract ──► Coding Standards ──► Code Generation\n       │                       │                       │\n       ▼                       ▼                       ▼\n  Design Checklist      Acceptance Criteria      ESLint/TypeScript\n       │                       │                       │\n       └───────────────────────┼───────────────────────┘\n                               ▼\n                    MVP Quality Plan (3 layers)\n                               │\n                               ▼\n                    Document Governance (audit trail)\n```\n\n1. **Design phase**: The design specification defines visual tokens. The component contract formalizes the handoff from design to code.\n2. **Development phase**: Coding standards constrain code generation. The design checklist guides implementation.\n3. **Quality phase**: The MVP quality plan enforces automated checks, explainable deliverables, and human verification.\n4. **Documentation phase**: Document governance ensures all changes are tracked and the documentation remains consistent.\n\n---\n\n## Connections to the Codebase\n\n| Governance Document | Enforces Rules On | Verification Method |\n|---|---|---|\n| `design-specification.md` | `src/index.css` (`--pm-*` variables) | `grep -n \"rgba\\|#\" src/components/` |\n| `coding-standards.md` | All `.tsx`, `.ts` files | `npm run lint`, `npx tsc --noEmit` |\n| `component-development-contract.md` | `src/components/shared/` | Manual checklist review |\n| `mvp-code-quality-plan-v2.md` | `src/domain/`, `src/data/`, `src/App.tsx` | Test coverage, flowchart, boundary list |\n| `document-governance.md` | `docs/` directory | PR checklist |\n\nThe governance module does not import or call any code. Instead, it defines the rules that code must satisfy. The quality plan (`mvp-code-quality-plan-v2.md`) is the enforcement mechanism that connects governance rules to actual code verification.\n\n---\n\n## Usage Guide\n\n### For Developers\n\n1. **Before writing code**: Read `design-specification.md` for visual tokens and `coding-standards.md` for code conventions\n2. **When creating shared components**: Fill out the `component-development-contract.md` template\n3. **During development**: Run `npx tsc --noEmit` and `npm run lint` after every change\n4. **For core modules**: Follow the explainable deliverables requirement (tests + flowchart + boundary list)\n\n### For AI Agents\n\n1. **Reasoning output**: Use Chinese as specified in `reasoning-language.md`\n2. **Code generation**: Follow `coding-standards.md` — no `any` types, proper naming, correct file organization\n3. **Core module changes**: Output tests, flowcharts, and boundary condition tables per `mvp-code-quality-plan-v2.md`\n4. **Document changes**: Update frontmatter and run the PR checklist\n\n### For Product Managers\n\n1. **Acceptance**: Use the 5-item checklist from `mvp-code-quality-plan-v2.md` (test coverage, flowchart, boundary list, real scenario, change impact)\n2. **Red lines**: Reject any submission missing explainable deliverables or failing real scenario tests\n3. **Component review**: Verify against `design-checklist.md` and `component-development-contract.md`","project-management-module-components":"# Project Management Module — components\n\n# Project Management Module — Components\n\n## Overview\n\nThe Project Management Module provides the UI components for viewing, managing, and interacting with construction projects. It covers the full project lifecycle from listing and creation through detailed execution tracking, acceptance workflows, and team management.\n\nThis module lives under `src/components/project/` and serves as the presentation layer for project data. It consumes data from repositories (`acceptanceRepository`, `taskRepository`, `personnelRepository`) and domain logic (`projectParentStatus`, `projectStatusMachine`), and coordinates with shared UI components (`AppSidebar`, `PageHeader`, `StatsCards`).\n\n## Architecture\n\n```mermaid\ngraph TD\n    subgraph \"Entry Points\"\n        PMP[ProjectManagementPage]\n        PDP[ProjectDetailPage]\n    end\n\n    subgraph \"Detail Views\"\n        PDP --> Overview[Overview Tab]\n        PDP --> Schedule[Schedule Tab]\n        PDP --> Scope[Scope Tab]\n        PDP --> Cost[Cost Tab]\n        PDP --> Quality[Quality Tab]\n        PDP --> Resources[Resources Tab]\n        PDP --> Risk[Risk Tab]\n        PDP --> Settings[Settings Tab]\n    end\n\n    subgraph \"Overview Components\"\n        Overview --> PhasesCard\n        Overview --> SummaryCard\n        Overview --> ActivitiesCard\n        Overview --> ProjectInfoCard\n    end\n\n    subgraph \"Schedule Components\"\n        Schedule --> ProjectGanttView\n        ProjectGanttView --> GanttChart\n        ProjectGanttView --> GanttTaskPanel\n    end\n\n    subgraph \"Acceptance Workflow\"\n        Schedule --> ProjectAcceptanceView\n        ProjectAcceptanceView --> acceptanceRepository\n        ProjectAcceptanceView --> taskRepository\n    end\n\n    subgraph \"WBS Components\"\n        Schedule --> ProjectWbsView\n        ProjectWbsView --> WbsTreeTable\n        ProjectWbsView --> WbsNodePanel\n    end\n\n    subgraph \"Team & Members\"\n        Resources --> ProjectMembersView\n        Resources --> ProjectMembersCard\n        Resources --> ProjectTeamView\n    end\n\n    subgraph \"Shared\"\n        PMP --> ProjectToolbar\n        PMP --> ProjectListView\n        PMP --> ProjectGridView\n        PMP --> ProjectKanbanView\n        PMP --> InsightsPanel\n        PMP --> CreateProjectModeModal\n    end\n\n    subgraph \"Data Sources\"\n        acceptanceRepository\n        taskRepository\n        personnelRepository\n        projectGantt[(projectGantt data)]\n        projectWbs[(projectWbs data)]\n        projects[(projects data)]\n    end\n\n    ProjectGanttView --> projectGantt\n    ProjectWbsView --> projectWbs\n    PMP --> projects\n```\n\n## Key Components\n\n### ProjectManagementPage\n\nThe main entry point for the project list view. Manages view mode (list/grid/kanban/calendar/map), filtering, pagination, and project creation.\n\n**State Management:**\n- `viewMode`: Controls the display mode (`'list' | 'grid' | 'kanban' | 'calendar' | 'map'`)\n- `filters`: Object containing `statKey`, `searchQuery`, `groupBy`, `sortBy`, `riskOnly`\n- `currentPage` / `pageSize`: Pagination state\n- `feedback`: Toast notification state for success/error messages\n\n**Key Functions:**\n- `handleSearchChange(query)`: Updates search query and resets page if needed\n- `handleResetFilters()`: Resets all filters to defaults\n- `handleProjectOpen(project)`: Navigates to project detail or calls `onProjectOpen` callback\n- `handleProjectCreate(formData)`: Delegates to `onProjectCreate` and manages feedback\n- `handleStatusUpdate(projectCode, toStatus, reason)`: Delegates to `onProjectStatusUpdate`\n\n**Data Flow:**\n1. Receives `projects` array as prop (or uses empty array)\n2. Computes `stats` via `calculateProjectStats()`\n3. Filters/paginates via `processProjects()` selector\n4. For kanban mode, computes groups via `kanbanGroupByStage()`\n\n### ProjectDetailPage\n\nRenders the full project detail view with tab-based navigation. Determines which tab content to render based on `activeTab` prop.\n\n**Tab Routing:**\n- `overview`: `PhasesCard` + `SummaryCard` + `ActivitiesCard` + `ProjectInfoCard`\n- `schedule`: `ProjectGanttView`\n- `scope`: `ProjectScopeTab`\n- `cost`: `ProjectCostTab`\n- `quality`: `ProjectQualityTab`\n- `resources`: `ProjectResourcesTab`\n- `risk`: `ProjectRiskTab`\n- `settings`: `ProjectSettingsTab`\n\n**Layout:**\n- Uses `AppSidebar` for navigation\n- `PageHeader` for title/subtitle\n- `ProjectBreadcrumb` for breadcrumb navigation\n- `ProjectTabs` for tab switching (uses hash-based routing via `buildProjectDetailTabHash`)\n- `ProjectInfoCard` always visible above tab content\n\n### ProjectAcceptanceView\n\nA complex component managing the acceptance workflow for a project. Handles both acceptance nodes and milestones.\n\n**State:**\n- `nodes`: Array of `AcceptanceNode` — individual acceptance checkpoints\n- `milestones`: Array of `AcceptanceMilestone` — high-level project milestones\n- `searchQuery`, `statusFilter`, `riskFilter`: Filtering state\n- `selectedNode`: Currently selected node for detail drawer\n- `editingMilestone`: Milestone being edited for date changes\n\n**Key Functions:**\n- `updateNodeStatus(id, nextStatus)`: Updates a node's status, triggers rectification task creation if status is `'整改中'` or `'验收不通过'`\n- `updateMilestoneStatus(id, nextStatus)`: Updates milestone status\n- `submitMilestoneDateEdit()`: Validates and saves milestone date changes\n- `buildMilestoneSyncPayload(milestones, nodes)`: Computes summary statistics for parent sync\n\n**Data Persistence:**\n1. On mount, loads state from `acceptanceRepository.load()`\n2. Falls back to local state via `readLocalState()`\n3. On state change, saves via `acceptanceRepository.save()`\n4. Calls `onMilestoneSync` callback with computed payload\n\n**Rectification Task Creation:**\nWhen a node moves to `'整改中'` or `'验收不通过'`, the component calls `taskRepository.createRectificationTaskFromAcceptance()` and logs the result via `onAppendActivityLog`.\n\n### GanttChart\n\nRenders a horizontal Gantt chart with timeline headers, group rows, and task bars/milestones.\n\n**Props:**\n- `timeline`: Array of month objects with `id`, `year`, `label`\n- `groups`: Array of group objects containing `items` (tasks)\n- `selectedTaskId`: Currently selected task\n- `onTaskSelect`: Selection callback\n\n**Layout Calculation:**\n- `META_WIDTH = 338px`: Width of the metadata columns (task name, owner, status)\n- `MONTH_WIDTH = 76px`: Width per month column\n- `buildYearSegments(timeline)`: Groups consecutive months by year for year-row headers\n- `getBarStyle(task)`: Computes `left` and `width` for task bars based on `task.start` and `task.span`\n- `getMilestoneStyle(task)`: Centers milestone diamond on the start month\n- `getProgressStyle(progress)`: Ensures progress bar is between 10% and 100%\n\n**Task Types:**\n- Regular tasks: Rendered as horizontal bars with progress fill\n- Milestones (`task.kind === 'milestone'`): Rendered as diamond shapes\n- Critical tasks: Display a \"关键路径\" pill badge\n\n### GanttTaskPanel\n\nSide panel showing detailed information about the selected Gantt task.\n\n**Renders when `task` is non-null:**\n- Header with project name, task name, status chip\n- Description text\n- Grid fields: phase, task type, start date, end date\n- Progress bar with percentage\n- Owner avatar and name\n- Critical path toggle (visual only)\n- Tags list\n- Dependencies list (or \"无前置任务\" empty state)\n\n### ProjectWbsView\n\nWork Breakdown Structure view with tree table and detail panel.\n\n**State:**\n- `selectedNodeIdByProject`: Per-project selected node tracking\n- `expandedNodeIdsByProject`: Per-project expanded node tracking\n\n**Key Functions:**\n- `collectNodeMap(nodes)`: Builds a flat `Map<string, ProjectWbsNode>` for O(1) lookups\n- `handleSelectNode(nodeId)`: Updates selected node per project\n- `handleToggleNode(nodeId)`: Toggles expanded state per project\n\n**Layout:**\n- Header with summary pills (work packages, tasks, subtasks, delayed nodes)\n- `WbsTreeTable` for the tree view\n- `WbsNodePanel` for detail panel\n\n### ProjectMembersView\n\nRole-based team assignment interface supporting both human and digital employee assignment.\n\n**Data Structures:**\n- `ProjectRoleDefinition`: Defines a role with `id`, `label`, `duty`, `assignmentMode` (single/multiple), `minRequired`, `allowedSources`, `capabilityTags`\n- `MemberCandidate`: Represents a person or digital agent with `source`, `availability`, `capabilities`\n- `AiSuggestion`: AI-generated recommendation with `score`, `reason`, `risk`\n\n**Key Functions:**\n- `openEditor(roleId)`: Opens the assignment editor for a role\n- `toggleDraftSelection(candidateId)`: Toggles candidate selection (respects single/multiple mode)\n- `saveDraftSelection()`: Validates minimum requirements and saves\n- `buildAiSuggestions(role)`: Scores candidates based on capability match, availability, and source\n- `requestAiSuggestion(roleId)`: Generates and stores AI suggestions\n- `applyAiSuggestion(roleId, candidateId)`: Applies a suggested candidate to the role\n\n**Role Definitions:**\n| Role ID | Label | Mode | Min | Sources |\n|---------|-------|------|-----|---------|\n| project-manager | 项目经理 | single | 1 | human |\n| customer-service | 客户服务 | multiple | 1 | human, digital |\n| account-manager | 客户经理 | single | 1 | human |\n| cost-engineer | 预算工程师 | multiple | 0 | human, digital |\n| supervisor | 监理 | multiple | 0 | human, digital |\n| designer | 设计师 | multiple | 0 | human |\n| assistant | 助理 | multiple | 0 | human, digital |\n\n### ProjectTemplateView\n\nDisplays task structure derived from a project template.\n\n**Data Flow:**\n1. If `project.templateId` exists, loads tasks via `getTasksByTemplateId()`\n2. Otherwise, filters `mockTasks` by project name\n3. Computes diagnostics via `getTemplateInstantiationDiagnostics()`\n4. Loads assignee options from `personnelRepository.loadUsers()`\n5. Builds tree view model via `buildTaskTreeViewModel()`\n\n**Task Assignment:**\n- `handleAssignTask(taskCode, assigneeName)`: Updates task owner and status (auto-advances from '待分配' to '待执行')\n\n### TaskDispatchPanel\n\nFocused panel for managing tasks in dispatch pool and pending submission states.\n\n**Filtering:**\n- Dispatch pool: Tasks with status `'草稿'` or `'待分配'` (up to 8)\n- Pending submission: Tasks with status `'待提交'` (up to 8), with material completion tracking\n\n**Navigation:**\n- Calls `onTaskClick` if provided, otherwise uses `goToTaskListWithCode()`\n\n### Supporting Components\n\n| Component | Purpose |\n|-----------|---------|\n| `ProjectBreadcrumb` | Breadcrumb navigation with back button |\n| `ProjectTabs` | Tab navigation using hash-based routing |\n| `ProjectInfoCard` | Project status, sub-status, owner, dates, team size, progress |\n| `PhasesCard` | Phase timeline with progress bars and milestone list |\n| `SummaryCard` | Budget, team size, task completion, risk count |\n| `ActivitiesCard` | Recent activity feed with user, action, detail, time |\n| `ProjectMembersCard` | Team member list with contact actions |\n| `ProjectRisksCard` | Risk list sorted by severity with status indicators |\n| `ProjectDigitalEmployeeView` | Placeholder for digital employee management |\n| `ProjectTeamView` | Placeholder for team management features |\n| `ProjectTaskAndWbsView` | Toggle between WBS and Gantt views |\n\n## Data Dependencies\n\n### Repositories\n- `acceptanceRepository`: `load(projectCode)`, `save(projectCode, state, stats)`\n- `taskRepository`: `createRectificationTaskFromAcceptance(payload)`\n- `personnelRepository`: `loadUsers()`\n\n### Data Modules\n- `data/projects`: `ProjectItem` type and project data\n- `data/projectGantt`: `getProjectGanttData()`, `ProjectGanttData`, `ProjectGanttTaskItem`\n- `data/projectWbs`: `getProjectWbsData()`, `ProjectWbsNode`\n- `data/projectGantt`: Timeline and group data structures\n\n### Domain Logic\n- `domain/projectParentStatus`: `getParentStatusLabel()`, `ParentStatus`, `SubStatusProgress`\n- `domain/projectStatusMachine`: `ProjectStatus` type\n\n### Shared Components\n- `shared/navigation/PageHeader`\n- `shared/AppSidebar`\n- `shared/EmptyState`\n- `shared/StatsCards`\n\n## State Management Patterns\n\n### Per-Project State\nSeveral components maintain per-project state using `Record<string, T>` patterns:\n- `ProjectWbsView`: `selectedNodeIdByProject`, `expandedNodeIdsByProject`\n- `ProjectTaskAndWbsView`: `viewModeByProject`\n\n### Local Persistence\n`ProjectAcceptanceView` uses `readLocalState()` from `acceptanceRepository` for offline-capable state that syncs with remote storage.\n\n### Effect-Based Sync\n```typescript\n// Bootstrap from remote on mount\nuseEffect(() => { /* load from repository */ }, [project.code])\n\n// Sync to parent on state change\nuseEffect(() => { onMilestoneSync?.(payload) }, [milestones, nodes])\n\n// Persist to repository on state change\nuseEffect(() => { repository.save(...) }, [milestoneStats, nodes, project.code])\n```\n\n## Error Handling\n\n- **Acceptance View**: Catches rectification task creation failures and logs via `onAppendActivityLog`\n- **Project Creation**: Displays error message in modal via `createError` state\n- **Status Updates**: Returns `TransitionActionResult` with `ok` and `message` fields\n- **Milestone Date Editing**: Validates format with `isValidDateInput()` and shows inline error\n- **Empty States**: All list components handle empty arrays with `EmptyState` or fallback UI","project-management-module-data":"# Project Management Module — data\n\n# Project Management Module — Data\n\n## Overview\n\nThe `src/data` module provides the data layer for the Project Management feature. It transforms raw project data (from mock sources and task management types) into structured, presentation-ready formats for two primary views: **Gantt charts** and **WBS (Work Breakdown Structure) trees**. The module also defines the core `ProjectItem` type that enriches base project data with budget, team size, date range, and description fields.\n\n## Key Types\n\n### `ProjectItem` (src/data/projects.ts)\n\nThe central project entity. Extends a base `ProjectItem` from the personnel module with:\n\n- `budget` — formatted budget string (e.g., `\"1,280万\"`)\n- `teamSize` — team headcount string (e.g., `\"26人\"`)\n- `dateRange` — date range string (e.g., `\"2024-01-15 ~ 2024-06-15\"`)\n- `description` — project summary text\n\nProjects are loaded from `mockProjects` and enriched with detail overrides per project code. A fallback function generates default values for any project without explicit overrides.\n\n### `WorkItem` (src/domain/workItem)\n\nA domain type representing any unit of work — project, work package, task, subtask, or milestone. Used as the intermediate representation between raw task data and WBS/Gantt views. Key fields:\n\n- `kind` — `'project' | 'work_package' | 'task' | 'subtask' | 'milestone'`\n- `wbsCode` — hierarchical code (e.g., `\"1.2.1.1\"`)\n- `parentId` — reference to parent work item\n- `status`, `progress`, `planStart`, `planEnd`\n- `dependencies` — list of dependent work item IDs\n- `domain` — `'工程' | '设备' | '运营' | '合规' | '通用'`\n\n## Module Structure\n\n```\nsrc/data/\n├── projects.ts          — ProjectItem type, project list, lookup\n├── workItems.ts         — WorkItem generation from projects and tasks\n├── projectGantt.ts      — Gantt chart data transformation\n└── projectWbs.ts        — WBS tree data transformation\n```\n\n## Data Flow\n\n```mermaid\ngraph LR\n    A[mockProjects] --> B[projects.ts]\n    B --> C[ProjectItem]\n    C --> D[workItems.ts]\n    D --> E[WorkItem[]]\n    E --> F[projectGantt.ts]\n    E --> G[projectWbs.ts]\n    F --> H[ProjectGanttData]\n    G --> I[ProjectWbsData]\n    J[TaskItem[]] --> D\n```\n\n## Detailed Module Descriptions\n\n### `projects.ts`\n\n**Purpose:** Define the `ProjectItem` type and provide a project lookup function.\n\n**Key exports:**\n- `projects` — array of all `ProjectItem` instances\n- `getProjectByCode(code: string)` — returns a single project by its code\n\n**Detail overrides:** A `detailOverrides` map stores per-project budget, team size, date range, and description. Projects without overrides receive auto-generated fallback values based on their stage and status.\n\n### `workItems.ts`\n\n**Purpose:** Generate `WorkItem` arrays from two sources:\n1. A `ProjectItem` — produces a full WBS hierarchy (project → work packages → tasks → subtasks) with 4 work packages and ~17 items per project.\n2. An array of `TaskItem` — maps generic task data to `WorkItem` format, inferring source type and domain from task metadata.\n\n**Key functions:**\n- `getProjectWorkItems(project)` — builds the standard project WBS template\n- `mapTasksToWorkItems(tasks)` — converts external task items into work items\n- `getAllWorkItems(project, tasks)` — combines both sources\n\n**Inference logic:** `inferTaskSourceType` uses heuristics on task code, parent path, and project name to determine whether a task belongs to a project, maintenance, inspection, compliance, or ad-hoc domain.\n\n### `projectGantt.ts`\n\n**Purpose:** Transform a `ProjectItem` into `ProjectGanttData` — the data structure for rendering a Gantt chart.\n\n**Key types:**\n- `ProjectGanttData` — contains timeline months, task groups, legend, and summary counts\n- `ProjectGanttGroup` — a phase group (e.g., \"设计阶段\") containing tasks\n- `ProjectGanttTaskItem` — individual task or milestone with start/end dates, progress, status, dependencies\n\n**Key function:**\n- `getProjectGanttData(project)` — builds the complete Gantt data structure\n\n**Internal flow:**\n1. Parse the project's date range to determine timeline start\n2. Generate 10 months of timeline data\n3. Build 4 phase groups (design, structure, site, opening) from templates\n4. For each task, compute actual start/end dates using month offsets and day-of-month values\n5. Resolve dependency IDs to task names for display\n6. Compute summary counts (phases, tasks, milestones)\n\n**Date utilities:**\n- `addMonths`, `startOfMonth`, `getDaysInMonth`, `clampDay` — safe date arithmetic\n- `formatDate` — produces `YYYY-MM-DD` strings\n- `createDateInTimelineMonth` — converts (monthOffset, day) to a real date\n\n### `projectWbs.ts`\n\n**Purpose:** Transform a `ProjectItem` into `ProjectWbsData` — a tree structure for WBS visualization.\n\n**Key types:**\n- `ProjectWbsData` — contains root nodes, focus node ID, expanded IDs, and summary\n- `ProjectWbsNode` — a tree node with type, WBS code, status, progress, and children\n\n**Key function:**\n- `getProjectWbsData(project)` — builds the WBS tree\n\n**Internal flow:**\n1. Retrieve work items via `getProjectWorkItems`\n2. Build a node map from work items, resolving parent-child relationships\n3. Resolve dependency IDs to names\n4. Compute summary counts (work packages, tasks, subtasks, delayed items)\n5. Determine focus node (first incomplete task, or first task, or root)\n6. Collect default expanded IDs (project and work package nodes)\n\n## Usage Examples\n\n```typescript\n// Get a project and its Gantt data\nconst project = getProjectByCode('PRJ-2024-001')\nconst ganttData = getProjectGanttData(project)\n// ganttData.timeline — 10 months\n// ganttData.groups — 4 phase groups with tasks\n\n// Get WBS data\nconst wbsData = getProjectWbsData(project)\n// wbsData.nodes — tree of ProjectWbsNode\n// wbsData.summary.delayedCount — number of delayed items\n\n// Combine project and task work items\nconst allItems = getAllWorkItems(project, externalTasks)\n```\n\n## Dependencies\n\n- **Internal:** `src/domain/workItem` — `WorkItem`, `toWorkItemStatus`, `WORK_ITEM_STATUS_LABEL`\n- **Internal:** `src/components/personnel/projectManagement.data` — `mockProjects`\n- **Internal:** `src/components/personnel/projectManagement.types` — base `ProjectItem`, `ProjectMember`, `ProjectRisk`\n- **Internal:** `src/components/task/taskManagement.types` — `TaskItem`","project-management-module-domain":"# Project Management Module — domain\n\n# Project Management Module — Domain\n\n## Overview\n\nThe domain module provides the core data types, state machine logic, and status mapping for the project management system. It defines two parallel status systems — a **legacy flat status** model and a **new hierarchical parent/sub-status** model — along with transition guards, hooks, and view helpers.\n\n## Key Components\n\n### 1. Parent Status & Sub-Status Progress (`projectParentStatus.ts`)\n\nDefines the lifecycle of a project as a sequence of five parent statuses:\n\n```typescript\nexport type ParentStatus = '启动' | '计划' | '执行' | '收尾' | '归档'\n```\n\nEach parent status contains a list of sub-status items that track granular progress:\n\n```typescript\nexport type SubStatusProgressItem = {\n  subStatusId: string\n  name: string\n  sortOrder: number\n  isMilestone: boolean\n  completed: boolean\n  completedAt?: string\n  linkedTaskCode?: string\n}\n```\n\n**Key functions:**\n\n- `getNextParentStatus(current)` — Returns the next status in the flow, or `null` if at the end.\n- `getParentStatusLabel(status)` — Returns a display label (e.g., `'执行'` → `'执行（含监控）'`).\n- `getParentStatusTone(status)` — Returns a UI tone (`'blue'`, `'yellow'`, `'green'`, `'red'`).\n- `allMilestonesCompleted(progress)` — Checks if all milestone items in a sub-status progress are completed.\n- `getCurrentSubStatus(progress)` — Returns the first incomplete sub-status item, or `null`.\n- `getSubStatusProgressPercent(progress)` — Calculates completion percentage across all sub-status items.\n\n### 2. Status State Machine (`projectStatusMachine.ts`)\n\nContains both the legacy flat status machine and the new parent-status-based transition logic.\n\n#### Legacy Status Model\n\n```typescript\nexport type ProjectStatus =\n  | '待立项' | '待确认' | '待拆解' | '执行中'\n  | '待验收' | '整改中' | '待结算' | '已归档' | '已中止'\n```\n\nThe legacy model uses `allowedTransitions` to define valid transitions between statuses:\n\n```typescript\nexport const allowedTransitions: Record<ProjectStatus, ProjectStatus[]> = {\n  待立项: ['待确认', '已中止'],\n  待确认: ['待拆解', '已中止'],\n  // ... etc\n}\n```\n\n#### New Parent Status Transitions\n\n```typescript\nexport const parentStatusTransitions: Record<ParentStatus, ParentStatus[]> = {\n  启动: ['计划'],\n  计划: ['执行'],\n  执行: ['收尾'],\n  收尾: ['归档'],\n  归档: [],\n}\n```\n\nThe `canTransitionParentStatus` function enforces:\n1. The transition must be in the allowed list.\n2. All milestones in the current sub-status progress must be completed.\n\n#### Guard Context\n\nThe `GuardContext` type defines conditions checked during transitions:\n\n```typescript\nexport type GuardContext = {\n  hasContainer: boolean\n  hasApproval: boolean\n  hasMilestones: boolean\n  hasTaskTree: boolean\n  hasStandardBinding: boolean\n  keyTasksCompleted: boolean\n  acceptancePassed: boolean\n  hasAcceptanceFeedback: boolean\n  rectificationClosed: boolean\n  settlementCompleted: boolean\n}\n```\n\nThe legacy `canTransition` function checks these guards for each specific transition (e.g., `'待拆解' → '执行中'` requires `hasContainer`, `hasMilestones`, `hasTaskTree`, and `hasStandardBinding`).\n\n#### Hooks\n\nHooks are async actions executed when entering a status:\n\n```typescript\nexport type HookAction = (context: HookActionContext) => Promise<HookActionResult>\n```\n\n- `getEnterStatusHooks(status)` — Returns hooks for legacy statuses (e.g., entering `'待拆解'` initializes the task tree).\n- `getParentEnterStatusHooks(status)` — Returns hooks for parent statuses (e.g., entering `'执行'` starts risk monitoring).\n- `executeEnterStatusHooks(status, context)` — Executes all hooks for a given status, catching errors.\n\n#### Status Mapping\n\n- `legacyStatusMap` — Maps each `ParentStatus` to a `ProjectStatus` (e.g., `'启动'` → `'待立项'`).\n- `parentStatusFromLegacy(status)` — Reverse mapping from legacy to parent status.\n\n### 3. Status View Helpers (`projectStatusView.ts`)\n\nProvides UI-oriented functions that derive display properties from status values.\n\n**Legacy helpers:**\n\n- `getProjectStageByStatus(status)` — Maps legacy status to a `ProjectStage` (`'启动'`, `'计划'`, `'执行'`, `'监控'`, `'收尾'`).\n- `getProjectStatusTone(status)` — Returns a UI tone for legacy statuses.\n- `getProgressFloorByStatus(status)` — Returns a progress percentage floor for each legacy status (e.g., `'执行中'` → 40).\n- `normalizeProjectStatus(rawStatus)` — Maps various raw string values to canonical `ProjectStatus` values.\n\n**Parent status helpers:**\n\n- `getParentStatusStage(parent)` — Maps parent status to `ProjectStage`.\n- `getParentProgressFloor(parent)` — Returns a progress floor (e.g., `'计划'` → 20, `'归档'` → 100).\n- `getParentStatusTone(parent)` — Re-exports from `projectParentStatus`.\n\n### 4. Work Item Types (`workItem.ts`)\n\nDefines the `WorkItem` interface and related types for representing tasks within projects:\n\n```typescript\nexport interface WorkItem {\n  id: string\n  sourceType: WorkItemSourceType\n  projectCode?: string\n  taskCode?: string\n  parentId: string | null\n  kind: WorkItemKind\n  wbsCode: string\n  name: string\n  owner: string\n  status: WorkItemStatus\n  progress: number\n  planStart: string\n  planEnd: string\n  dependencies: string[]\n  isCritical: boolean\n  // ... optional fields\n}\n```\n\nKey utility functions:\n- `toWorkItemStatus(status, blocked?)` — Normalizes various status strings to `WorkItemStatus` (`'completed'`, `'in-progress'`, `'delayed'`, `'planned'`).\n\n## Architecture\n\n```mermaid\ngraph TD\n    A[projectParentStatus.ts] -->|types & helpers| B[projectStatusMachine.ts]\n    A -->|types & helpers| C[projectStatusView.ts]\n    B -->|legacy types| C\n    D[workItem.ts] -->|WorkItem type| E[Other modules]\n    \n    subgraph \"Domain Layer\"\n        A\n        B\n        C\n        D\n    end\n    \n    F[UI Components] -->|uses| C\n    G[Service Layer] -->|uses| B\n    H[API Layer] -->|uses| A\n```\n\n## Usage Patterns\n\n### Transitioning a Project (New Model)\n\n```typescript\nimport { canTransitionParentStatus } from './projectStatusMachine'\nimport { getNextParentStatus } from './projectParentStatus'\n\nconst currentParent = '计划'\nconst nextParent = getNextParentStatus(currentParent) // '执行'\n\nconst result = canTransitionParentStatus(\n  currentParent,\n  nextParent,\n  subStatusProgress,\n  guardContext\n)\n\nif (result.ok) {\n  // Execute hooks\n  const hooks = getParentEnterStatusHooks(nextParent)\n  for (const hook of hooks) {\n    await hook({ projectCode, projectName, operator })\n  }\n  // Update project status\n}\n```\n\n### Normalizing External Status Values\n\n```typescript\nimport { normalizeProjectStatus } from './projectStatusView'\n\nconst rawStatus = '进行中'\nconst normalized = normalizeProjectStatus(rawStatus) // '执行中'\n```\n\n### Calculating Progress Display\n\n```typescript\nimport { getParentProgressFloor, getSubStatusProgressPercent } from './domain'\n\nconst floor = getParentProgressFloor('执行') // 40\nconst percent = getSubStatusProgressPercent(progress) // e.g., 60\n// Display: 40% + (60% of remaining 60%) = 76%\n```\n\n## Dependencies\n\nThis module has **no internal dependencies** on other modules in the codebase. It is consumed by:\n- UI components (for status display and transition buttons)\n- Service layer (for status validation and hook execution)\n- API layer (for status mapping and normalization)","project-management-module-utils":"# Project Management Module — utils\n\n# Project Management Module — `utils`\n\n## Overview\n\nThe `utils` module provides a collection of pure, stateless helper functions for project-related business logic. These functions have no side effects, do not depend on React lifecycle, and can be safely called from any context (components, state machines, tests, etc.).\n\n## Key Functions\n\n### `parseProgressPair(value: string): { done: number; total: number }`\n\nParses a `\"done/total\"` progress string into a structured object.\n\n- **Input**: A string like `\"3/5\"` or `\"\"`\n- **Output**: `{ done: number, total: number }`\n- **Edge cases**: Returns `{ done: 0, total: 0 }` for empty strings or invalid numeric values\n\n**Example:**\n```typescript\nparseProgressPair(\"3/5\")   // → { done: 3, total: 5 }\nparseProgressPair(\"\")      // → { done: 0, total: 0 }\nparseProgressPair(\"abc\")   // → { done: 0, total: 0 }\n```\n\n### `parseBudgetToWan(value: string): number`\n\nExtracts a numeric budget value from a formatted Chinese currency string.\n\n- **Input**: A string like `\"¥ 56.5万\"` or `\"¥ 168万\"`\n- **Output**: A number representing the value in 万元 (ten-thousands of yuan)\n- **Edge cases**: Returns `0` for non-numeric input\n\n**Example:**\n```typescript\nparseBudgetToWan(\"¥ 56.5万\")  // → 56.5\nparseBudgetToWan(\"¥ 168万\")   // → 168\nparseBudgetToWan(\"\")          // → 0\n```\n\n### `getProgressCeilingByStatus(status: ProjectStatus): number`\n\nReturns the maximum allowed progress percentage for a given project status. This enforces business rules that prevent status-progress mismatches (e.g., a project in \"待立项\" status cannot exceed 20% progress).\n\n**Status-to-ceiling mapping:**\n\n| Status | Ceiling |\n|--------|---------|\n| 待立项 | 20 |\n| 待确认 | 35 |\n| 待拆解 | 55 |\n| 执行中 / 整改中 | 89 |\n| 待验收 | 95 |\n| 待结算 | 99 |\n| 已归档 / 已中止 | 100 |\n| (default) | 100 |\n\n### `buildGuardContextFromProject(project: ProjectItem): GuardContext`\n\nConstructs a `GuardContext` object from a `ProjectItem` for use with the `projectStatusMachine.canTransition` method. This function translates raw project data into the boolean flags required by the state machine's guard conditions.\n\n**Guard context fields and their derivation:**\n\n| Field | Derivation |\n|-------|------------|\n| `hasContainer` | Always `true` |\n| `hasApproval` | `project.progress >= 10` OR `project.stage !== '启动'` |\n| `hasMilestones` | Parsed milestone total > 0 |\n| `hasTaskTree` | Parsed task total > 0 |\n| `hasStandardBinding` | `project.templateId` is truthy OR `project.progress > 0` |\n| `keyTasksCompleted` | If tasks exist: `done/total >= 0.85`; otherwise: `progress >= 90` |\n| `acceptancePassed` | `progress >= 95` AND `riskLevel !== 'critical'` |\n| `hasAcceptanceFeedback` | `riskLevel` is not null OR `progress >= 85` |\n| `rectificationClosed` | `progress >= 90` |\n| `settlementCompleted` | `progress >= 98` OR status is `'已归档'` |\n\n## Usage Context\n\nThese utilities are consumed by:\n\n- **`src/App.tsx`** — The main application component uses these helpers for data transformation and validation\n- **`src/domain/projectStatusMachine.ts`** — The state machine uses `buildGuardContextFromProject` to evaluate transition guards\n- **Any component** that needs to parse progress strings, format budgets, or enforce status-based progress limits\n\n## Design Decisions\n\n1. **Pure functions only** — No state, no side effects, no React dependencies. This makes the module testable and reusable across different contexts (components, state machines, server-side code).\n\n2. **Defensive parsing** — Both `parseProgressPair` and `parseBudgetToWan` handle malformed input gracefully by returning sensible defaults (`0` or `{ done: 0, total: 0 }`).\n\n3. **Explicit ceiling mapping** — The `getProgressCeilingByStatus` function uses an exhaustive `switch` statement rather than a lookup table, making the business rules explicit and easy to audit.\n\n4. **Guard context as a bridge** — `buildGuardContextFromProject` serves as an adapter between the raw `ProjectItem` data model and the `GuardContext` type expected by the state machine, keeping the state machine logic decoupled from the data layer.","project-management-module":"# Project Management Module\n\n# Project Management Module\n\n## Overview\n\nThe Project Management Module provides a complete UI and data layer for managing construction projects through their full lifecycle. It covers project listing, creation, detailed execution tracking (via Gantt charts and WBS trees), acceptance workflows, and team management. The module is organized into four sub-modules that work together to deliver a cohesive project management experience.\n\n## Sub-module Architecture\n\nThe module is structured as a layered architecture:\n\n- **[Components](components.md)** — The presentation layer containing all React UI components for project views, including `ProjectAcceptanceView`, `GanttChart`, `TaskTreeView`, `WbsTreeTable`, `ProjectMembersView`, and `TaskDispatchPanel`. These components consume data from the data layer and coordinate with shared UI components like `AppSidebar` and `PageHeader`.\n\n- **[Data](data.md)** — Transforms raw project data into presentation-ready formats for Gantt charts and WBS trees. Defines the core `ProjectItem` type with budget, team size, date range, and description fields. Key functions include `getProjectGanttData` and `getProjectWbsData`.\n\n- **[Domain](domain.md)** — Provides core types and business logic, including two parallel status systems: a legacy flat status model and a new hierarchical parent/sub-status model (`ParentStatus` types: `'启动' | '计划' | '执行' | '收尾' | '归档'`). Includes state machine logic, transition guards, and view helpers.\n\n- **[Utils](utils.md)** — Pure, stateless helper functions for project business logic, such as `parseProgressPair` for parsing `\"done/total\"` progress strings.\n\n## Key Workflows\n\nThe sub-modules collaborate in several critical workflows:\n\n1. **Acceptance Workflow** — `ProjectAcceptanceView` (components) calls `bootstrapAcceptance` → `readAcceptanceState` → `createInitialAcceptanceState` → `createMilestonesForProject` → `parseProgressPair` (utils). This chain initializes and manages the project acceptance state with milestone tracking.\n\n2. **Gantt Chart Rendering** — `getProjectGanttData` (data) calls `createTimeline` → `addMonths`, `createDateInTimelineMonth` → `clampDay` → `getDaysInMonth`, and `parseProjectRange` → `startOfMonth`. The resulting data is consumed by `GanttChart` (components) which also uses `getMilestoneStyle` and `buildYearSegments`.\n\n3. **WBS Tree Construction** — `getProjectWbsData` (data) calls `toWbsNodes`, `countDelayedNodes`, and `countNodesByType`. The output feeds `WbsTreeTable` (components) which uses `buildVisibleRows`, and `ProjectWbsView` which uses `collectNodeMap` and `visit`.\n\n4. **Task Management** — `mapTasksToWorkItems` (data) calls `inferTaskSourceType` and `inferDomain`. Task data is rendered by `TaskTreeView` (components) using `collectLevel0`, and dispatched via `TaskDispatchPanel` using `handleTaskClick`.\n\n5. **Team Management** — `ProjectMembersView` (components) uses `getRoleAssignees` and `saveDraftSelection` → `closeEditor` for managing project team members.\n\n## Data Flow\n\nThe module follows a unidirectional data flow: domain types define the structure, data functions transform raw inputs into view models, and components render those models while handling user interactions. The utils module provides stateless helpers used across all layers. Status transitions are governed by the domain's state machine logic, ensuring consistent project lifecycle management.","scripts-prompts":"# Scripts & Prompts\n\n# Scripts & Prompts 模块\n\n## 概述\n\nScripts & Prompts 模块包含项目自动化脚本和 AI 助手系统提示。脚本负责日常日志生成和 CSS 颜色治理，提示文件定义 AI 助手的行为规范。该模块是项目基础设施的一部分，不直接参与运行时逻辑，但维护代码质量和开发工作流。\n\n## 脚本\n\n### 1. `generate-daily-log.sh` — 每日项目日志生成\n\n**用途**：自动生成包含代码活动、工作区状态和项目指标的结构化日志文件。\n\n**工作流程**：\n1. 创建日志目录 `.codebuddy/daily-logs/`\n2. 收集 Git 数据：昨日提交记录、变更统计、当前分支、最近提交\n3. 扫描源文件数量（TypeScript/TSX、CSS）\n4. 读取 `.workbuddy/memory/` 中的当日工作记忆\n5. 生成 Markdown 日志文件，包含以下章节：\n   - 代码活动（昨日提交、变更统计）\n   - 工作区状态（`git status` 输出）\n   - 项目指标（文件数、分支、最近提交）\n   - 今日工作要点（来自工作记忆文件）\n   - 明日建议（基于工作区是否干净）\n\n**依赖**：Git 仓库、`.workbuddy/memory/` 目录（可选）\n\n### 2. `replace-css-colors.py` — CSS 硬编码色值批量替换\n\n**用途**：将 CSS 文件中的硬编码颜色值替换为 CSS 变量引用，实现主题化。\n\n**核心组件**：\n- `COLOR_MAP`：颜色值到 CSS 变量的映射字典，按匹配优先级排序（长值优先）\n- `add_variables_to_index_css()`：将新变量定义追加到 `index.css` 的 `:root` 中\n- `replace_in_file()`：对单个 CSS 文件执行替换，跳过 `index.css` 和 `App.css`\n\n**执行流程**：\n```\nmain()\n  ├── add_variables_to_index_css()  // 先更新变量定义\n  └── for each CSS file:\n       └── replace_in_file()        // 替换硬编码色值\n```\n\n**替换策略**：\n- 按颜色字符串长度降序匹配，避免短模式提前替换导致长模式无法匹配\n- 大小写不敏感替换（对十六进制颜色）\n- 跳过 `index.css` 和 `App.css`（避免自引用）\n\n### 3. `tokenize-css.py` — CSS Token 治理脚本\n\n**用途**：扩展 `:root` Token 体系，批量替换 `index.css` 中的高频硬编码颜色。\n\n**与 `replace-css-colors.py` 的区别**：\n- 专门处理 `index.css` 文件\n- 在 `:root` 块内插入新变量定义\n- 跳过 `:root` 块内的替换（避免自引用）\n- 使用正则模式匹配（支持多种空格格式）\n\n**核心组件**：\n- `NEW_TOKENS`：新增变量定义字符串\n- `REPLACEMENTS`：正则模式到 CSS 变量的替换列表\n- `process_css()`：解析 `:root` 块范围，插入新变量，执行替换\n\n**执行流程**：\n```\nmain()\n  └── process_css(content)\n       ├── 定位 :root 块\n       ├── 插入新变量定义\n       └── 对 :root 块外内容执行替换\n```\n\n## 提示文件\n\n### `build-zh.txt` — AI 助手系统提示\n\n**用途**：定义 AI 助手（Build agent）的行为规范，强制中文推理。\n\n**关键指令**：\n1. **中文推理优先**：所有意图声明、思考链、分析步骤必须使用中文\n2. **工具访问**：拥有完整的文件读写、命令执行、搜索等工具权限\n3. **行为规范**：简洁直接、必要时提问、任务完成后报告\n\n**架构位置**：作为系统提示附加到 AI 助手的上下文开头，项目级指令文件会追加在其后。\n\n## 模块关系图\n\n```mermaid\ngraph TD\n    A[generate-daily-log.sh] -->|读取| B[.workbuddy/memory/]\n    A -->|写入| C[.codebuddy/daily-logs/]\n    A -->|查询| D[Git 仓库]\n    \n    E[replace-css-colors.py] -->|修改| F[src/**/*.css]\n    E -->|追加变量| G[src/index.css]\n    \n    H[tokenize-css.py] -->|扩展 Token| G\n    H -->|替换硬编码| G\n    \n    I[build-zh.txt] -->|定义行为| J[AI Build Agent]\n```\n\n## 使用方式\n\n### 每日日志生成\n```bash\n# 手动运行（通常由 cron 或 CI 触发）\nbash scripts/generate-daily-log.sh\n```\n\n### CSS 颜色治理\n```bash\n# 批量替换所有模块 CSS\npython3 scripts/replace-css-colors.py\n\n# 治理 index.css Token\npython3 scripts/tokenize-css.py\n```\n\n### 提示文件\n提示文件由 AI 助手框架自动加载，无需手动操作。`build-zh.txt` 作为系统提示的一部分，确保所有推理过程使用中文。\n\n## 注意事项\n\n1. **替换顺序**：`replace-css-colors.py` 和 `tokenize-css.py` 都按颜色字符串长度降序匹配，避免短模式提前替换导致长模式无法匹配\n2. **自引用保护**：`tokenize-css.py` 跳过 `:root` 块内的替换，防止变量定义被自身替换\n3. **文件排除**：`replace-css-colors.py` 跳过 `index.css` 和 `App.css`，避免破坏全局样式定义\n4. **工作记忆**：`generate-daily-log.sh` 依赖 `.workbuddy/memory/` 目录，该目录由其他工具维护","services-api-layer":"# Services & API Layer\n\n# Services & API Layer\n\n## Overview\n\nThe Services & API Layer provides a structured, resilient communication bridge between the application's UI components and both remote APIs and local storage. It implements a three-tier architecture:\n\n1. **API Client** — Low-level HTTP communication with retry, idempotency, and fallback\n2. **Server Adapter** — Typed API endpoints mapped to domain operations\n3. **Repositories** — Data persistence with remote-first, local-fallback strategy\n\nThe layer also includes a unified error model (`StructuredError`) that standardizes error handling across all tiers.\n\n## Architecture\n\n```mermaid\ngraph TD\n    UI[UI Components] --> Repos[Repositories]\n    Repos --> Adapter[Server Adapter]\n    Repos --> Local[localStorage]\n    Adapter --> Client[API Client]\n    Client --> Remote[Remote API]\n    Repos --> Errors[StructuredError]\n    Client --> Errors\n```\n\n## Key Components\n\n### 1. API Client (`client.ts`)\n\nThe core HTTP client that handles all network communication.\n\n**`apiRequest<T>(path, options)`** — Generic request function with:\n- Automatic `Content-Type: application/json` headers\n- Idempotency key support via `X-Idempotency-Key` header\n- Configurable retry logic (default: 1 retry) for status codes 408, 425, 429, 500, 502, 503, 504\n- Exponential backoff: `(attempt + 1) * 300ms`\n- Network error detection and fallback event emission\n- Special handling for unset environment IDs (throws `REMOTE_DISABLED`)\n\n**`ApiError`** — Structured error class with status code and optional error code, providing `toLogString()` for traceable logging.\n\n**Fallback Mechanism**: When the API is unreachable or returns errors, `emitRemoteFallback()` dispatches a `pm:remote-fallback` custom event with full context (scope, reason, status, scenario, idempotency key).\n\n### 2. Server Adapter (`serverAdapter.ts`)\n\nTyped API endpoint definitions that map domain operations to HTTP requests.\n\n**Key patterns:**\n- All endpoints include `envId` query parameter via `withEnv()`\n- Idempotency keys generated via `createIdempotencyKey(scope, target?)` using timestamp + random suffix\n- CRUD operations for projects, tasks, and audit logs\n\n**Endpoints:**\n| Operation | Method | Path |\n|-----------|--------|------|\n| Get projects | GET | `/projects` |\n| Get project by code | GET | `/projects/:code` |\n| Create project | POST | `/projects` |\n| Update project | PUT | `/projects/:code` |\n| Delete project | DELETE | `/projects/:code` |\n| Get all tasks | GET | `/tasks/all` |\n| Get project tasks | GET | `/projects/:code/tasks` |\n| Create task | POST | `/projects/:code/tasks` |\n| Update task | PUT | `/projects/:code/tasks/:taskCode` |\n| Delete task | DELETE | `/projects/:code/tasks/:taskCode` |\n| Get task tree | GET | `/projects/:code/tasks/tree` |\n| Get audit logs | GET | `/audit/logs` |\n| Append audit log | POST | `/audit/logs` |\n\n### 3. Repositories\n\nEach repository follows a consistent pattern: **remote-first, local-fallback**, with dual-write to localStorage for offline resilience.\n\n#### `projectRepository.ts`\n- **`loadState()`** — Loads projects from remote API, falls back to localStorage. Includes auto-migration: if remote is empty but local has data, pushes local data to server.\n- **`getProjects()`**, **`getProjectByCode()`** — Remote-first with local fallback\n- **`createProject()`**, **`updateProject()`**, **`deleteProject()`** — Remote operation with dual-write to localStorage\n- Uses `StructuredError` for error logging during persistence failures\n\n#### `taskRepository.ts`\n- **`loadTasks(contextKey)`** — Loads tasks for a project context. Special handling for `__all` context (cross-project API). Includes auto-migration similar to projects.\n- **`updateTask()`**, **`deleteTask()`** — Remote-first with local fallback. On failure, applies changes locally.\n- **`createRectificationTaskFromAcceptance()`** — Complex domain logic: creates a rectification task from acceptance failure, inheriting properties from reference tasks, with deduplication and audit logging.\n- **`appendOperationLog()`** — Writes operation logs locally and syncs to audit API\n- **`appendAuditEvents()`** — Batch audit event persistence with localStorage cap of 200 entries\n\n#### `personnelRepository.ts` & `supplierRepository.ts`\n- Local-only repositories with initial state from static data files\n- `loadUsers()` / `loadSuppliers()` — Read from localStorage, fall back to initial data\n- `saveUsers()` / `saveSuppliers()` — Persist to localStorage\n- `getNextUserId()` / `getNextSupplierId()` — ID generation based on existing max\n\n#### `acceptanceRepository.ts`\n- Local-only persistence for acceptance state snapshots\n- `load()` / `save()` — Read/write structured acceptance data with validation\n\n#### `auditRepository.ts`\n- Thin wrapper around `serverAdapter.appendAuditLog()`\n- Non-blocking: logs errors but never throws\n\n#### `governanceRepository.ts` & `orderRepository.ts`\n- Simple localStorage repositories for settings and order state\n- Default values and validation on read\n\n#### `settlementRepository.ts`\n- Pure computation: builds settlement suggestions from project data\n- No persistence — transforms project state into settlement candidates\n\n### 4. Error Model (`StructuredError.ts`)\n\nUnified error handling across all layers.\n\n**`StructuredError`** — Extends `Error` with:\n- `code` — Typed error code (`NETWORK_ERROR`, `VALIDATION_ERROR`, `BUSINESS_ERROR`, etc.)\n- `scope` — Origin layer (`api`, `repository`, `domain`, `ui`)\n- `scenario` — Context identifier for tracing\n- `status` — HTTP status code (when applicable)\n- `idempotencyKey` — For deduplication debugging\n- `at` — ISO timestamp of error creation\n\n**Helper functions:**\n- `createNetworkError()`, `createValidationError()`, `createBusinessError()`, `createIdempotencyConflictError()`\n- `StructuredError.fromRaw()` — Wraps unknown errors into structured format\n- `errorLogger.log()` / `errorLogger.report()` — Console logging with future remote reporting support\n\n**Utility methods:**\n- `isNetworkError()` — Check if network-related\n- `isIdempotencyConflict()` — Check for duplicate request detection\n- `isRetryable()` — Check if error can be retried (NETWORK_ERROR, RATE_LIMIT_EXCEEDED, SERVER_ERROR, RETRY_EXHAUSTED)\n\n### 5. Zustand Store (`projectStore.ts`)\n\nWhile not strictly part of the services layer, the store integrates with repositories via ADR-001:\n- Uses `persist` middleware for automatic localStorage synchronization\n- Provides selectors (`selectProjectByCode`, `selectProjectLogs`)\n- Actions include status transitions, milestone sync, and parent status updates\n- Critical operations (create, status change) should additionally call `projectRepository.saveState()` for remote sync\n\n## Data Flow\n\n```\nUI Component\n    ↓\nRepository (remote-first)\n    ├── Server Adapter → API Client → Remote API\n    └── localStorage (fallback / dual-write)\n        ↓\nStructuredError (on failure)\n    └── errorLogger.log() / errorLogger.report()\n```\n\n## Error Handling Strategy\n\n1. **Network errors**: API client retries up to configured attempts, then throws `ApiError` with `NETWORK_ERROR` code\n2. **API errors**: Non-retryable status codes throw immediately with server-provided error message/code\n3. **Repository failures**: Caught and wrapped in `StructuredError`, logged via `errorLogger`, then fallback data returned\n4. **Persistence errors**: Non-blocking — logged but never thrown to avoid disrupting user flow\n5. **Audit failures**: Silently ignored — audit is best-effort and must not block primary operations\n\n## Configuration\n\n- `VITE_API_BASE_URL` — Base URL for API requests (defaults to `/api`)\n- `VITE_TCB_ENV_ID` — Environment ID appended to all requests (defaults to `unset-env`)\n- `DEFAULT_RETRIES` — 1 retry by default for retryable status codes","shared-ui-components":"# Shared UI Components\n\n# Shared UI Components Module\n\n## Overview\n\nThe Shared UI Components module provides a reusable, themable component library for the project management application. It encapsulates common UI patterns—data display, filtering, pagination, feedback, and iconography—into consistent, well-typed components. All components use a CSS custom property system (`--pm-*`) for theming and support a configurable `classNamePrefix` for namespace isolation.\n\n## Architecture\n\nThe module is organized into four subdirectories, each serving a distinct concern:\n\n```\nsrc/components/shared/\n├── data-display/          # Data presentation components\n│   ├── Pagination/        # Page navigation\n│   ├── StatCard/          # Single metric card\n│   └── StatsCards/        # Group of StatCards\n├── feedback/              # User feedback components\n│   └── EmptyState.tsx     # Empty/no-data state\n├── filters/               # Filtering and search\n│   └── ListToolbar/       # View toggle + search bar\n├── hooks/                 # Shared state logic\n│   └── useListState.ts    # List pagination/filter hook\n├── icons/                 # Icon system\n│   ├── Icon.tsx           # Icon component\n│   └── index.ts           # Icon registry and types\n├── mui/                   # MUI wrapper components\n│   ├── PmButton.tsx       # Themed button\n│   ├── PmInput.tsx        # Themed input with clear\n│   ├── PmTable.tsx        # Themed table with skeleton\n│   └── index.ts           # Re-exported MUI components\n├── ProjectCard.tsx        # Project card (grid/kanban/compact)\n└── ProjectCard.css        # Project card styles\n```\n\n## Key Components\n\n### ProjectCard\n\nRenders a project item in one of three visual variants: `grid`, `kanban`, or `compact`. The variant is selected via the `variant` prop.\n\n- **Grid variant**: A multi-column card showing all project fields (name, code, brand, status, progress, stage, owner, dates). Includes an \"open\" action button.\n- **Kanban variant**: A compact card optimized for kanban boards, showing name, code, status, progress, owner, and deadline.\n- **Compact variant**: A minimal single-row card showing name, status, and a progress meter.\n\nAll variants support an optional `onClick` handler. When provided, the card becomes clickable with a pointer cursor. The `statusTone` field on the project item controls the color of the status pill (blue, yellow, green, red).\n\n```tsx\n<ProjectCard\n  project={project}\n  variant=\"grid\"\n  onClick={handleProjectClick}\n/>\n```\n\n### Pagination\n\nA fully controlled pagination component. It displays total record count, current page, page size, and navigation arrows. The `classNamePrefix` prop allows namespace customization (defaults to `pm`).\n\n```tsx\n<Pagination\n  total={100}\n  currentPage={1}\n  pageSize={10}\n  onPageChange={setPage}\n/>\n```\n\n### StatCard & StatsCards\n\n`StatCard` displays a single metric with an icon, label, value, optional delta (trend indicator), and sub-label. It supports `vertical` and `horizontal` layouts. The `trend` prop can be explicitly set (`up`/`down`/`neutral`) or auto-inferred from the `delta` string (e.g., `+12%` → `up`).\n\n`StatsCards` renders a group of `StatCard` components from an array of items. It supports an `activeKey` for highlighting the selected card and an `onItemClick` callback.\n\n```tsx\n<StatsCards\n  items={[\n    { key: 'revenue', icon: 'dollar', label: '收入', value: '¥1,234', tone: 'green', delta: '+12%' },\n    { key: 'tasks', icon: 'task', label: '任务', value: 42, tone: 'blue' },\n  ]}\n  activeKey=\"revenue\"\n  onItemClick={handleStatClick}\n/>\n```\n\n### EmptyState\n\nA flexible empty-state component for displaying \"no data\" or \"no results\" scenarios. Supports an icon (either as a React node or image URL), title, description, and optional children for action buttons. The `compact` prop renders a smaller variant.\n\n```tsx\n<EmptyState\n  iconSrc=\"/assets/empty.svg\"\n  title=\"暂无数据\"\n  description=\"请调整筛选条件后重试\"\n/>\n```\n\n### ListToolbar\n\nA toolbar combining view mode toggles (e.g., grid/kanban/list) with a search input. The `rightSlot` prop allows injecting additional controls (e.g., filter buttons, action buttons) on the right side.\n\n```tsx\n<ListToolbar\n  viewModes={[\n    { key: 'grid', label: '网格' },\n    { key: 'kanban', label: '看板' },\n  ]}\n  activeView=\"grid\"\n  onViewChange={setView}\n  searchQuery={search}\n  onSearchChange={setSearch}\n  rightSlot={<button>筛选<\/button>}\n/>\n```\n\n### useListState Hook\n\nA generic hook that manages list state: search query, filters, pagination, and data processing. It accepts a `process` function that transforms the source data based on current state and returns `{ data, total }`. The hook returns reactive state and setters.\n\n```tsx\nconst { data, total, currentPage, setCurrentPage, searchQuery, setSearchQuery } = useListState({\n  source: projects,\n  initialFilters: { status: 'active' },\n  pageSize: 20,\n  process: ({ source, filters, page, pageSize, searchQuery }) => {\n    // Apply filters, search, and pagination\n    return { data: filtered, total: filtered.length };\n  },\n});\n```\n\n### Icon System\n\nThe icon system provides a centralized registry of SVG icons with semantic names. The `Icon` component renders an `<img>` tag with the correct path from the registry. Sizes are predefined (`xs`=12px, `sm`=16px, `md`=20px, `lg`=24px, `xl`=32px) or custom numeric values.\n\n```tsx\n<Icon name=\"search\" size=\"lg\" />\n<Icon name=\"add\" size={18} className=\"custom-icon\" />\n```\n\nThe registry (`index.ts`) exports:\n- `IconName` type (union of all icon names)\n- `iconPaths` record mapping names to file paths\n- `getIconPath()` function for path resolution\n- `hasIcon()` type guard\n- `navIconMap` for sidebar navigation mapping\n\n### MUI Wrapper Components\n\nThree components wrap Material-UI (MUI) with project-specific theming:\n\n- **PmButton**: Maps `variant` (`primary`/`secondary`/`ghost`/`danger`/`icon`) to MUI variants. Supports `loading` state with a spinner. Sizes `sm` (28px) and `md` (32px).\n- **PmInput**: Wraps MUI `TextField` with an optional clearable button. Supports both controlled and uncontrolled usage.\n- **PmTable**: A themed table with skeleton loading, empty state, and pagination. Accepts typed column definitions with custom render functions.\n\nThe `mui/index.ts` file re-exports commonly used MUI components (Button, Dialog, Typography, etc.) so that pages import from a single source, enabling future theme-wide changes.\n\n## Theming\n\nAll components use CSS custom properties for theming. The key variables are:\n\n| Variable | Purpose |\n|---|---|\n| `--pm-card` | Card background |\n| `--pm-border` | Border color |\n| `--pm-text-white` | Primary text color |\n| `--pm-text-60` | Secondary text (60% opacity) |\n| `--pm-text-40` | Muted text (40% opacity) |\n| `--pm-element` | Element hover background |\n| `--pm-primary` | Primary accent color |\n| `--pm-blue-light` | Blue gradient end |\n| `--pm-radius-xl` | Large border radius |\n| `--pm-shadow-md` | Medium box shadow |\n| `--pm-gap-md` | Medium gap spacing |\n| `--pm-font-xs` | Extra small font size |\n| `--pm-font-sm` | Small font size |\n\nStatus tones (`pm-tone-blue`, `pm-tone-yellow`, `pm-tone-green`, `pm-tone-red`) use corresponding `--pm-*-25` background variables.\n\n## Usage Patterns\n\n### Typical List Page\n\n```tsx\nfunction ProjectList() {\n  const { data, total, currentPage, setCurrentPage, searchQuery, setSearchQuery } = useListState({\n    source: projects,\n    initialFilters: {},\n    process: ({ source, searchQuery, page, pageSize }) => {\n      const filtered = source.filter(p => p.name.includes(searchQuery));\n      const start = (page - 1) * pageSize;\n      return { data: filtered.slice(start, start + pageSize), total: filtered.length };\n    },\n  });\n\n  return (\n    <>\n      <ListToolbar\n        viewModes={[{ key: 'grid', label: '网格' }, { key: 'kanban', label: '看板' }]}\n        activeView=\"grid\"\n        onViewChange={() => {}}\n        searchQuery={searchQuery}\n        onSearchChange={setSearchQuery}\n      />\n      <div className=\"pm-stats-row\">\n        <StatsCards items={statsItems} />\n      <\/div>\n      {data.map(project => (\n        <ProjectCard key={project.id} project={project} variant=\"grid\" />\n      ))}\n      <Pagination total={total} currentPage={currentPage} pageSize={10} onPageChange={setCurrentPage} />\n    <\/>\n  );\n}\n```\n\n### Using MUI Components\n\n```tsx\nimport { PmButton, PmInput, PmTable } from '@/components/shared/mui';\n\n<PmButton variant=\"primary\" size=\"md\" onClick={handleSave}>\n  保存\n<\/PmButton>\n\n<PmInput clearable placeholder=\"搜索项目...\" value={search} onChange={e => setSearch(e.target.value)} />\n\n<PmTable\n  columns={[\n    { key: 'name', header: '项目名称' },\n    { key: 'status', header: '状态', render: (item) => <Chip label={item.status} /> },\n  ]}\n  data={projects}\n  loading={loading}\n  page={page}\n  total={total}\n  onPageChange={setPage}\n/>\n```\n\n## Adding New Components\n\n1. Create the component in the appropriate subdirectory\n2. Use `--pm-*` CSS custom properties for theming\n3. Support the `classNamePrefix` prop if the component might be used outside the project management context\n4. Export from the component's `index.ts` if it's a multi-file component\n5. Add to the module's barrel export if one exists","task-workflow-management-components":"# Task & Workflow Management — components\n\n# Task & Workflow Management — Components\n\n## Overview\n\nThis module provides the complete UI layer for task management within a project management application. It implements task listing, filtering, detail viewing, status transitions with guard conditions, and a hierarchical tree view of tasks organized by work packages and projects.\n\nThe module is designed for construction/renovation project management, supporting a multi-project task workflow with states like \"待分配\" (pending assignment), \"执行中\" (in progress), \"待验收\" (pending acceptance), and \"已完成\" (completed).\n\n## Architecture\n\n```\nTaskManagementPage (orchestrator)\n├── TaskToolbar (filtering, sorting, view mode)\n├── TaskListView (table with pagination)\n├── TaskDetailPage (drawer/page for task editing)\n├── TaskTreeView (hierarchical WBS-style view)\n├── taskManagement.selectors (data processing pipeline)\n├── taskManagement.data (mock data, tree builder)\n├── taskManagement.types (type definitions)\n└── taskStateMachine.guards (status transition validation)\n```\n\n## Key Components\n\n### TaskManagementPage\n\nThe main orchestrator component. It manages:\n- Task data loading from `taskRepository` with fallback to mock data\n- Filter state, pagination, and search query\n- Task detail drawer open/close\n- All status transition callbacks\n- Feedback snackbar for user actions\n\n**Data flow:**\n1. On mount, calls `loadRemoteTasks()` which attempts to load from `taskRepository.loadTasks()`\n2. Tasks are processed through `processTasks()` selector pipeline\n3. When a task is selected, `selectedTaskDetail` is built from the tasks array or cached detail\n4. All mutation callbacks update local state and persist via `taskRepository`\n\n### TaskDetailPage\n\nRenders a task's full detail in either page or drawer mode. Key sections:\n- **Header**: Task name, status chip, priority, action buttons (remind, advance, status-specific)\n- **Tree Context**: Project, parent task, node level, source type\n- **Execution Info**: Assignee selector, planned dates, actual dates, progress\n- **Status & Risk**: Status selector with available transitions, risk level, SLA status, blocked reason\n- **Standards**: Execution and acceptance standards display\n- **Checklist**: Trackable items with completion status\n- **Attachments**: Upload and remove files\n- **Relations**: Linked tasks display\n- **Flow Logs**: Chronological action history\n\n**Editing behavior:**\n- Tracks dirty state via `hasChanges` computed from draft values vs. original\n- Shows sticky save/reset bar only when changes exist\n- Assignee changes trigger `onAssign`, inline field changes trigger `onInlineUpdate`\n- Status changes require explicit \"应用状态变更\" button click\n\n### TaskListView\n\nRenders tasks in a table with columns: name, parent path, project, status, risk level, owner, planned dates, SLA status, predecessor status, remind count, standard binding status.\n\nSupports only `list` view mode currently — grid, kanban, and calendar modes show placeholder messages.\n\n### TaskToolbar\n\nProvides:\n- View mode toggle (grid/list/kanban/calendar)\n- Search input\n- Group dropdown (none/project/status/owner)\n- Filter dropdown (status, risk level, SLA status, blocked only)\n- Sort dropdown (default/planned end asc/risk desc/remind desc)\n- New task button (placeholder)\n\nUses click-outside detection to close dropdown menus.\n\n### TaskTreeView\n\nDisplays tasks in a hierarchical tree structure based on `parentTaskId` relationships. Features:\n- Status filter tabs (all/completed/in-progress/delayed/planned) with counts\n- Expand/collapse all buttons\n- \"定位风险节点\" button to find and highlight delayed tasks\n- Left panel: tree rows with indentation, expand/collapse toggles, status badges\n- Right panel: selected node detail with assignee editor\n\n**Tree building logic** (`buildTaskTreeViewModel`):\n1. Creates `TaskTreeNode` objects for each task\n2. Links children to parents via `parentTaskId`\n3. Maps task status + SLA status to tree status (completed/in-progress/delayed/planned)\n4. Counts projects, work packages, tasks, and delayed nodes\n\n## Data Processing Pipeline\n\nThe `processTasks` function in `taskManagement.selectors.ts` implements a sequential pipeline:\n\n```\nfilterByStatKey → searchTasks → advancedFilter → sortTasks → paginateTasks\n```\n\n1. **filterByStatKey**: Filters by the active stats card (all/pendingAssign/executing/etc.)\n2. **searchTasks**: Fuzzy match on name, code, project name, parent path\n3. **advancedFilter**: AND combination of status, risk level, SLA status, blocked only\n4. **sortTasks**: Default, planned end ascending, risk descending, remind count descending\n5. **paginateTasks**: Slice with page clamping\n\n## State Machine Guards\n\nThe `taskStateMachine.guards.ts` module implements PRD section 7.4 guard conditions for status transitions:\n\n| Transition | Guards |\n|---|---|\n| 待分配 → 待执行 | Owner assigned, predecessors complete, standards bound, snapshot generated |\n| 待执行 → 执行中 | Owner confirmed, no blocked predecessors, task not blocked |\n| 执行中 → 待提交 | Progress ≥ 80%, required materials submitted |\n| 待提交 → 待验收 | Progress ≥ 90%, acceptance standards bound, snapshot generated |\n| 待验收 → 已完成 | Progress = 100%, not blocked, standards bound |\n\nThe `getAvailableNextStatuses` function combines the transition map with guard validation to return only allowed next states with reasons for disallowed ones.\n\n## Type System\n\nCore types in `taskManagement.types.ts`:\n\n- **TaskItem**: Full task data model with P0-P2 fields, deprecated fields for backward compatibility\n- **TaskDetail**: Extends TaskItem with execution standards, acceptance standards, checklist, attachments, relations, flow logs\n- **TaskFilters**: All filter dimensions including statKey, searchQuery, groupBy, sortBy, status, riskLevel, slaStatus, blockedOnly\n- **TaskStatus**: 10-state enum (草稿 through 已关闭)\n- **TaskStatusTransitionMap**: Defines valid transitions for each status\n\n## Integration Points\n\nThe module is consumed by:\n- **ProjectScopeTab**: Uses `calculateTaskStats` and `buildTaskTreeViewModel`\n- **ProjectTemplateView**: Uses `buildTaskTreeViewModel`, `getTasksByTemplateId`, `getTemplateNameById`, `getTemplateInstantiationDiagnostics`\n\nExternal dependencies:\n- `taskRepository` service for data persistence\n- `AppSidebar`, `PageHeader`, `StatsCards` shared components\n- MUI components (Drawer, Snackbar, Alert, Paper, etc.)\n\n## Mock Data\n\n`taskManagement.data.ts` provides realistic mock data for 4 projects (Shanghai, Hangzhou, Beijing, Shenzhen) with 12 tasks and 11 work packages. The `buildTaskDetailFromItem` function generates complete detail objects from task items, including synthetic checklist items, attachments, relations, and flow logs.","task-workflow-management-services":"# Task & Workflow Management — services\n\n# Task & Workflow Management — Services Module\n\n## Overview\n\nThe `services/contracts/workflowContract.ts` module defines the authorization and state transition rules that govern project and task workflows. It acts as a declarative policy layer, ensuring that every role-based action and project status change is validated against a predefined contract before execution.\n\n## Key Components\n\n### 1. Role & Permission System\n\n#### `SystemRole`\nA union type representing the five user roles in the system:\n- `admin` — full access\n- `pm` — project manager\n- `executor` — task-level worker\n- `finance` — settlement and audit\n- `auditor` — read-only oversight\n\n#### `WorkflowAction`\nA union type of all possible actions a role can perform, grouped by domain:\n- **Project**: `project.read`, `project.write`, `project.transition`\n- **Task**: `task.read`, `task.write`\n- **Acceptance**: `acceptance.read`, `acceptance.write`\n- **Settlement**: `settlement.read`, `settlement.write`\n- **Audit**: `audit.read`, `audit.write`\n\n#### `ROLE_PERMISSION_MATRIX`\nA static `Record<SystemRole, WorkflowAction[]>` that maps each role to its permitted actions. This matrix is the single source of truth for authorization checks.\n\n#### `canRolePerform(role, action)`\nA pure function that checks whether a given role is allowed to perform a specific action. It simply looks up the role in the matrix and tests for inclusion.\n\n### 2. Project State Transition Contracts\n\n#### `TransitionContract`\nAn interface describing a valid state transition:\n- `from` — current `ProjectStatus`\n- `to` — target `ProjectStatus`\n- `requiredChecks` — array of precondition identifiers that must pass\n- `requiresReason` — whether a human-readable reason is mandatory\n\n#### `PROJECT_TRANSITION_CONTRACTS`\nA static array of all allowed transitions. Each entry defines the preconditions and metadata for moving a project from one status to another. The statuses follow a linear lifecycle with one exception (a feedback loop for rectification):\n\n```\n待立项 → 待确认 → 待拆解 → 执行中 → 待验收 → 待结算 → 已归档\n                                    ↓\n                                 整改中\n```\n\nThe `整改中` → `待验收` transition allows re-entry into the acceptance phase after rectification is closed.\n\n## Usage in the Codebase\n\nThis module is consumed by service-layer logic that enforces workflow rules:\n\n- **Authorization middleware** calls `canRolePerform()` before allowing any write or transition operation.\n- **Project state machine** (in `domain/projectStatusMachine.ts`) uses `PROJECT_TRANSITION_CONTRACTS` to validate that a requested transition is legal and that all preconditions are met.\n- **UI components** may reference the contracts to disable buttons or show validation hints.\n\n## Architecture Diagram\n\n```mermaid\nflowchart LR\n    A[API Request] --> B{Authorization}\n    B -->|canRolePerform| C[Role Permission Matrix]\n    B -->|pass| D{State Transition}\n    D -->|PROJECT_TRANSITION_CONTRACTS| E[Validate Preconditions]\n    E -->|pass| F[Execute Transition]\n    E -->|fail| G[Return Error]\n```\n\n## Design Decisions\n\n- **Declarative over imperative**: All rules are expressed as data (arrays and records) rather than conditional logic. This makes the contracts easy to audit, test, and extend.\n- **Separation of concerns**: The contracts module has no dependencies on other modules. It is a pure data layer that can be imported by any service or domain logic.\n- **Explicit preconditions**: Each transition lists its required checks by string identifier. The actual check implementations live in the domain layer, keeping the contract layer focused on *what* is required, not *how* to verify it.","task-workflow-management":"# Task & Workflow Management\n\n# Task & Workflow Management\n\n## Purpose\n\nThe Task & Workflow Management module provides the complete task lifecycle for a construction/renovation project management application. It combines a rich UI layer for viewing, filtering, and editing tasks with a declarative authorization and state transition engine that enforces role-based policies across project and task workflows.\n\n## Sub-module Relationship\n\nThe module is split into two complementary sub-modules:\n\n- **[Task & Workflow Management — Components](task-workflow-components.md)** — The UI orchestrator (`TaskManagementPage`) and its child components (`TaskToolbar`, `TaskListView`, `TaskDetailPage`, `TaskTreeView`) that render tasks in table or hierarchical tree views, support filtering/sorting/pagination, and display status transitions with guard conditions.\n\n- **[Task & Workflow Management — Services](task-workflow-services.md)** — The policy layer (`workflowContract.ts`) that defines `SystemRole` types (admin, pm, executor, finance, auditor) and `WorkflowAction` unions, validating every role-based action and project status change before execution.\n\nThe components sub-module consumes the services sub-module to enforce workflow rules at the UI level — for example, `TaskDetailPage` uses status actions validated by the contract, and `TaskTreeView` applies `filterNodesByStatus` logic that respects the defined state machine.\n\n## Key Workflows\n\n1. **Task Listing & Filtering** — `TaskManagementPage` orchestrates `TaskToolbar` (filter/sort controls) and `TaskListView` (paginated table) or `TaskTreeView` (hierarchical tree). The `processTasks` selector chains `searchTasks`, `filterByStatKey`, `advancedFilter`, `sortTasks`, and `paginateTasks` to produce the final view.\n\n2. **Task Detail & Status Transitions** — `TaskDetailPage` displays task details and available status actions (e.g., \"待分配\" → \"执行中\"). Each transition is guarded by `validateTransitionToExecuting` or `validateTransitionToPendingExecution`, which check predecessor tasks via `getPredecessorTasks` — all defined in the services contract.\n\n3. **Hierarchical Tree View** — `TaskTreeView` builds a tree from flat task data using `buildTaskTreeViewModel` (which calls `mapTaskStatusToTreeStatus` and `countNodes`), then renders expandable rows via `buildVisibleRows`. It supports `collectDefaultExpandedIds`, `collectNodeMap`, and `collectParentMap` for state management, and `locateFirstRiskNode` with `expandAncestors` for risk navigation.\n\n4. **Cross-Module Integration** — The `ProjectScopeTab` (from the project module) reuses `buildTaskTreeViewModel` and `countNodes` to display task trees within project scopes. Similarly, `ProjectTemplateView` calls `getTasksByTemplateId` to populate template-based task lists.","testing-configuration":"# Testing & Configuration\n\n# Testing & Configuration Module\n\n## Overview\n\nThis module provides the testing infrastructure and configuration for a React + Vite project. It implements a layered testing strategy with mock Prisma clients, isolated test data management, and comprehensive tooling configuration.\n\n## Architecture\n\nThe module consists of three layers:\n\n1. **Mock Infrastructure** - In-memory Prisma client factory for database simulation\n2. **Test Configuration** - Vitest setup, coverage thresholds, and environment settings\n3. **Data Strategy** - Guidelines for test data management across different test types\n\n```mermaid\ngraph TD\n    A[Test Runner: Vitest] --> B[Setup: jest-dom matchers]\n    A --> C[Mock Factory: createMockPrismaClient]\n    C --> D[In-Memory Data Store]\n    D --> E[CRUD Operations]\n    E --> F[findMany]\n    E --> G[findUnique]\n    E --> H[create]\n    E --> I[update]\n    E --> J[delete]\n    A --> K[Coverage Reports]\n    K --> L[Text Report]\n    K --> M[HTML Report]\n    K --> N[JSON Report]\n```\n\n## Key Components\n\n### 1. Prisma Mock Factory (`src/test/mocks/prisma.mock.ts`)\n\nThe core testing utility that creates an isolated, in-memory Prisma client for unit and integration tests.\n\n**Exported Function:**\n- `createMockPrismaClient(initialProjects?: PartialProject[])` - Creates a mock Prisma client with an optional seed data array\n\n**Mock Client Methods:**\n\n| Method | Signature | Behavior |\n|--------|-----------|----------|\n| `findMany` | `async () => ProjectRecord[]` | Returns all projects from in-memory store |\n| `findUnique` | `async ({ where: { id?, code? } }) => ProjectRecord \\| null` | Finds by id or code |\n| `create` | `async ({ data }) => ProjectRecord` | Creates new record with auto-generated id |\n| `update` | `async ({ where, data }) => ProjectRecord \\| null` | Updates matching record, returns null if not found |\n| `delete` | `async ({ where }) => ProjectRecord \\| null` | Removes and returns matching record |\n\n**Type Definitions:**\n```typescript\ntype PartialProject = {\n  id?: string\n  code?: string\n  name?: string\n  description?: string\n  status?: string\n}\n\ninterface ProjectRecord {\n  id: string\n  code?: string\n  name?: string\n  description?: string\n  status?: string\n}\n```\n\n**Data Isolation:** Each call to `createMockPrismaClient` creates a fresh in-memory store. Records are auto-assigned unique IDs using `mock_${timestamp}_${random}` format.\n\n### 2. Test Setup (`src/test/setup.ts`)\n\nMinimal setup file that imports `@testing-library/jest-dom` to extend Vitest's matchers with DOM-specific assertions (e.g., `toBeInTheDocument`, `toHaveTextContent`).\n\n### 3. Test Data Strategy (`src/test/test-data-strategy.md`)\n\nA documented strategy covering three testing levels:\n\n| Test Level | Approach | Dependencies |\n|------------|----------|--------------|\n| **Unit Tests** | Pure function testing with direct I/O assertions | None (no external deps) |\n| **Reposito
