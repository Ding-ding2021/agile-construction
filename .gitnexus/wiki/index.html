ry Tests** | Mock Prisma client with in-memory data | `createMockPrismaClient` |\n| **Integration Tests** | Express test instance with mocked Prisma | Mock Prisma + Express |\n\n**Core Principle:** Per-test data isolation - each test creates and cleans up its own data snapshot to prevent cross-test contamination.\n\n### 4. Vitest Configuration (`vitest.config.ts`)\n\n```typescript\nexport default defineConfig({\n  plugins: [react()],\n  test: {\n    globals: true,                    // Global test functions (describe, it, expect)\n    environment: 'jsdom',             // Browser-like environment\n    setupFiles: './src/test/setup.ts', // Pre-test setup\n    coverage: {\n      provider: 'v8',                 // V8 coverage engine\n      reporter: ['text', 'json', 'html'],\n      exclude: ['node_modules/', 'src/test/'],\n      thresholds: {\n        lines: 55,\n        statements: 55,\n        functions: 42,\n        branches: 42,\n      },\n    },\n  },\n})\n```\n\n**Coverage Thresholds:**\n- Lines: 55%\n- Statements: 55%\n- Functions: 42%\n- Branches: 42%\n\n### 5. Supporting Configuration Files\n\n| File | Purpose |\n|------|---------|\n| `vite.config.ts` | Base Vite config with React plugin |\n| `tsconfig.json` | Root TypeScript config with project references |\n| `tsconfig.app.json` | App-specific TS config (ES2023, React JSX, strict mode) |\n| `tsconfig.node.json` | Node-specific config for Vite config file |\n| `tailwind.config.js` | Tailwind CSS configuration |\n| `eslint.config.js` | ESLint with TypeScript, React Hooks, and quality rules |\n\n## Usage Examples\n\n### Unit Test with Mock Prisma\n\n```typescript\nimport { describe, it, expect } from 'vitest'\nimport { createMockPrismaClient } from './mocks/prisma.mock'\n\ndescribe('Project repository', () => {\n  it('should create and retrieve projects', async () => {\n    const client = createMockPrismaClient()\n    \n    const created = await client.project.create({\n      data: { code: 'PRJ-001', name: 'Test Project' }\n    })\n    \n    const found = await client.project.findUnique({\n      where: { id: created.id }\n    })\n    \n    expect(found).toHaveProperty('name', 'Test Project')\n  })\n  \n  it('should update existing projects', async () => {\n    const initial = [{ id: '1', code: 'PRJ-001', name: 'Initial' }]\n    const client = createMockPrismaClient(initial)\n    \n    const updated = await client.project.update({\n      where: { id: '1' },\n      data: { name: 'Updated' }\n    })\n    \n    expect(updated?.name).toBe('Updated')\n  })\n})\n```\n\n### Integration Test Pattern\n\n```typescript\n// Integration tests use the same mock factory but with Express test instances\nimport { createMockPrismaClient } from '../mocks/prisma.mock'\nimport { createTestApp } from '../test-app'\n\ndescribe('Project API', () => {\n  it('should return projects', async () => {\n    const mockPrisma = createMockPrismaClient()\n    const app = createTestApp(mockPrisma)\n    \n    const response = await app.get('/api/projects')\n    expect(response.status).toBe(200)\n  })\n})\n```\n\n## Best Practices\n\n1. **Always create fresh mocks** - Call `createMockPrismaClient()` in each test or `beforeEach` block\n2. **Seed data explicitly** - Pass initial data as constructor argument when testing update/delete operations\n3. **Test isolation** - Never share mock instances between tests\n4. **Coverage targets** - Maintain minimum 55% line coverage; focus on critical business logic\n5. **No real I/O** - Unit and integration tests must never connect to actual databases or external services\n\n## Connection to Codebase\n\nThis module integrates with the broader project through:\n\n- **Repository Layer** - Mock Prisma client replaces real Prisma in repository tests\n- **API Routes** - Integration tests use mock client to verify route handlers\n- **Component Tests** - Setup file provides DOM matchers for React component testing\n- **Build Pipeline** - Vitest configuration integrates with Vite build system\n- **Type Safety** - TypeScript configurations ensure consistent type checking across test and source code"};

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();

</script>
