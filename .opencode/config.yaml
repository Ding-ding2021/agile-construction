# OpenCode 记忆系统配置

memory:
  # 长期记忆文件（符号链接 → memory/）
  long_term: memory/MEMORY.md
  
  # 每日日志目录
  daily_logs: memory/
  
  # 代码模式目录
  patterns: memory/patterns/
    
  # 记忆加载顺序（启动时）
  load_order:
    - memory/MEMORY.md
    - memory/2026-*.md
    - memory/patterns/*.md

# OpenCode 行为配置
behavior:
  # 任务完成后自动更新记忆
  auto_summarize: true
  
  # 记住用户偏好
  remember_preferences:
    - code_style
    - file_organization
    - naming_conventions
    - common_fixes
  
  # 学习模式
  learning:
    enabled: true
    # 记录成功模式
    record_patterns: true
    # 记录常见错误
    record_mistakes: true
    # 记录优化方案
    record_optimizations: true
