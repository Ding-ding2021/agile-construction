name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (full project)
        run: npx eslint "src/**/*.{ts,tsx}"

      - name: Verify key docs exist
        run: |
          test -f docs/03-engineering/release/launch-checklist.md
          test -f docs/03-engineering/release/feishu-publish-runbook.md
          test -f docs/03-engineering/integration-guide.md
          test -f docs/00-governance/document-governance.md
          test -f docs/README.md

      - name: Type & Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:run

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
