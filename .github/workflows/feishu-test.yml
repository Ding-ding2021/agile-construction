name: 飞书链路验证
on:
  push:
    paths:
      - .github/workflows/feishu-test.yml
  workflow_dispatch:

jobs:
  test-feishu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成测试消息
        run: |
          mkdir -p .workbuddy/stats/daily
          TODAY=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "# 飞书链路验证 — $TODAY (北京时间 $(TZ='Asia/Shanghai' date '+%H:%M'))" > .workbuddy/stats/daily/test.md
          echo "" >> .workbuddy/stats/daily/test.md
          echo "✅ cron 时区已修正为北京时间。所有工作流 cron 时间：" >> .workbuddy/stats/daily/test.md
          echo "- H9 daily-summary: UTC 10:00 = 北京 18:00" >> .workbuddy/stats/daily/test.md
          echo "- H10 weekly-review: UTC 09:00 = 北京 17:00" >> .workbuddy/stats/daily/test.md
          echo "- H11 monthly-review: UTC 01:00 = 北京 09:00" >> .workbuddy/stats/daily/test.md
          echo "" >> .workbuddy/stats/daily/test.md
          echo "飞书 Webhook 链路验证通过！" >> .workbuddy/stats/daily/test.md

      - name: 飞书推送
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -n "$FEISHU_WEBHOOK_URL" ]; then
            python3 scripts/notify-feishu.py "飞书链路验证" "$(cat .workbuddy/stats/daily/test.md)"
          else
            echo "⚠️ FEISHU_WEBHOOK_URL 未配置"
          fi
