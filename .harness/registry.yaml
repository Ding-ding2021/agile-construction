# Harness 工程框架 — 全量注册表
# 本文件是 AI 可读的框架索引，映射所有要素之间的关系

# ============================================================
# 1. 工作流
# ============================================================
workflows:
  phases:
    - id: define
      name: 定义
      en: DEFINE
      input: 原始需求
      output: docs/01-product/specs/
      exit_condition: 规格文档已签署 + 评审小组通过
      steps:
        - 需求澄清
        - 风险定级
        - 评审小组审议
        - 规格定稿

    - id: plan
      name: 规划
      en: PLAN
      input: 已签署 spec
      output: docs/02-architecture/plans/
      exit_condition: 实现计划已审批
      steps:
        - karpathy-guidelines
        - 任务分解
        - 计划评审
        - 计划定稿

    - id: build
      name: 构建
      en: BUILD
      input: 实现计划
      output: 代码 + 测试
      exit_condition: 代码完成 + verification-before-completion 自检通过
      steps:
        - 增量实现
        - TDD 开发
        - 领域技能调用
        - 自检

    - id: test
      name: 测试
      en: TEST
      input: 已完成代码
      output: 测试报告
      exit_condition: lint + build + test + e2e 全绿
      steps:
        - lint 检查
        - 构建检查
        - 单元/组件测试
        - E2E 测试

    - id: review
      name: 评审
      en: REVIEW
      input: 通过测试的代码
      output: 验收报告
      exit_condition: 验收小组全票通过
      steps:
        - 功能验收
        - 代码质量验收
        - UI 验收
        - 组长裁定

    - id: ship
      name: 交付
      en: SHIP
      input: 验收通过
      output: 日志 + 统计 + 提交 + PR
      exit_condition: CI 绿灯
      steps:
        - 写日志
        - 写统计
        - 提交代码
        - 推送 PR

    - id: evolve
      name: 进化
      en: EVOLVE
      input: 已交付经验
      output: 模式 + 知识库更新 + 框架迭代
      exit_condition: 模式已记录 + 知识库已更新
      steps:
        - 模式提取
        - 知识入库
        - 技能迭代
        - 框架版本

  depth_adjustment:
    L1_简单:
      定义: 产品直接定稿
      规划: 轻量计划
      构建: 单文件修改
      测试: lint + build
      评审: 产品单人
      交付: 日志 + 提交
    L2_中等:
      定义: 组长 + 2 评估员
      规划: 完整任务分解
      构建: 增量实现 + TDD
      测试: lint + build + 单元/组件
      评审: 组长 + 2 验收员
      交付: 日志 + 统计 + 提交
    L3_复杂:
      定义: 全量 4 人评估组
      规划: 完整计划 + 架构评审
      构建: 多文件 + TDD + 多重技能
      测试: lint + build + 单元/组件 + e2e
      评审: 全量 4 人验收组
      交付: 日志 + 统计 + PR + CI

