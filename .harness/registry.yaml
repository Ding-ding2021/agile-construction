# ============================================================
# 8. Hooks
# ============================================================
hooks:
  - id: H1
    path: .husky/pre-commit
    trigger: git commit 前
    action: lint-staged + tsc --noEmit
    phase: ship

  - id: H2
    path: .husky/commit-msg
    trigger: commit 消息写入时
    action: Conventional Commits 校验
    phase: ship

  - id: H3
    path: .opencode/hooks/pre-commit
    trigger: git commit 前
    action: 同步记忆
    phase: ship

  - id: H4
    path: .opencode/hooks/post-commit
    trigger: git commit 后
    action: 采集 stats + 异步写日志
    phase: ship

  - id: H5
    path: .husky/pre-push
    trigger: git push 前
    action: 质量门禁预检
    phase: ship

  - id: H6
    path: .github/workflows/ci.yml
    trigger: git push
    action: ESLint
    phase: test

  - id: H7
    path: .github/workflows/ci.yml
    trigger: git push
    action: tsc + vite build
    phase: test

  - id: H8
    path: .github/workflows/ci.yml
    trigger: git push
    action: vitest + playwright
    phase: test

  - id: H9
    path: .github/workflows/daily-summary.yml
    trigger: "cron: 0 18 * * 1-5"
    action: 聚合日报 + 飞书推送
    phase: evolve

  - id: H10
    path: .github/workflows/weekly-review.yml
    trigger: "cron: 0 17 * * 5"
    action: 44 指标聚合 + 周报 + 飞书推送
    phase: evolve

  - id: H11
    path: .github/workflows/monthly-review.yml
    trigger: "cron: 0 9 1 * *"
    action: 趋势分析 + 框架迭代建议 + 飞书推送
    phase: evolve

  - id: H12
    path: .github/workflows/ci.yml (on tags)
    trigger: tag push
    action: 44 指标全量 + 发布质量报告
    phase: ship

# ============================================================
# 9. 治理
# ============================================================
governance:
  schedule:
    per_task:
      trigger: post-commit hook
      script: scripts/collect-stats.sh
      output: .workbuddy/stats/YYYY-MM-DD.json
      owner: 自动化

    daily:
      trigger: "cron: 0 18 * * 1-5"
      workflow: .github/workflows/daily-summary.yml
      output: .workbuddy/stats/daily/YYYY-MM-DD.md
      notify:
        channel: feishu
        method: webhook
      owner: 产品

    weekly:
      trigger: "cron: 0 17 * * 5"
      workflow: .github/workflows/weekly-review.yml
      output: .workbuddy/stats/weekly/YYYY-Www.json
      notify:
        channel: feishu
        method: webhook
      owner: 产品

    monthly:
      trigger: "cron: 0 9 1 * *"
      workflow: .github/workflows/monthly-review.yml
      output: .workbuddy/stats/trends/YYYY-Qq.json
      notify:
        channel: feishu
        method: webhook
      owner: 产品

    on_release:
      trigger: "push tags v*"
      workflow: .github/workflows/ci.yml (metrics step)
      output: .workbuddy/stats/release/vX.Y.Z.json
      owner: 产品

  alerts:
    levels:
      green: all metrics in range
      yellow: "> 20% deviation, 2 consecutive weeks"
      orange: "> 50% deviation OR > 3 metrics simultaneously"
      red: "core metric fail -> freeze release"
    core_metrics:
      - e2e_pass_rate
      - build_pass_rate
      - leak_rate

  metrics:
    产品:
      - id: clarification_rounds
        target: "<= 3"
        source: agent_self
      - id: requirement_deviation
        target: "<= 1"
        source: agent_self
      - id: rework_rounds
        target: "<= 1"
        source: agent_self
      - id: plan_accuracy
        target: ">= 80%"
        source: agent_self
      - id: doc_completeness
        target: "100%"
        source: auto
      - id: eval_pass_rate
        target: ">= 70%"
        source: agent_self
      - id: evolution_output
        target: ">= 1 / week"
        source: human_audit

    设计:
      - id: design_fidelity
        target: ">= 8"
        source: human_audit
      - id: design_first_pass
        target: ">= 60%"
        source: agent_self
      - id: token_compliance
        target: "0 violations"
        source: auto
      - id: component_reuse
        target: ">= 80%"
        source: auto
      - id: accessibility_score
        target: "0 blockers"
        source: auto
      - id: responsive_coverage
        target: "100%"
        source: auto
      - id: dark_mode_coverage
        target: ">= 90%"
        source: auto

    开发:
      - id: lint_pass_rate
        target: "100%"
        source: auto
      - id: ts_strictness
        target: "0 any"
        source: auto
      - id: test_coverage
        target: ">= 70%"
        source: auto
      - id: build_pass_rate
        target: ">= 95%"
        source: auto
      - id: code_first_pass
        target: ">= 60%"
        source: agent_self
      - id: rework_per_task
        target: "<= 0.5"
        source: agent_self
      - id: tdd_adherence
        target: ">= 70%"
        source: agent_self
      - id: dead_code
        target: "0"
        source: auto

    测试:
      - id: e2e_pass_rate
        target: "100%"
        source: auto
      - id: defect_discovery
        target: "> 0 (monitor)"
        source: agent_self
      - id: leak_rate
        target: "<= 5%"
        source: human_audit
      - id: test_requirement_coverage
        target: ">= 90%"
        source: agent_self
      - id: boundary_coverage
        target: ">= 80%"
        source: human_audit
      - id: design_issue_accuracy
        target: ">= 80%"
        source: human_audit
      - id: automation_stability
        target: "<= 5% flaky"
        source: auto

    general:
      chinese_rate:
        target: ">= 95%"
        source: human_audit
        reviewer: all
      skill_hit_rate:
        target: ">= 80%"
        source: auto
        reviewer: 产品
      tool_utilization:
        target: "100%"
        source: auto
        reviewer: all
      suggestion_rate:
        target: ">= 1 / task"
        source: agent_self
        reviewer: all
      objection_rate:
        target: ">= 0.3 / task"
        source: agent_self
        reviewer: all
      alternative_rate:
        target: ">= 50%"
        source: agent_self
        reviewer: all
      blind_obedience:
        target: "0"
        source: agent_self
        reviewer: all

  adjustments:
    engine: scripts/evaluate-adjustments.py
    schedule: weekly (周五 17:00 cron, H10 step)
    storage: .harness/adjustments.yaml
    sync_target: AGENTS.md
    auto_levels: [L1, L2]
    human_gate_levels: [L3, L4]
    safety_rules:
      - expires_after: 7 天
      - human_override: status=overridden
      - never_punish_human: true
    trigger_rules:
      - id: TR-001
        metric: 技能遗漏率
        threshold: 3
        window: avg_per_task_7d
        action: force_skill
        severity: L2
      - id: TR-002
        metric: 需求偏差度
        threshold: 3
        window: cumulative_7d
        action: escalate_depth
        severity: L2
      - id: TR-003
        metric: karpathy遗漏
        threshold: 3
        window: cumulative_7d
        action: force_skill
        severity: L2
      - id: TR-008
        metric: e2e_pass_rate
        threshold: 100
        window: cumulative_7d
        action: freeze_autopilot
        severity: L4

# ============================================================
# 10. 进化
# ============================================================
evolution:
  triggers:
    per_task: [task-memory, quality-metrics]
    per_batch: [pattern-extraction, error-analysis]
    on_demand: [knowledge-update, skill-update]
    on_version: [framework-iteration]

  learning_loops:
    l1_metrics:
      input: [quality-KPI, test-results, review-report]
      output: [task-log, stats-json]
      owner: 产品

    l2_patterns:
      input: [l1-aggregated-data]
      output: [MEMORY.md patterns, 避坑指南]
      owner: 产品

    l2_5_adjustment:
      input: [l2-patterns, self-check-blocks, rules-anti-patterns]
      output: [.harness/adjustments.yaml, AGENTS.md 矫正块]
      trigger: weekly-review CI step
      action: scripts/evaluate-adjustments.py
      owner: harness-bot
      human_gate: L3-L4 adjustments require human approval

    l3_knowledge:
      input: [l2-patterns, document-gap-analysis]
      output: [updated docs, new ADRs, deprecated marks]
      owner: 产品

    l4_framework:
      input: [l3-gaps, structural-issues]
      output: [bumped version, updated harness docs, updated registry]
      owner: 产品
