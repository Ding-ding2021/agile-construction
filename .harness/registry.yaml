        review: [技术可行性, 影响范围, 架构风险]
      - role: 测试
        title: 测试评审
        review: [可测试性, 验收标准清晰度]
    decision: 人类

  - id: plan_review
    name: 计划评审
    phase: plan
    seats:
      - role: 产品
        title: 组长
        review: [计划对齐spec, 任务优先级]
      - role: 设计
        title: 设计评审
        review: [UI/UX实现方案, 设计交付物]
      - role: 开发
        title: 技术评审
        review: [技术方案, 依赖顺序, 模块拆分, 风险]
      - role: 测试
        title: 测试评审
        review: [测试策略充分性, E2E场景覆盖]
    decision: 人类

  - id: accept_squad
    name: 验收小组
    phase: review
    seats:
      - role: 产品
        title: 组长
        review: [功能与规格一致性, 需求覆盖]
      - role: 设计
        title: 设计验收
        review: [设计还原度, Token一致性, 暗色/响应式/可访问性]
      - role: 开发
        title: 代码验收
        review: [编码规范, 架构合规, 死代码, 性能]
      - role: 测试
        title: 测试验收
        review: [测试覆盖, 边界条件, 设计还原度]
    decision: 人类

