temporary_orgs:
  - id: eval_squad
    name: 评审小组
    phase: define
    seats:
      - role: 产品
        title: 组长
        review: [商业价值, 优先级, 范围边界]
      - role: 设计
        title: 设计评审
        review: [UI/UX可行性, 交互合理性]
      - role: 开发
